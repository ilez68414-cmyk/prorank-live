<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #1a1a1a;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border-left: 4px solid #fbbf24;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #fbbf24;
        }
        .stat-card .label {
            color: #888;
            font-size: 0.8rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .admin-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #ccc;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 2rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tab-btn.active {
            background: #fbbf24;
            color: #000;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        .admin-form {
            background: #1f1f1f;
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
        }
        .admin-form h3 {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #fbbf24;
        }
        .form-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .form-group {
            flex: 1;
            min-width: 150px;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            color: #aaa;
            font-size: 0.8rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.6rem;
            background: #2a2a2a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
        }
        .btn-primary { background: #fbbf24; color: #000; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-success { background: #16a34a; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-secondary { background: #3b82f6; color: white; }
        .fighters-list {
            background: #1f1f1f;
            border-radius: 12px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #2a2a2a;
            color: #fbbf24;
        }
        .points-control {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }
        .points-control button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .login-form {
            max-width: 400px;
            margin: 3rem auto;
            text-align: center;
        }
        .login-form input {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            background: #2a2a2a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }
        .hidden { display: none; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #1a1a1a;
            border-bottom: 2px solid #fbbf24;
        }
        .logo { font-size: 1.5rem; font-weight: bold; cursor: pointer; }
        .logo span { color: #fbbf24; }
        .challenge-item {
            padding: 0.75rem;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .history-item {
            padding: 0.5rem;
            border-bottom: 1px solid #333;
            font-size: 0.8rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        @media (max-width: 768px) {
            .form-row { flex-direction: column; }
            .admin-tabs { justify-content: center; }
        }
    </style>
</head>

                        <thead><tr><th>Имя</th><th>Спорт</th><th>Город</th><th>⭐ FRS</th><th>🏆</th><th>❌</th><th>💥</th><th>Telegram</th><th>Управление</th></tr></thead>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",

    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy, deleteDoc, increment, addDoc, getDoc, where, setDoc, limit } from "firebase/firestore";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const BOT_TOKEN = '8527160088:AAGc2311QFkp6F7-Jx5k8MJfqlpvbueSl5E';

        let allFighters = [];
        let currentAdminEmail = null;

async function checkAndAwardAchievements(userId) {
    const userRef = doc(db, "fighters", userId);
    const userSnap = await getDoc(userRef);
    const user = userSnap.data();
    if (!user) return;
    
    const achievementsSnap = await getDocs(collection(db, "achievements"));
    const userAchievementsSnap = await getDocs(query(collection(db, "userAchievements"), where("userId", "==", userId)));
    const earnedIds = new Set();
    userAchievementsSnap.forEach(doc => earnedIds.add(doc.data().achievementId));
    
    const fightsSnap = await getDocs(query(collection(db, "fights"), where("winnerId", "==", userId)));
    const totalFights = fightsSnap.size;
    const wins = user.wins || 0;
    const finishes = user.finishes || 0;
    
    for (const docSnap of achievementsSnap.docs) {
        const ach = docSnap.data();
        if (earnedIds.has(docSnap.id)) continue;
        
        let earned = false;
        const cond = ach.condition;
        
        if (!cond) continue; // пропускаем ачивки без условия
        
        if (cond.type === 'total_fights' && totalFights >= cond.value) earned = true;
        if (cond.type === 'wins' && wins >= cond.value) earned = true;
        if (cond.type === 'finishes' && finishes >= cond.value) earned = true;
        
        if (earned) {
            if (ach.reward && ach.reward.type === 'frs') {
                await updateDoc(userRef, { frs: (user.frs || 0) + ach.reward.amount });
            }
            await setDoc(doc(db, "userAchievements", `${userId}_${docSnap.id}`), {
                userId: userId,
                achievementId: docSnap.id,
                earnedAt: new Date(),
                isNegative: ach.isNegative || false
            });
            console.log(`🏆 ${ach.name} получена!`);
        }
    }
}
        async function logAction(action, targetId, details) {
            if (!currentAdminEmail) return;
            await addDoc(collection(db, "adminLogs"), {
                admin: currentAdminEmail,
                action: action,
                targetId: targetId || null,
                details: details || '',
                timestamp: new Date()
            }).catch(e => console.error);
        }

        async function loadStats() {
            const fightersSnap = await getDocs(collection(db, "fighters"));
            const fightsSnap = await getDocs(collection(db, "fights"));
            const challengesSnap = await getDocs(collection(db, "challenges"));
            const now = new Date();
            const monthAgo = new Date(now.getFullYear(), now.getMonth() - 1, now.getDate());
            let fightsMonth = 0;
            fightsSnap.forEach(doc => { const date = doc.data().date?.toDate(); if (date && date > monthAgo) fightsMonth++; });
            let premiumCount = 0;
            fightersSnap.forEach(doc => { if (doc.data().premium) premiumCount++; });
            document.getElementById('statFighters').innerText = fightersSnap.size;
            document.getElementById('statFights').innerText = fightsSnap.size;
            document.getElementById('statFightsMonth').innerText = fightsMonth;
            document.getElementById('statChallenges').innerText = challengesSnap.size;
            document.getElementById('statPremium').innerText = premiumCount;
        }

        async function loadFighters() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '<tr><td colspan="9"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</td></tr>';
            try {
                const q = query(collection(db, "fighters"), orderBy("frs", "desc"));
                const snapshot = await getDocs(q);
                allFighters = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderFighters(allFighters);
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="9">Ошибка загрузки</td></tr>';
            }
        }

        function renderFighters(fighters) {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';
            fighters.forEach(f => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><strong>${f.name || 'Боец'}</strong><br><small>${f.email || ''}</small></td>
                    <td>${f.sport || '—'}</td>
                    <td>${f.city || '—'}</td>
                    <td>${f.frs || 0}</td>
                    <td>${f.wins || 0}</td>
                    <td>${f.losses || 0}</td>
                    <td>${f.finishes || 0}</td>
                    <td>${f.telegramId || '—'}</td>
                    <td class="points-control">
                        <button onclick="changePoints('${f.id}', 100)">+100</button>
                        <button onclick="changePoints('${f.id}', 10)">+10</button>
                        <button onclick="changePoints('${f.id}', 1)">+1</button>
                        <button class="danger" onclick="changePoints('${f.id}', -1)">-1</button>
                        <button class="danger" onclick="changePoints('${f.id}', -10)">-10</button>
                        <button class="danger" onclick="changePoints('${f.id}', -100)">-100</button>
                    </td>
                `;
            });
        }

        window.changePoints = async (uid, delta) => {
            const fighter = allFighters.find(f => f.id === uid);
            if (!fighter) return;
            const newFRS = (fighter.frs || 0) + delta;
            await updateDoc(doc(db, "fighters", uid), { frs: newFRS });
            await logAction('change_points', uid, `Изменил FRS на ${delta}`);
            loadFighters();
            loadStats();
        };

        async function loadFightersForSelectEdit() {
            const snapshot = await getDocs(query(collection(db, "fighters"), orderBy("name")));
            const select = document.getElementById('selectFighterForEdit');
            select.innerHTML = '<option value="">-- Выберите бойца --</option>';
            snapshot.forEach(doc => {
                const fighter = doc.data();
                select.innerHTML += `<option value="${doc.id}">${fighter.name || 'Боец'} (${fighter.city || '—'})</option>`;
            });
            select.onchange = () => {
                if (select.value) openEditDialog(select.value);
                else document.getElementById('editForm').style.display = 'none';
            };
        }

        function openEditDialog(uid) {
            const f = allFighters.find(f => f.id === uid);
            if (!f) return;
            document.getElementById('editName').value = f.name || '';
            document.getElementById('editCity').value = f.city || '';
            document.getElementById('editWins').value = f.wins || 0;
            document.getElementById('editLosses').value = f.losses || 0;
            document.getElementById('editFinishes').value = f.finishes || 0;
            document.getElementById('editFRS').value = f.frs || 0;
            document.getElementById('editSubscribers').value = f.subscribers || 0;
            document.getElementById('editViews').value = f.viewsLast30Days || 0;
            document.getElementById('editFreeChallenges').value = f.freeChallenges || 0;
            document.getElementById('editPurchasedChallenges').value = f.purchasedChallenges || 0;
            document.getElementById('editTelegramId').value = f.telegramId || '';
            document.getElementById('editPremium').value = f.premium ? 'true' : 'false';
            
            const weightSelect = document.getElementById('editWeightClass');
            weightSelect.innerHTML = '<option value="47">Наилегчайшая (до 50 кг)</option><option value="53">Легчайшая (51–56 кг)</option><option value="59">Полулёгкая (57–61 кг)</option><option value="64">Лёгкая (62–66 кг)</option><option value="69">1-я полусредняя (67–71 кг)</option><option value="74">Полусредняя (72–77 кг)</option><option value="80">1-я средняя (78–83 кг)</option><option value="86">Средняя (84–89 кг)</option><option value="94">Полутяжёлая (90–99 кг)</option><option value="110">Тяжёлая (100+ кг)</option>';
            weightSelect.value = f.weightClass || '64';
            
            document.getElementById('editForm').style.display = 'block';
        }

        document.getElementById('saveFighterBtn').addEventListener('click', async () => {
            const uid = document.getElementById('selectFighterForEdit').value;
            if (!uid) { alert('Выберите бойца'); return; }
            const updates = {
                name: document.getElementById('editName').value,
                city: document.getElementById('editCity').value,
                weightClass: document.getElementById('editWeightClass').value,
                sport: document.getElementById('editSport').value,
                wins: parseInt(document.getElementById('editWins').value) || 0,
                losses: parseInt(document.getElementById('editLosses').value) || 0,
                finishes: parseInt(document.getElementById('editFinishes').value) || 0,
                frs: parseInt(document.getElementById('editFRS').value) || 0,
                subscribers: parseInt(document.getElementById('editSubscribers').value) || 0,
                viewsLast30Days: parseInt(document.getElementById('editViews').value) || 0,
                freeChallenges: parseInt(document.getElementById('editFreeChallenges').value) || 0,
                purchasedChallenges: parseInt(document.getElementById('editPurchasedChallenges').value) || 0,
                telegramId: document.getElementById('editTelegramId').value || null,
                premium: document.getElementById('editPremium').value === 'true'
            };
            await updateDoc(doc(db, "fighters", uid), updates);
            await logAction('edit_fighter', uid, 'Редактировал профиль');
            document.getElementById('editResult').innerHTML = '<span style="color:green;">✅ Сохранено!</span>';
            loadFighters();
            loadStats();
        });

        async function loadFightersForSelect() {
            const snapshot = await getDocs(collection(db, "fighters"));
            const select1 = document.getElementById('fighterSelect1');
            const select2 = document.getElementById('fighterSelect2');
            select1.innerHTML = '<option value="">Выбери победителя</option>';
            select2.innerHTML = '<option value="">Выбери проигравшего</option>';
            snapshot.forEach(doc => {
                const fighter = doc.data();
                const option1 = document.createElement('option');
                option1.value = doc.id;
                option1.textContent = fighter.name || 'Боец';
                const option2 = option1.cloneNode(true);
                select1.appendChild(option1);
                select2.appendChild(option2);
            });
        }

        document.getElementById('addFightBtn').addEventListener('click', async () => {
            const winnerId = document.getElementById('fighterSelect1').value;
            const loserId = document.getElementById('fighterSelect2').value;
            const isFinish = document.getElementById('finishCheckbox').checked;
            if (!winnerId || !loserId) { alert('Выберите обоих бойцов'); return; }
            if (winnerId === loserId) { alert('Нельзя выбрать одного бойца дважды'); return; }
            try {
                const winnerRef = doc(db, "fighters", winnerId);
                const loserRef = doc(db, "fighters", loserId);
                const winnerSnap = await getDoc(winnerRef);
                const loserSnap = await getDoc(loserRef);
                const winnerName = winnerSnap.data()?.name || 'Боец';
                const loserName = loserSnap.data()?.name || 'Боец';
                const sport = winnerSnap.data()?.sport || '—';
                await updateDoc(winnerRef, { wins: increment(1), finishes: increment(isFinish ? 1 : 0), lastFightDate: new Date() });
                await updateDoc(loserRef, { losses: increment(1), lastFightDate: new Date() });
                await addDoc(collection(db, "fights"), { winnerId, winnerName, loserId, loserName, isFinish, sport, date: new Date() });
                await checkAndAwardAchievements(winnerId);
                await checkAndAwardAchievements(loserId);
                await logAction('add_fight', `${winnerId}_${loserId}`, `${winnerName} победил ${loserName}`);
                document.getElementById('fightMessage').innerHTML = '<span style="color:green;">✅ Бой добавлен!</span>';
                loadFighters();
                loadFightersForSelect();
                loadStats();
            } catch (error) { console.error(error); alert('Ошибка: ' + error.message); }
        });

        document.getElementById('recalculateFRSBtn').addEventListener('click', async () => {
            if (!confirm("Пересчитать FRS для всех бойцов?")) return;
            const btn = document.getElementById('recalculateFRSBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Пересчёт...';
            btn.disabled = true;
            try {
                const fightersSnapshot = await getDocs(collection(db, "fighters"));
                const now = Date.now();
                const monthMs = 30 * 24 * 60 * 60 * 1000;
                for (const docSnap of fightersSnapshot.docs) {
                    const f = docSnap.data();
                    const frs = (f.wins || 0) * 100 + (f.finishes || 0) * 50 + ((f.viewsLast30Days || 0) / 100) + ((f.subscribers || 0) / 10) - ((f.lastFightDate ? Math.floor((now - f.lastFightDate.toDate()) / monthMs) : 0) * 25) + (f.premium ? 5 : 0);
                    await updateDoc(doc(db, "fighters", docSnap.id), { frs });
                }
                alert("✅ FRS пересчитан!");
                loadFighters();
                await logAction('recalculate_frs', null, 'Пересчитал FRS');
            } catch (error) { alert("Ошибка: " + error.message); }
            finally { btn.innerHTML = '<i class="fas fa-calculator"></i> Пересчитать FRS'; btn.disabled = false; }
        });

        async function loadChallengesForAdmin() {
            const statusFilter = document.getElementById('challengeStatusFilter').value;
            let q;
            if (statusFilter === 'all') q = query(collection(db, "challenges"), orderBy("createdAt", "desc"));
            else q = query(collection(db, "challenges"), where("status", "==", statusFilter), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            const container = document.getElementById('challengesList');
            if (snapshot.empty) { container.innerHTML = '<div class="challenge-item">Нет вызовов</div>'; return; }
            let html = '';
            snapshot.forEach(docSnap => {
                const c = docSnap.data();
                const date = c.createdAt?.toDate().toLocaleString() || '—';
                html += `<div class="challenge-item">
                    <span><strong>${c.fromName}</strong> → <strong>${c.toName}</strong></span>
                    <span>Статус: ${c.status}</span>
                    <span>${date}</span>
                    <button class="btn btn-warning" onclick="updateChallengeStatusAdmin('${docSnap.id}', 'cancelled')">Отменить</button>
                </div>`;
            });
            container.innerHTML = html;
        }

        window.updateChallengeStatusAdmin = async (challengeId, newStatus) => {
            await updateDoc(doc(db, "challenges", challengeId), { status: newStatus });
            await logAction('update_challenge', challengeId, `Изменил статус вызова на ${newStatus}`);
            loadChallengesForAdmin();
        };

        document.getElementById('clearAllChallengesBtn')?.addEventListener('click', async () => {
            if (!confirm('Удалить ВСЕ вызовы? Это необратимо!')) return;
            const btn = document.getElementById('clearAllChallengesBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Удаление...';
            btn.disabled = true;
    
            try {
            const snapshot = await getDocs(collection(db, "challenges"));
            let deleted = 0;
            for (const docSnap of snapshot.docs) {
            await deleteDoc(doc(db, "challenges", docSnap.id));
            deleted++;
            }
            alert(`✅ Удалено ${deleted} вызовов`);
            await logAction('clear_challenges', null, `Очистил все вызовы (${deleted})`);
            loadChallengesForAdmin();
            loadStats();
        } catch (error) {
            console.error(error);
            alert('Ошибка при удалении: ' + error.message);
        } finally {
            btn.innerHTML = '<i class="fas fa-trash"></i> Очистить все';
            btn.disabled = false;
        }
        });

        async function loadAdminHistory() {
            const adminFilter = document.getElementById('historyAdminFilter').value;
            let q;
            if (adminFilter) q = query(collection(db, "adminLogs"), where("admin", "==", adminFilter), orderBy("timestamp", "desc"), limit(100));
            else q = query(collection(db, "adminLogs"), orderBy("timestamp", "desc"), limit(100));
            const snapshot = await getDocs(q);
            const container = document.getElementById('historyList');
            if (snapshot.empty) { container.innerHTML = '<div class="history-item">Нет записей</div>'; return; }
            let html = '';
            snapshot.forEach(docSnap => {
                const log = docSnap.data();
                const date = log.timestamp?.toDate().toLocaleString() || '—';
                html += `<div class="history-item">
                    <span><strong>${log.admin}</strong></span>
                    <span>${log.action}</span>
                    <span>${log.details || ''}</span>
                    <span>${date}</span>
                </div>`;
            });
            container.innerHTML = html;
        }

        document.getElementById('clearHistoryBtn')?.addEventListener('click', async () => {
        if (!confirm('Удалить ВСЮ историю действий? Это необратимо!')) return;
        const btn = document.getElementById('clearHistoryBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Удаление...';
        btn.disabled = true;
    
        try {
        const snapshot = await getDocs(collection(db, "adminLogs"));
        let deleted = 0;
        for (const docSnap of snapshot.docs) {
            await deleteDoc(doc(db, "adminLogs", docSnap.id));
            deleted++;
        }
        alert(`✅ Удалено ${deleted} записей`);
        await logAction('clear_history', null, `Очистил историю (${deleted})`);
        loadAdminHistory();
        } catch (error) {
        console.error(error);
        alert('Ошибка при удалении: ' + error.message);
        } finally {
        btn.innerHTML = '<i class="fas fa-trash"></i> Очистить историю';
        btn.disabled = false;
        }
        });

        async function sendBroadcast() {
            const target = document.getElementById('broadcastTarget').value;
            const subject = document.getElementById('broadcastSubject').value;
            const message = document.getElementById('broadcastMessage').value;
            if (!subject || !message) { alert('Заполните тему и сообщение'); return; }
            let fightersSnapshot;
            if (target === 'all') fightersSnapshot = await getDocs(collection(db, "fighters"));
            else if (target === 'premium') fightersSnapshot = await getDocs(query(collection(db, "fighters"), where("premium", "==", true)));
            else fightersSnapshot = await getDocs(query(collection(db, "fighters"), where("telegramId", "!=", null)));
            let sent = 0;
            for (const docSnap of fightersSnapshot.docs) {
                const telegramId = docSnap.data().telegramId;
                if (telegramId) {
                    try {
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ chat_id: telegramId, text: `📢 *${subject}*\n\n${message}`, parse_mode: 'Markdown' })
                        });
                        sent++;
                    } catch(e) { console.error(e); }
                }
            }
            await logAction('broadcast', null, `Рассылка "${subject}" отправлена ${sent} пользователям`);
            document.getElementById('broadcastResult').innerHTML = `<span style="color:green;">✅ Отправлено ${sent} сообщений</span>`;
        }

        document.getElementById('refreshChallengesBtn').addEventListener('click', () => loadChallengesForAdmin());
        document.getElementById('refreshHistoryBtn').addEventListener('click', () => loadAdminHistory());
        document.getElementById('sendBroadcastBtn').addEventListener('click', sendBroadcast);
        document.getElementById('searchFighter').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allFighters.filter(f => f.name?.toLowerCase().includes(term) || f.email?.toLowerCase().includes(term));
            renderFighters(filtered);
        });

        document.getElementById('adminLogoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.reload();
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
                if (btn.dataset.tab === 'challenges') loadChallengesForAdmin();
                if (btn.dataset.tab === 'history') loadAdminHistory();
                if (btn.dataset.tab === 'list') loadFighters();
            });
        });

        window.login = async function() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                currentAdminEmail = email;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadStats();
                loadFighters();
                loadFightersForSelect();
                loadFightersForSelectEdit();
            } catch (error) {
                document.getElementById('loginMessage').innerText = "Ошибка входа";
            }
        };

        window.logout = async () => {
            await signOut(auth);
            currentAdminEmail = null;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentAdminEmail = user.email;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadStats();
                loadFighters();
                loadFightersForSelect();
                loadFightersForSelectEdit();
            }
        });
    </script>
</body>
</html>
