<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Твои стили (такие же как были, просто оставь как есть) */
        .admin-container { max-width: 1200px; margin: 2rem auto; padding: 1rem; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .logout-btn { background: #dc2626; color: white; padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; }
        .fighters-list { background: #1f1f1f; border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #333; }
        th { background: #2a2a2a; color: #fbbf24; }
        .points-control { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .points-control button { background: #3b82f6; color: white; border: none; padding: 0.25rem 0.75rem; border-radius: 6px; cursor: pointer; }
        .points-control button.danger { background: #dc2626; }
        .points-control button.edit { background: #fbbf24; color: black; }
        .login-form { background: #1f1f1f; padding: 2rem; border-radius: 12px; max-width: 400px; margin: 3rem auto; text-align: center; }
        .login-form input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; background: #2a2a2a; border: 1px solid #333; color: white; border-radius: 8px; }
        .login-form button { background: #fbbf24; color: black; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 1rem; }
        .hidden { display: none; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        dialog { background: #1f1f1f; border: 1px solid #333; border-radius: 12px; padding: 1.5rem; color: white; }
        dialog input, dialog select { width: 100%; padding: 0.5rem; margin: 0.5rem 0; background: #2a2a2a; border: 1px solid #333; color: white; border-radius: 6px; }
        dialog button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'" style="cursor:pointer">PRO<span>RANK</span></div>
        <nav class="nav-links">
            <a href="index.html">Рейтинг</a>
        </nav>
    </header>

    <div class="admin-container">
        <div id="loginSection" class="login-form">
            <h2>Вход в админку</h2>
            <input type="email" id="adminEmail" placeholder="Email">
            <input type="password" id="adminPassword" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <p id="loginMessage"></p>
        </div>

        <div id="adminPanel" class="hidden">
            <div class="admin-header">
                <h1>Управление рейтингом</h1>
                <input type="text" id="searchFighter" placeholder="🔍 Поиск..." style="width: 300px; padding: 10px; background: #2a2a2a; border: 1px solid #333; color: white; border-radius: 8px;">
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
            <div class="fighters-list">
                <table>
                    <thead><tr><th>Имя</th><th>Спорт</th><th>Город</th><th>Очки</th><th>Управление</th></tr></thead>
                    <tbody id="adminTableBody"><tr><td colspan="5">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <dialog id="editDialog">
        <h3>Редактировать бойца</h3>
        <input id="editName" placeholder="Имя">
        <input id="editCity" placeholder="Город">
        <input id="editWeight" placeholder="Вес">
        <select id="editSport"><option>Бокс</option><option>Борьба</option><option>ММА</option></select>
        <button id="saveEditBtn">Сохранить</button>
        <button id="cancelEditBtn">Отмена</button>
    </dialog>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy, deleteDoc } from "firebase/firestore";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allFighters = [];
        let currentEditId = null;

        window.login = async function() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const message = document.getElementById('loginMessage');
            try {
                await signInWithEmailAndPassword(auth, email, password);
                message.innerText = "Вход выполнен";
                message.className = "success";
                setTimeout(() => {
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('adminPanel').classList.remove('hidden');
                    loadFighters();
                }, 500);
            } catch (error) {
                message.innerText = "Ошибка: " + error.message;
                message.className = "error";
            }
        };

        window.logout = async () => {
            await signOut(auth);
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
        };

        async function loadFighters() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '<tr><td colspan="5">Загрузка...</td></tr>';
            try {
                const q = query(collection(db, "fighters"), orderBy("points", "desc"));
                const snapshot = await getDocs(q);
                allFighters = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderFighters(allFighters);
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5">Ошибка загрузки</td></tr>';
            }
        }

        function renderFighters(fighters) {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';
            fighters.forEach(f => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><strong>${f.name || 'Боец'}</strong><br><small>${f.email || ''}</small></td>
                    <td>${f.sport || '—'}</td>
                    <td>${f.city || '—'}</td>
                    <td id="points-${f.id}">${f.points || 0}</td>
                    <td class="points-control">
                        <button onclick="changePoints('${f.id}', 100)">+100</button>
                        <button onclick="changePoints('${f.id}', 10)">+10</button>
                        <button onclick="changePoints('${f.id}', 1)">+1</button>
                        <button class="danger" onclick="changePoints('${f.id}', -1)">-1</button>
                        <button class="danger" onclick="changePoints('${f.id}', -10)">-10</button>
                        <button class="danger" onclick="changePoints('${f.id}', -100)">-100</button>
                        <button class="edit" onclick="openEditDialog('${f.id}')">✏️</button>
                        <button class="danger" onclick="deleteFighter('${f.id}')">🗑</button>
                    </td>
                `;
            });
        }

        window.changePoints = async (uid, delta) => {
            const oldSpan = document.getElementById(`points-${uid}`);
            if (!oldSpan) return;
            const old = parseInt(oldSpan.innerText);
            const newPoints = old + delta;
            await updateDoc(doc(db, "fighters", uid), { points: newPoints });
            oldSpan.innerText = newPoints;
        };

        window.deleteFighter = async (uid) => {
            if (!confirm("Удалить бойца?")) return;
            await deleteDoc(doc(db, "fighters", uid));
            loadFighters();
        };

        window.openEditDialog = (uid) => {
            const f = allFighters.find(f => f.id === uid);
            if (!f) return;
            currentEditId = uid;
            document.getElementById('editName').value = f.name || '';
            document.getElementById('editCity').value = f.city || '';
            document.getElementById('editWeight').value = f.weight || '';
            document.getElementById('editSport').value = f.sport || 'Бокс';
            document.getElementById('editDialog').showModal();
        };

        document.getElementById('saveEditBtn').onclick = async () => {
            const updates = {
                name: document.getElementById('editName').value,
                city: document.getElementById('editCity').value,
                weight: parseInt(document.getElementById('editWeight').value) || 0,
                sport: document.getElementById('editSport').value
            };
            await updateDoc(doc(db, "fighters", currentEditId), updates);
            document.getElementById('editDialog').close();
            loadFighters();
        };
        document.getElementById('cancelEditBtn').onclick = () => document.getElementById('editDialog').close();

        document.getElementById('searchFighter').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allFighters.filter(f => f.name?.toLowerCase().includes(term) || f.email?.toLowerCase().includes(term));
            renderFighters(filtered);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadFighters();
            }
        });
    </script>
</body>
</html>
