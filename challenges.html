<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои вызовы | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        .challenges-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .challenges-section {
            background: #1a1a1a;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .challenges-section h2 {
            margin-bottom: 1rem;
            color: #fbbf24;
        }
        .challenge-card {
            background: #0f0f0f;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #fbbf24;
        }
        .challenge-card.incoming {
            border-left-color: #fbbf24;
        }
        .challenge-card.outgoing {
            border-left-color: #8b5cf6;
        }
        .challenge-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .challenge-name {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .challenge-status {
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
        }
        .status-pending {
            background: #fbbf24;
            color: #000;
        }
        .status-accepted {
            background: #16a34a;
            color: #fff;
        }
        .status-rejected {
            background: #dc2626;
            color: #fff;
        }
        .challenge-details {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .challenge-message {
            background: #1a1a1a;
            padding: 0.5rem;
            border-radius: 0.5rem;
            margin: 0.5rem 0;
            font-style: italic;
        }
        .challenge-actions {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .btn-accept, .btn-reject, .btn-chat {
            padding: 0.4rem 1rem;
            border-radius: 1.5rem;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-accept {
            background: #16a34a;
            color: white;
        }
        .btn-reject {
            background: #dc2626;
            color: white;
        }
        .btn-chat {
            background: #3b82f6;
            color: white;
        }
        .empty-state {
            text-align: center;
            color: #888;
            padding: 2rem;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #888;
        }
        /* Адаптивная навигация */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #1a1a1a;
            border-bottom: 2px solid #fbbf24;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }
        .logo span {
            color: #fbbf24;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        .nav-links a:hover {
            color: #fbbf24;
        }
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 5px 10px;
        }
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: #1a1a1a;
                padding: 20px;
                gap: 15px;
                z-index: 100;
                border-top: 1px solid #333;
            }
            .nav-links.show {
                display: flex;
            }
            .menu-toggle {
                display: block;
            }
            .challenge-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'" style="cursor:pointer">PRO<span>RANK</span></div>
<div class="balance-indicator" id="balanceIndicator" style="display: none;">
    <span class="balance-icon">🎯</span>
    <span class="balance-count" id="headerChallengesCount">0</span>
    <button class="balance-plus" id="balancePlusBtn" title="Купить вызовы">+</button>
</div>
<button class="menu-toggle" id="menuToggle">☰</button>
        <nav class="nav-links" id="navLinks">
            <a href="index.html">Главная</a>
            <a href="rating.html">Рейтинг</a>
            <a href="leagues.html">Лиги</a>
            <a href="shop.html">Магазин</a>
            <a href="rules.html">Правила</a>
            <a href="login.html" id="profileLoginBtn" class="btn-primary">Войти</a>
        </nav>
    </header>

    <div class="challenges-container">
        <h1>⚔️ Мои вызовы</h1>
        
        <div id="incomingSection" class="challenges-section">
            <h2>📥 Входящие вызовы</h2>
            <div id="incomingList" class="loading">Загрузка...</div>
        </div>

        <div id="outgoingSection" class="challenges-section">
            <h2>📤 Исходящие вызовы</h2>
            <div id="outgoingList" class="loading">Загрузка...</div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="container footer-content">
            <div class="footer-logo"><div class="logo">PRO<span>RANK</span></div><p>Рейтинг любительского спорта</p></div>
            <div class="footer-about"><h4>О проекте</h4><p>Платформа для спортсменов-любителей</p></div>
            <div class="footer-links"><h4>Навигация</h4><a href="index.html">Главная</a><a href="rating.html">Рейтинг</a><a href="login.html">Вход</a></div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 PRORANK</p></div>
    </footer>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, query, where, getDocs, updateDoc, doc, setDoc, getDoc, orderBy } from "firebase/firestore";
    import { getAuth, onAuthStateChanged } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
        authDomain: "proranklive.firebaseapp.com",
        projectId: "proranklive",
        storageBucket: "proranklive.firebasestorage.app",
        messagingSenderId: "716836144015",
        appId: "1:716836144015:web:f1575147750608d0f881fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const BOT_TOKEN = '8527160088:AAGc2311QFkp6F7-Jx5k8MJfqlpvbueSl5E';

    let currentUser = null;

    // Обновление баланса вызовов в шапке
    async function updateHeaderBalance() {
        const user = auth.currentUser;
        const balanceDiv = document.getElementById('balanceIndicator');
        const balanceCount = document.getElementById('headerChallengesCount');
        
        if (!user || !balanceDiv) return;
        
        try {
            const userDoc = await getDoc(doc(db, "fighters", user.uid));
            const data = userDoc.data();
            const free = data.freeChallenges || 0;
            const purchased = data.purchasedChallenges || 0;
            const total = free + purchased;
            // Кнопка "+" в индикаторе вызовов
function setupBalancePlusButton() {
    const plusBtn = document.getElementById('balancePlusBtn');
    if (plusBtn) {
        plusBtn.onclick = () => window.location.href = 'shop.html';
    }
}

// Вызови её после обновления баланса
// Внутри updateHeaderBalance, после того как показали индикатор, добавь:
setupBalancePlusButton();
            balanceCount.innerText = total;
            balanceDiv.style.display = 'flex';
        } catch (err) {
            console.error('Ошибка загрузки баланса:', err);
        }
    }

    async function loadChallenges() {
        if (!currentUser) {
            document.getElementById('incomingList').innerHTML = '<div class="empty-state">🔒 Войдите, чтобы видеть вызовы</div>';
            document.getElementById('outgoingList').innerHTML = '<div class="empty-state">🔒 Войдите, чтобы видеть вызовы</div>';
            return;
        }

        try {
            const incomingQuery = query(
                collection(db, "challenges"),
                where("toUserId", "==", currentUser.uid),
                orderBy("createdAt", "desc")
            );
            
            const outgoingQuery = query(
                collection(db, "challenges"),
                where("fromUserId", "==", currentUser.uid),
                orderBy("createdAt", "desc")
            );

            const [incomingSnap, outgoingSnap] = await Promise.all([
                getDocs(incomingQuery),
                getDocs(outgoingQuery)
            ]);

            renderIncoming(incomingSnap.docs);
            renderOutgoing(outgoingSnap.docs);
        } catch (err) {
            console.error('Ошибка загрузки вызовов:', err);
            document.getElementById('incomingList').innerHTML = '<div class="empty-state">❌ Ошибка загрузки</div>';
            document.getElementById('outgoingList').innerHTML = '<div class="empty-state">❌ Ошибка загрузки</div>';
        }
    }

    function renderIncoming(docs) {
        const container = document.getElementById('incomingList');
        if (docs.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 Нет входящих вызовов</div>';
            return;
        }

        container.innerHTML = '';
        for (const docSnap of docs) {
            const challenge = docSnap.data();
            const challengeId = docSnap.id;
            
            const card = document.createElement('div');
            card.className = 'challenge-card incoming';
            card.innerHTML = `
                <div class="challenge-header">
                    <span class="challenge-name">🥊 ${challenge.fromName || 'Боец'}</span>
                    <span class="challenge-status status-${challenge.status}">${getStatusText(challenge.status)}</span>
                </div>
                <div class="challenge-details">
                    📍 Вес: ${challenge.fromWeight && challenge.fromWeight > 0 ? challenge.fromWeight + ' кг' : 'не указан'}
                </div>
                ${challenge.message ? `<div class="challenge-message">💬 ${escapeHtml(challenge.message)}</div>` : ''}
                ${challenge.status === 'pending' ? `
                    <div class="challenge-actions">
                        <button class="btn-accept" data-id="${challengeId}">✅ Принять</button>
                        <button class="btn-reject" data-id="${challengeId}">❌ Отклонить</button>
                    </div>
                ` : ''}
                ${challenge.status === 'accepted' ? `
                    <div class="challenge-actions">
                        <button class="btn-chat" data-chat-id="${challenge.fromUserId}_${challenge.toUserId}">💬 Перейти в чат</button>
                    </div>
                ` : ''}
            `;
            container.appendChild(card);
        }

        document.querySelectorAll('.btn-accept').forEach(btn => {
            btn.addEventListener('click', () => updateChallengeStatus(btn.dataset.id, 'accepted'));
        });
        document.querySelectorAll('.btn-reject').forEach(btn => {
            btn.addEventListener('click', () => updateChallengeStatus(btn.dataset.id, 'rejected'));
        });
        document.querySelectorAll('.btn-chat').forEach(btn => {
            btn.addEventListener('click', () => {
                window.location.href = `chat.html?id=${btn.dataset.chatId}`;
            });
        });
    }

    function renderOutgoing(docs) {
        const container = document.getElementById('outgoingList');
        if (docs.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 Нет исходящих вызовов</div>';
            return;
        }

        container.innerHTML = '';
        for (const docSnap of docs) {
            const challenge = docSnap.data();
            const chatId = `${challenge.fromUserId}_${challenge.toUserId}`;
            
            const card = document.createElement('div');
            card.className = 'challenge-card outgoing';
            card.innerHTML = `
                <div class="challenge-header">
                    <span class="challenge-name">🎯 ${challenge.toName || 'Соперник'}</span>
                    <span class="challenge-status status-${challenge.status}">${getStatusText(challenge.status)}</span>
                </div>
                <div class="challenge-details">
                    📍 Вес: ${challenge.toWeight && challenge.toWeight > 0 ? challenge.toWeight + ' кг' : 'не указан'}
                </div>
                ${challenge.message ? `<div class="challenge-message">💬 ${escapeHtml(challenge.message)}</div>` : ''}
                ${challenge.status === 'accepted' ? `
                    <div class="challenge-actions">
                        <button class="btn-chat" data-chat-id="${chatId}">💬 Перейти в чат</button>
                    </div>
                ` : ''}
                ${challenge.status === 'rejected' ? '<div class="challenge-details">❌ Соперник отклонил вызов</div>' : ''}
                ${challenge.status === 'pending' ? '<div class="challenge-details">⏳ Ожидает ответа соперника</div>' : ''}
            `;
            container.appendChild(card);
        }
        
        document.querySelectorAll('.btn-chat').forEach(btn => {
            btn.addEventListener('click', () => {
                window.location.href = `chat.html?id=${btn.dataset.chatId}`;
            });
        });
    }

    async function updateChallengeStatus(challengeId, newStatus) {
        try {
            const challengeRef = doc(db, "challenges", challengeId);
            const challengeSnap = await getDoc(challengeRef);
            const challenge = challengeSnap.data();
            
            await updateDoc(challengeRef, {
                status: newStatus,
                updatedAt: new Date()
            });
            
            if (newStatus === 'accepted' && challenge) {
                const chatId = `${challenge.fromUserId}_${challenge.toUserId}`;
                const chatRef = doc(db, "chats", chatId);
                const chatSnap = await getDoc(chatRef);
                
                if (!chatSnap.exists()) {
                    await setDoc(chatRef, {
                        participants: [challenge.fromUserId, challenge.toUserId],
                        participantNames: {
                            [challenge.fromUserId]: challenge.fromName,
                            [challenge.toUserId]: challenge.toName
                        },
                        createdAt: new Date(),
                        lastMessage: "",
                        lastMessageTime: new Date()
                    });
                    console.log("Чат создан:", chatId);
                }
                
                const fromTelegram = challenge.fromTelegramId;
                if (fromTelegram) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: fromTelegram,
                            text: `✅ *ВЫЗОВ ПРИНЯТ!*\n\nБоец *${challenge.toName}* принял твой вызов.\n\n💬 Теперь вы можете общаться в чате на сайте: ${window.location.origin}/chat.html?id=${chatId}`,
                            parse_mode: 'Markdown'
                        })
                    });
                }
            }
            
            alert(`✅ Вызов ${newStatus === 'accepted' ? 'принят' : 'отклонён'}`);
            loadChallenges();
        } catch (err) {
            console.error('Ошибка:', err);
            alert('❌ Ошибка при обновлении статуса');
        }
    }

    function getStatusText(status) {
        const statuses = {
            'pending': '⏳ Ожидает ответа',
            'accepted': '✅ Принят',
            'rejected': '❌ Отклонён'
        };
        return statuses[status] || status;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    const loginBtn = document.getElementById('profileLoginBtn');
    
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        
        if (user && loginBtn) {
            loginBtn.innerText = 'Мой профиль';
            loginBtn.href = `profile.html?id=${user.uid}`;
            loadChallenges();
            setTimeout(updateHeaderBalance, 500);
        } else if (loginBtn) {
            loginBtn.innerText = 'Войти';
            loginBtn.href = 'login.html';
            document.getElementById('incomingList').innerHTML = '<div class="empty-state">🔒 Войдите, чтобы видеть вызовы</div>';
            document.getElementById('outgoingList').innerHTML = '<div class="empty-state">🔒 Войдите, чтобы видеть вызовы</div>';
            const balanceDiv = document.getElementById('balanceIndicator');
            if (balanceDiv) balanceDiv.style.display = 'none';
        }
    });

    // Бургер-меню
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    
    if (menuToggle && navLinks) {
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('show');
        });
    }
</script>
</body>
</html>
