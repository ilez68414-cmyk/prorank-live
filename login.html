<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход и регистрация | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 4rem auto;
            padding: 2rem;
            background: #1f1f1f;
            border-radius: 2rem;
        }
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #ccc;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .tab-btn.active {
            color: #fbbf24;
            border-bottom: 2px solid #fbbf24;
        }
        .auth-form {
            transition: 0.2s;
        }
        .hidden {
            display: none;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 0.75rem;
            background: #2a2a2a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }
        .submit-btn {
            width: 100%;
            background: #fbbf24;
            color: black;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        .message {
            margin-top: 1rem;
            color: #ef4444;
            text-align: center;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'" style="cursor:pointer">PRO<span>RANK</span></div>
        <nav class="nav-links">
            <a href="rating.html">Рейтинг</a>
            <a href="index.html">Главная</a>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-tabs">
            <button id="loginTabBtn" class="tab-btn active">Вход в аккаунт</button>
            <button id="registerTabBtn" class="tab-btn">Регистрация</button>
        </div>

        <div id="loginFormContainer" class="auth-form">
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="submit-btn">Войти</button>
            </form>
            <div id="loginMessage" class="message"></div>
        </div>

        <div id="registerFormContainer" class="auth-form hidden">
            <form id="registrationForm">
                <div class="input-group">
                    <label>Имя Фамилия</label>
                    <input type="text" id="userName" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="userEmail" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="userPassword" required>
                </div>
                <div class="input-group">
                    <label>Город</label>
                    <input type="text" id="userCity" required>
                </div>
                <div class="input-group">
                    <label>Вес (кг)</label>
                    <input type="number" id="userWeight" required>
                </div>
                <div class="input-group">
                    <label>Вид спорта</label>
                    <select id="userSport" required>
                        <option value="">Выберите</option>
                        <option value="Бокс">Бокс</option>
                        <option value="Борьба">Борьба</option>
                        <option value="ММА">ММА</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, setDoc } from "firebase/firestore";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Табы
        const loginTab = document.getElementById('loginTabBtn');
        const registerTab = document.getElementById('registerTabBtn');
        const loginFormDiv = document.getElementById('loginFormContainer');
        const registerFormDiv = document.getElementById('registerFormContainer');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginFormDiv.classList.remove('hidden');
            registerFormDiv.classList.add('hidden');
        });
        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            loginFormDiv.classList.add('hidden');
            registerFormDiv.classList.remove('hidden');
        });

        // Регистрация
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const password = document.getElementById('userPassword').value;
            const city = document.getElementById('userCity').value;
            const weight = document.getElementById('userWeight').value;
            const sport = document.getElementById('userSport').value;

            if (name.split(' ').length < 2) return alert("Введите имя и фамилию");
            if (password.length < 6) return alert("Пароль минимум 6 символов");

            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                await setDoc(doc(db, "fighters", uid), {
                    name, email, city, sport, weight, points: 50, bio: ""
                });
                alert("Регистрация успешна!");
                window.location.href = `profile.html?id=${uid}`;
            } catch (err) {
                alert(err.code === 'auth/email-already-in-use' ? "Email уже занят" : err.message);
            }
        });

        // Вход
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                window.location.href = `profile.html?id=${userCred.user.uid}`;
            } catch (err) {
                document.getElementById('loginMessage').innerText = "Неверный email или пароль";
            }
        });
    </script>
</body>
</html>
