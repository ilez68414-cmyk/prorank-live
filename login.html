<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и регистрация | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 4rem auto;
            padding: 2rem;
            background: #1f1f1f;
            border-radius: 2rem;
        }
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #ccc;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .tab-btn.active {
            color: #fbbf24;
            border-bottom: 2px solid #fbbf24;
        }
        .auth-form {
            transition: 0.2s;
        }
        .hidden {
            display: none;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #aaa;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 0.75rem;
            background: #2a2a2a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }
        .submit-btn {
            width: 100%;
            background: #fbbf24;
            color: black;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        .message {
            margin-top: 1rem;
            color: #ef4444;
            text-align: center;
        }
        .forgot-link {
            text-align: center;
            margin-top: 1rem;
        }
        .forgot-link a {
            color: #fbbf24;
            text-decoration: none;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1f1f1f;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 400px;
        }
        .modal-content input {
            width: 100%;
            padding: 0.75rem;
            margin: 1rem 0;
            background: #2a2a2a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }
        .modal-content button {
            width: 100%;
            background: #fbbf24;
            color: black;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }
        .modal-content button:last-child {
            background: #333;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'" style="cursor:pointer">PRO<span>RANK</span></div>
        <div class="balance-indicator" id="balanceIndicator" style="display: none;">
            <span class="balance-icon">🎯</span>
            <span class="balance-count" id="headerChallengesCount">0</span>
            <button class="balance-plus" id="balancePlusBtn">+</button>
        </div>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <nav class="nav-links" id="navLinks">
            <a href="index.html"><i class="fas fa-home"></i> Главная</a>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-tabs">
            <button id="loginTabBtn" class="tab-btn active">Вход</button>
            <button id="registerTabBtn" class="tab-btn">Регистрация</button>
        </div>

        <div id="loginFormContainer" class="auth-form">
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="submit-btn">Войти</button>
                <div class="forgot-link">
                    <a href="#" id="forgotPasswordLink">Забыли пароль?</a>
                </div>
            </form>
            <div id="loginMessage" class="message"></div>
        </div>

        <div id="registerFormContainer" class="auth-form hidden">
            <form id="registrationForm">
                <div class="input-group">
                    <label>Имя Фамилия</label>
                    <input type="text" id="userName" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="userEmail" required>
                </div>
                <div class="input-group">
                    <label>Пароль (минимум 6 символов)</label>
                    <input type="password" id="userPassword" required>
                </div>
                <div class="input-group">
                    <label>Город</label>
                    <input type="text" id="userCity" required>
                </div>
                <div class="input-group">
                    <label>Весовая категория</label>
                    <select id="userWeightClass" required>
                        <option value="">Выберите категорию</option>
                        <option value="47">Наилегчайшая (до 50 кг)</option>
                        <option value="53">Легчайшая (51–56 кг)</option>
                        <option value="59">Полулёгкая (57–61 кг)</option>
                        <option value="64">Лёгкая (62–66 кг)</option>
                        <option value="69">1-я полусредняя (67–71 кг)</option>
                        <option value="74">Полусредняя (72–77 кг)</option>
                        <option value="80">1-я средняя (78–83 кг)</option>
                        <option value="86">Средняя (84–89 кг)</option>
                        <option value="94">Полутяжёлая (90–99 кг)</option>
                        <option value="110">Тяжёлая (100+ кг)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Вид спорта</label>
                    <select id="userSport" required>
                        <option value="">Выберите</option>
                        <option value="Бокс">Бокс</option>
                        <option value="Борьба">Борьба</option>
                        <option value="ММА">ММА</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <div id="resetModal" class="modal">
        <div class="modal-content">
            <h3>Сброс пароля</h3>
            <input type="email" id="resetEmail" placeholder="Ваш email">
            <button id="sendResetBtn">Отправить письмо</button>
            <button id="closeResetBtn">Отмена</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, setDoc, updateDoc, getDoc } from "firebase/firestore";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Получаем реферальный код из URL
        const urlParams = new URLSearchParams(window.location.search);
        const referrerId = urlParams.get('ref');

        function getWeightClass(weightValue) {
            const weight = parseInt(weightValue);
            if (weight <= 50) return 'Наилегчайшая (45–50 кг)';
            if (weight <= 56) return 'Легчайшая (51–56 кг)';
            if (weight <= 61) return 'Полулёгкая (57–61 кг)';
            if (weight <= 66) return 'Лёгкая (62–66 кг)';
            if (weight <= 71) return '1-я полусредняя (67–71 кг)';
            if (weight <= 77) return 'Полусредняя (72–77 кг)';
            if (weight <= 83) return '1-я средняя (78–83 кг)';
            if (weight <= 89) return 'Средняя (84–89 кг)';
            if (weight <= 99) return 'Полутяжёлая (90–99 кг)';
            return 'Тяжёлая (100+ кг)';
        }

        const loginTab = document.getElementById('loginTabBtn');
        const registerTab = document.getElementById('registerTabBtn');
        const loginFormDiv = document.getElementById('loginFormContainer');
        const registerFormDiv = document.getElementById('registerFormContainer');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginFormDiv.classList.remove('hidden');
            registerFormDiv.classList.add('hidden');
        });
        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            loginFormDiv.classList.add('hidden');
            registerFormDiv.classList.remove('hidden');
        });

        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const password = document.getElementById('userPassword').value;
            const city = document.getElementById('userCity').value;
            const weightClassValue = document.getElementById('userWeightClass').value;
            const sport = document.getElementById('userSport').value;

            if (name.split(' ').length < 2) {
                alert("Введите имя и фамилию");
                return;
            }
            if (password.length < 6) {
                alert("Пароль минимум 6 символов");
                return;
            }

            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                
                await setDoc(doc(db, "fighters", uid), {
                    name, email, city, sport, weightClass: weightClassValue,
                    weight: parseInt(weightClassValue), frs: 50, wins: 0, finishes: 0, 
                    bio: "", avatar: "Avatar.png", subscribers: 0, viewsLast30Days: 0,
                    freeChallenges: 3, purchasedChallenges: 0,
                    referralCount: 0, referralBonus: 0,
                    referredBy: referrerId || null
                });
                
                // Начисляем бонус пригласившему, если есть реферер
                if (referrerId) {
                    const referrerRef = doc(db, "fighters", referrerId);
                    const referrerDoc = await getDoc(referrerRef);
                    if (referrerDoc.exists()) {
                        const currentCount = referrerDoc.data()?.referralCount || 0;
                        const currentBonus = referrerDoc.data()?.referralBonus || 0;
                        const currentFree = referrerDoc.data()?.freeChallenges || 0;
                        
                        await updateDoc(referrerRef, {
                            referralCount: currentCount + 1,
                            referralBonus: currentBonus + 1,
                            freeChallenges: currentFree + 1
                        });
                    }
                }
                
                alert("Регистрация успешна!");
                window.location.href = `profile.html?id=${uid}`;
            } catch (err) {
                if (err.code === 'auth/email-already-in-use') {
                    alert("Этот email уже зарегистрирован");
                } else {
                    alert("Ошибка: " + err.message);
                }
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                window.location.href = `profile.html?id=${userCred.user.uid}`;
            } catch (err) {
                document.getElementById('loginMessage').innerText = "Неверный email или пароль";
            }
        });

        const forgotLink = document.getElementById('forgotPasswordLink');
        const resetModal = document.getElementById('resetModal');
        const sendResetBtn = document.getElementById('sendResetBtn');
        const closeResetBtn = document.getElementById('closeResetBtn');
        const resetEmail = document.getElementById('resetEmail');

        forgotLink?.addEventListener('click', (e) => {
            e.preventDefault();
            resetModal.style.display = 'flex';
        });

        closeResetBtn?.addEventListener('click', () => {
            resetModal.style.display = 'none';
        });

        sendResetBtn?.addEventListener('click', async () => {
            const email = resetEmail.value;
            if (!email) {
                alert("Введите email");
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Письмо для сброса пароля отправлено");
                resetModal.style.display = 'none';
            } catch (error) {
                alert("Ошибка: " + error.message);
            }
        });
    </script>
    <script>
        // Бургер-меню
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        
        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('show');
            });
        }
    </script>
</body>
</html>
