<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/prorank-live/manifest.json">
<link rel="apple-touch-icon" href="/prorank-live/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRORANK">
    <meta name="theme-color" content="#fbbf24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет соединения | PRORANK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .offline-container {
            max-width: 300px;
        }
        .offline-icon {
            font-size: 4rem;
            color: #fbbf24;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 20px; }
        .btn-retry {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h1>Нет соединения</h1>
        <p>Проверьте подключение к интернету и попробуйте снова</p>
        <button class="btn-retry" onclick="location.reload()">
            <i class="fas fa-sync-alt"></i> Повторить
        </button>
    </div>
</body>
</html>
