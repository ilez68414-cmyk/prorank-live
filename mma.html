<!DOCTYPE html>
<html>
<head>
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/prorank-live/manifest.json">
<link rel="apple-touch-icon" href="/prorank-live/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRORANK">
    <meta name="theme-color" content="#fbbf24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
    <script>
        // Определяем вид спорта из имени файла
        const sport = window.location.pathname.split('/').pop().replace('.html', '');
        let sportName = '';
        if (sport === 'mma') sportName = 'ММА';
        else if (sport === 'boxing') sportName = 'Бокс';
        else if (sport === 'wrestling') sportName = 'Борьба';
        
        // Перенаправляем на rating.html с параметром sport
        window.location.href = `rating.html?sport=${sportName}`;
    </script>
</head>
<body>Перенаправление...</body>
</html>
