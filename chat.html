<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Чат | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
            height: 100vh;
            overflow: hidden;
        }

        /* Чат контейнер на весь экран */
        .chat-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            background: rgba(10,10,10,0.6);
            backdrop-filter: blur(4px);
        }

        /* Шапка чата */
        .chat-header {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .back-btn {
            background: rgba(251,191,36,0.1);
            border: 1px solid rgba(251,191,36,0.3);
            color: #fbbf24;
            font-size: 1.2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }
        .back-btn:active {
            transform: scale(0.94);
            background: rgba(251,191,36,0.2);
        }
        .chat-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-header h3 i {
            color: #fbbf24;
        }

        /* Область сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 10px;
        }

        /* Сообщения */
        .message {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.own {
            background: linear-gradient(135deg, #fbbf24, #e5a500);
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            background: #1f1f2a;
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(251,191,36,0.15);
        }
        .message-sender {
            font-size: 0.65rem;
            opacity: 0.8;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .message-time {
            font-size: 0.55rem;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
        }
        .own .message-time {
            color: #000;
        }

        /* Поле ввода */
        .chat-input-area {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(251,191,36,0.15);
            flex-shrink: 0;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 20px;
            background: #1f1f2a;
            border: 1px solid rgba(251,191,36,0.25);
            color: #fff;
            border-radius: 40px;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .chat-input-area input:focus {
            outline: none;
            border-color: #fbbf24;
        }
        .chat-input-area button {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.1s;
        }
        .chat-input-area button:active {
            transform: scale(0.96);
        }

        .empty-chat {
            text-align: center;
            padding: 40px;
            color: #888;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .empty-chat i {
            font-size: 3rem;
            color: #fbbf24;
            opacity: 0.5;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }
            .chat-header {
                padding: 12px 16px;
            }
            .messages-area {
                padding: 16px;
            }
            .chat-input-area {
                padding: 12px 16px;
                gap: 8px;
            }
            .chat-input-area button {
                padding: 0 18px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
            <h3><i class="fas fa-comments"></i> <span id="chatTitle">Загрузка...</span></h3>
        </div>
        <div id="messagesArea" class="messages-area">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка сообщений...</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button id="sendBtn"><i class="fas fa-paper-plane"></i> Отправить</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc, updateDoc } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let chatId = null;
        let unsubscribe = null;

        function goBack() {
            if (document.referrer && document.referrer.includes(window.location.host)) {
                window.history.back();
            } else {
                window.location.href = 'challenges.html';
            }
        }

        async function loadChat() {
            const params = new URLSearchParams(window.location.search);
            chatId = params.get('id');
            
            if (!chatId) {
                document.getElementById('chatTitle').innerText = 'Чат не найден';
                document.querySelector('.chat-input-area').style.display = 'none';
                return;
            }

            const chatRef = doc(db, "chats", chatId);
            const chatSnap = await getDoc(chatRef);
            
            if (!chatSnap.exists()) {
                document.getElementById('chatTitle').innerText = 'Чат не найден';
                document.querySelector('.chat-input-area').style.display = 'none';
                return;
            }
            
            const chatData = chatSnap.data();
            const participants = chatData.participants || [];
            
            if (!currentUser || !participants.includes(currentUser.uid)) {
                document.getElementById('chatTitle').innerText = 'Нет доступа';
                document.querySelector('.chat-input-area').style.display = 'none';
                return;
            }
            
            const otherId = participants.find(id => id !== currentUser.uid);
            const otherName = chatData.participantNames?.[otherId] || 'Соперник';
            document.getElementById('chatTitle').innerHTML = `${otherName}`;
            
            const messagesRef = collection(db, "chats", chatId, "messages");
            const q = query(messagesRef, orderBy("createdAt", "asc"));
            
            if (unsubscribe) unsubscribe();
            unsubscribe = onSnapshot(q, (snapshot) => {
                const messages = [];
                snapshot.forEach(doc => {
                    messages.push({ id: doc.id, ...doc.data() });
                });
                renderMessages(messages);
            });
            
            document.querySelector('.chat-input-area').style.display = 'flex';
        }

        function renderMessages(messages) {
            const container = document.getElementById('messagesArea');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-chat">
                        <i class="fas fa-comment-dots"></i>
                        <div>💬 Напишите первое сообщение!</div>
                        <small style="color:#666;">Обсудите детали спарринга</small>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '';
            messages.forEach(msg => {
                const isOwn = msg.from === currentUser.uid;
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
                
                if (!isOwn && msg.fromName) {
                    const senderDiv = document.createElement('div');
                    senderDiv.className = 'message-sender';
                    senderDiv.innerHTML = `<i class="fas fa-user"></i> ${escapeHtml(msg.fromName)}`;
                    messageDiv.appendChild(senderDiv);
                }
                
                const textDiv = document.createElement('div');
                textDiv.innerText = msg.text;
                messageDiv.appendChild(textDiv);
                
                if (msg.createdAt) {
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'message-time';
                    const date = msg.createdAt.toDate();
                    timeDiv.innerText = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                    messageDiv.appendChild(timeDiv);
                }
                
                container.appendChild(messageDiv);
            });
            
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentUser || !chatId) return;
            
            const userDoc = await getDoc(doc(db, "fighters", currentUser.uid));
            const userName = userDoc.data()?.name || 'Боец';
            
            const messagesRef = collection(db, "chats", chatId, "messages");
            await addDoc(messagesRef, {
                from: currentUser.uid,
                fromName: userName,
                text: text,
                createdAt: new Date()
            });
            
            await updateDoc(doc(db, "chats", chatId), {
                lastMessage: text.substring(0, 100),
                lastMessageTime: new Date()
            });
            
            input.value = '';
            input.focus();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                loadChat();
            } else {
                document.getElementById('chatTitle').innerText = 'Войдите в аккаунт';
                document.querySelector('.chat-input-area').style.display = 'none';
                document.getElementById('messagesArea').innerHTML = '<div class="empty-chat"><i class="fas fa-lock"></i><div>Войдите, чтобы читать чат</div></div>';
            }
        });

        document.getElementById('backBtn').addEventListener('click', goBack);
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
