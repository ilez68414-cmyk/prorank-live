<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRORANK">
    <meta name="theme-color" content="#fbbf24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чат | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
            height: 100vh;
            overflow: hidden;
        }

        .chat-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            background: rgba(10,10,10,0.6);
            backdrop-filter: blur(4px);
        }

        .chat-header {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .back-btn {
            background: rgba(251,191,36,0.1);
            border: 1px solid rgba(251,191,36,0.3);
            color: #fbbf24;
            font-size: 1.2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .back-btn:hover {
            background: rgba(251,191,36,0.2);
            transform: scale(1.05);
        }
        .chat-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-header h3 i {
            color: #fbbf24;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
            touch-action: pan-y;
        }
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            position: relative;
            transition: all 0.2s ease;
            cursor: default;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* Свайп-индикатор */
        .message.swiping {
            transform: translateX(20px);
            background: rgba(251,191,36,0.15);
            border-left: 4px solid #fbbf24;
        }
        
        .message.swiping-reply {
            transform: translateX(0);
            background: rgba(251,191,36,0.08);
            border-left: 4px solid #fbbf24;
        }
        
        .message .reply-hint {
            position: absolute;
            right: -50px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #fbbf24;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .message.swiping .reply-hint {
            opacity: 1;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.own {
            background: linear-gradient(135deg, #fbbf24, #e5a500);
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            background: #1f1f2a;
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(251,191,36,0.15);
        }
        .message-sender {
            font-size: 0.65rem;
            opacity: 0.8;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .message-time {
            font-size: 0.55rem;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
            display: inline-block;
            margin-left: 8px;
        }
        
        .reply-preview {
            background: rgba(0,0,0,0.3);
            border-left: 3px solid #fbbf24;
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 12px;
            font-size: 0.7rem;
        }
        .reply-preview .reply-author {
            color: #fbbf24;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .reply-preview .reply-text {
            color: #aaa;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .reply-indicator {
            background: #1f1f2a;
            border-left: 3px solid #fbbf24;
            padding: 8px 12px;
            margin: 0 20px;
            border-radius: 12px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.2s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cancel-reply {
            background: rgba(220,38,38,0.2);
            border: none;
            color: #dc2626;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .chat-input-area {
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(251,191,36,0.15);
            flex-shrink: 0;
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 20px;
            background: #1f1f2a;
            border: 1px solid rgba(251,191,36,0.25);
            color: #fff;
            border-radius: 40px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s ease;
            min-height: 44px;
        }
        .chat-input-area input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251,191,36,0.1);
        }
        .chat-input-area button {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            min-height: 44px;
        }
        .chat-input-area button:hover {
            background: #ffdd44;
            transform: translateY(-2px);
        }

        .empty-chat {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        @media (max-width: 600px) {
            .message { max-width: 90%; }
            .input-wrapper { padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
            <h3><i class="fas fa-comments"></i> <span id="chatTitle">Загрузка...</span></h3>
        </div>
        <div id="messagesArea" class="messages-area">
            <div class="empty-chat"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>
        </div>
        <div class="chat-input-area">
            <div id="replyIndicator" class="reply-indicator" style="display: none;">
                <div class="reply-info">
                    <div class="reply-author"><i class="fas fa-reply"></i> Ответ для <span id="replyAuthor"></span></div>
                    <div class="reply-text" id="replyText"></div>
                </div>
                <button class="cancel-reply" id="cancelReplyBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Напишите сообщение..." autocomplete="off">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i> Отправить</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc, updateDoc } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let chatId = null;
        let unsubscribe = null;
        let currentReplyTo = null;

        // ===== СВАЙП ДЛЯ ОТВЕТА =====
        let swipeData = {
            element: null,
            startX: 0,
            startY: 0,
            isSwiping: false,
            threshold: 60
        };

        function setupSwipeReply() {
            const messagesArea = document.getElementById('messagesArea');
            
            // Обработка touch-событий (телефон)
            messagesArea.addEventListener('touchstart', (e) => {
                const messageEl = e.target.closest('.message.other');
                if (!messageEl || messageEl.closest('.reply-preview')) return;
                
                const touch = e.touches[0];
                swipeData.element = messageEl;
                swipeData.startX = touch.clientX;
                swipeData.startY = touch.clientY;
                swipeData.isSwiping = false;
            }, { passive: true });

            messagesArea.addEventListener('touchmove', (e) => {
                if (!swipeData.element) return;
                
                const touch = e.touches[0];
                const deltaX = touch.clientX - swipeData.startX;
                const deltaY = touch.clientY - swipeData.startY;
                
                // Если свайп вертикальный - отключаем
                if (Math.abs(deltaY) > 20 && Math.abs(deltaY) > Math.abs(deltaX)) {
                    resetSwipe();
                    return;
                }
                
                if (deltaX > 10) {
                    swipeData.isSwiping = true;
                    const progress = Math.min(deltaX / swipeData.threshold, 1);
                    const translate = progress * 20;
                    swipeData.element.style.transform = `translateX(${translate}px)`;
                    swipeData.element.style.borderLeft = `4px solid rgba(251,191,36,${progress})`;
                    swipeData.element.style.background = `rgba(251,191,36,${progress * 0.12})`;
                    
                    // Показываем стрелку
                    let hint = swipeData.element.querySelector('.reply-hint');
                    if (!hint) {
                        hint = document.createElement('div');
                        hint.className = 'reply-hint';
                        hint.innerHTML = '<i class="fas fa-reply"></i>';
                        swipeData.element.style.position = 'relative';
                        swipeData.element.appendChild(hint);
                    }
                    hint.style.opacity = progress;
                }
            }, { passive: true });

            messagesArea.addEventListener('touchend', (e) => {
                if (!swipeData.element) return;
                
                const touch = e.changedTouches[0];
                const deltaX = touch.clientX - swipeData.startX;
                
                if (swipeData.isSwiping && deltaX > swipeData.threshold) {
                    // Сработал свайп — отвечаем
                    const messageEl = swipeData.element;
                    const messageId = messageEl.dataset.messageId;
                    const messageText = messageEl.dataset.messageText;
                    const messageAuthor = messageEl.dataset.messageAuthor;
                    
                    if (messageId && messageText && messageAuthor) {
                        setReplyTo(messageId, messageText, messageAuthor);
                    }
                }
                
                resetSwipe();
            }, { passive: true });

            // Обработка мыши (компьютер)
            let mouseDownEl = null;
            let mouseStartX = 0;
            
            messagesArea.addEventListener('mousedown', (e) => {
                const messageEl = e.target.closest('.message.other');
                if (!messageEl || messageEl.closest('.reply-preview')) return;
                
                mouseDownEl = messageEl;
                mouseStartX = e.clientX;
                swipeData.element = messageEl;
                swipeData.startX = e.clientX;
                swipeData.startY = e.clientY;
                swipeData.isSwiping = false;
            });

            document.addEventListener('mousemove', (e) => {
                if (!mouseDownEl) return;
                
                const deltaX = e.clientX - mouseStartX;
                if (deltaX > 10) {
                    swipeData.isSwiping = true;
                    const progress = Math.min(deltaX / swipeData.threshold, 1);
                    const translate = progress * 20;
                    mouseDownEl.style.transform = `translateX(${translate}px)`;
                    mouseDownEl.style.borderLeft = `4px solid rgba(251,191,36,${progress})`;
                    mouseDownEl.style.background = `rgba(251,191,36,${progress * 0.12})`;
                    
                    let hint = mouseDownEl.querySelector('.reply-hint');
                    if (!hint) {
                        hint = document.createElement('div');
                        hint.className = 'reply-hint';
                        hint.innerHTML = '<i class="fas fa-reply"></i>';
                        mouseDownEl.style.position = 'relative';
                        mouseDownEl.appendChild(hint);
                    }
                    hint.style.opacity = progress;
                }
            });

            document.addEventListener('mouseup', (e) => {
                if (!mouseDownEl) return;
                
                const deltaX = e.clientX - mouseStartX;
                
                if (swipeData.isSwiping && deltaX > swipeData.threshold) {
                    const messageEl = mouseDownEl;
                    const messageId = messageEl.dataset.messageId;
                    const messageText = messageEl.dataset.messageText;
                    const messageAuthor = messageEl.dataset.messageAuthor;
                    
                    if (messageId && messageText && messageAuthor) {
                        setReplyTo(messageId, messageText, messageAuthor);
                    }
                }
                
                resetSwipe();
                mouseDownEl = null;
            });
        }

        function resetSwipe() {
            if (swipeData.element) {
                swipeData.element.style.transform = '';
                swipeData.element.style.borderLeft = '';
                swipeData.element.style.background = '';
                const hint = swipeData.element.querySelector('.reply-hint');
                if (hint) hint.remove();
            }
            swipeData.element = null;
            swipeData.isSwiping = false;
        }

        function goBack() {
            if (document.referrer && document.referrer.includes(window.location.host)) {
                window.history.back();
            } else {
                window.location.href = 'chats.html';
            }
        }

        function cancelReply() {
            currentReplyTo = null;
            document.getElementById('replyIndicator').style.display = 'none';
            document.getElementById('messageInput').focus();
        }

        function setReplyTo(messageId, messageText, messageAuthor) {
            currentReplyTo = { id: messageId, text: messageText, fromName: messageAuthor };
            document.getElementById('replyAuthor').innerText = messageAuthor;
            document.getElementById('replyText').innerText = messageText.length > 60 ? messageText.substring(0, 57) + '...' : messageText;
            document.getElementById('replyIndicator').style.display = 'flex';
            document.getElementById('messageInput').focus();
            resetSwipe();
        }

        async function loadChat() {
            const params = new URLSearchParams(window.location.search);
            chatId = params.get('id');
            
            if (!chatId) {
                document.getElementById('chatTitle').innerText = 'Чат не найден';
                document.querySelector('.chat-input-area').style.display = 'none';
                return;
            }

            const chatRef = doc(db, "chats", chatId);
            const chatSnap = await getDoc(chatRef);
            
            if (!chatSnap.exists()) {
                document.getElementById('chatTitle').innerText = 'Чат не найден';
                document.querySelector('.chat-input-area').style.display = 'none';
                return;
            }
            
            const chatData = chatSnap.data();
            const participants = chatData.participants || [];
            
            if (!currentUser || !participants.includes(currentUser.uid)) {
                document.getElementById('chatTitle').innerText = 'Нет доступа';
                document.querySelector('.chat-input-area').style.display = 'none';
                document.getElementById('messagesArea').innerHTML = '<div class="empty-chat"><i class="fas fa-lock"></i><div>Нет доступа</div></div>';
                return;
            }
            
            // Обнуляем счётчик непрочитанных
            try {
                const currentCounts = chatData.unreadCounts || {};
                if (currentCounts[currentUser.uid] > 0) {
                    const updateData = {};
                    updateData[`unreadCounts.${currentUser.uid}`] = 0;
                    await updateDoc(chatRef, updateData);
                }
            } catch (err) {
                console.log('Не обнулился счётчик:', err);
            }
            
            const otherId = participants.find(id => id !== currentUser.uid);
            
            if (otherId) {
                let otherName = 'Собеседник';
                if (chatData.participantNames && chatData.participantNames[otherId]) {
                    otherName = chatData.participantNames[otherId];
                } else {
                    try {
                        let userDoc = await getDoc(doc(db, "fighters", otherId));
                        if (userDoc.exists()) {
                            otherName = userDoc.data()?.name || 'Боец';
                        } else {
                            userDoc = await getDoc(doc(db, "partners", otherId));
                            if (userDoc.exists()) otherName = userDoc.data()?.name || 'Продавец';
                        }
                    } catch (err) {}
                }
                document.getElementById('chatTitle').innerHTML = `<i class="fas fa-user"></i> ${otherName}`;
            }
            
            const messagesRef = collection(db, "chats", chatId, "messages");
            const q = query(messagesRef, orderBy("createdAt", "asc"));
            
            if (unsubscribe) unsubscribe();
            unsubscribe = onSnapshot(q, (snapshot) => {
                const container = document.getElementById('messagesArea');
                if (snapshot.empty) {
                    container.innerHTML = '<div class="empty-chat"><i class="fas fa-comment-dots"></i><div>Напишите первое сообщение!</div></div>';
                    return;
                }
                
                let html = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isOwn = msg.from === currentUser?.uid;
                    const senderName = (!isOwn && msg.fromName) ? `<div class="message-sender"><i class="fas fa-user"></i> ${escapeHtml(msg.fromName)}</div>` : '';
                    
                    let replyHtml = '';
                    if (msg.replyTo) {
                        replyHtml = `
                            <div class="reply-preview">
                                <div class="reply-author"><i class="fas fa-reply"></i> Ответ для ${escapeHtml(msg.replyTo.fromName)}</div>
                                <div class="reply-text">${escapeHtml(msg.replyTo.text)}</div>
                            </div>
                        `;
                    }
                    
                    const time = msg.createdAt?.toDate();
                    const timeStr = time ? `${time.getHours().toString().padStart(2,'0')}:${time.getMinutes().toString().padStart(2,'0')}` : '';
                    
                    const messageId = doc.id;
                    const messageText = escapeHtml(msg.text);
                    const messageAuthor = escapeHtml(msg.fromName || 'Соперник');
                    
                    html += `
                        <div class="message ${isOwn ? 'own' : 'other'}" 
                             data-message-id="${messageId}" 
                             data-message-text="${messageText}"
                             data-message-author="${messageAuthor}">
                            ${senderName}
                            ${replyHtml}
                            <div>${messageText}</div>
                            ${timeStr ? `<div class="message-time">${timeStr}</div>` : ''}
                        </div>
                    `;
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
                
                // Добавляем контекстное меню (правый клик)
                document.querySelectorAll('.message.other').forEach(msgEl => {
                    msgEl.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        
                        const existingMenu = document.querySelector('.message-menu');
                        if (existingMenu) existingMenu.remove();
                        
                        const messageId = msgEl.dataset.messageId;
                        const messageText = msgEl.dataset.messageText;
                        const messageAuthor = msgEl.dataset.messageAuthor;
                        
                        const menu = document.createElement('div');
                        menu.className = 'message-menu';
                        menu.style.position = 'fixed';
                        menu.style.top = `${Math.min(e.clientY, window.innerHeight - 100)}px`;
                        menu.style.left = `${Math.min(e.clientX, window.innerWidth - 160)}px`;
                        menu.style.background = '#2a2a35';
                        menu.style.borderRadius = '12px';
                        menu.style.padding = '8px 0';
                        menu.style.minWidth = '150px';
                        menu.style.zIndex = '1000';
                        menu.style.boxShadow = '0 5px 20px rgba(0,0,0,0.3)';
                        menu.style.border = '1px solid rgba(251,191,36,0.2)';
                        menu.style.animation = 'fadeIn 0.1s ease';
                        
                        const replyBtn = document.createElement('button');
                        replyBtn.innerHTML = '<i class="fas fa-reply"></i> Ответить';
                        replyBtn.style.cssText = 'background:none;border:none;color:#fff;padding:10px 16px;width:100%;text-align:left;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;gap:8px;transition:all 0.1s ease;';
                        replyBtn.onmouseover = () => { replyBtn.style.background = 'rgba(251,191,36,0.2)'; replyBtn.style.color = '#fbbf24'; };
                        replyBtn.onmouseout = () => { replyBtn.style.background = 'none'; replyBtn.style.color = '#fff'; };
                        replyBtn.addEventListener('click', () => {
                            setReplyTo(messageId, messageText, messageAuthor);
                            menu.remove();
                        });
                        menu.appendChild(replyBtn);
                        
                        const closeMenu = (event) => {
                            if (!menu.contains(event.target)) {
                                menu.remove();
                                document.removeEventListener('click', closeMenu);
                                document.removeEventListener('contextmenu', closeMenu);
                            }
                        };
                        setTimeout(() => {
                            document.addEventListener('click', closeMenu);
                            document.addEventListener('contextmenu', closeMenu);
                        }, 10);
                        
                        document.body.appendChild(menu);
                    });
                });
            });
            
            document.querySelector('.chat-input-area').style.display = 'flex';
            setupSwipeReply();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentUser || !chatId) return;
            
            let userName = 'Пользователь';
            const fighterDoc = await getDoc(doc(db, "fighters", currentUser.uid));
            if (fighterDoc.exists()) {
                userName = fighterDoc.data()?.name || 'Боец';
            } else {
                const partnerDoc = await getDoc(doc(db, "partners", currentUser.uid));
                if (partnerDoc.exists()) userName = partnerDoc.data()?.name || 'Продавец';
            }
            
            const messagesRef = collection(db, "chats", chatId, "messages");
            const messageData = {
                from: currentUser.uid,
                fromName: userName,
                text: text,
                createdAt: new Date()
            };
            
            if (currentReplyTo) {
                messageData.replyTo = {
                    messageId: currentReplyTo.id,
                    text: currentReplyTo.text.substring(0, 100),
                    fromName: currentReplyTo.fromName
                };
                cancelReply();
            }
            
            await addDoc(messagesRef, messageData);
            
            const chatRef = doc(db, "chats", chatId);
            const chatSnap = await getDoc(chatRef);
            const chatData = chatSnap.data();
            const participants = chatData.participants || [];
            const otherId = participants.find(id => id !== currentUser.uid);
            
            const updateData = {
                lastMessage: text.substring(0, 100),
                lastMessageTime: new Date(),
                lastMessageAuthor: currentUser.uid
            };
            
            if (otherId) {
                const currentCounts = chatData.unreadCounts || {};
                updateData.unreadCounts = {
                    ...currentCounts,
                    [currentUser.uid]: 0,
                    [otherId]: (currentCounts[otherId] || 0) + 1
                };
            }
            
            await updateDoc(chatRef, updateData);
            
            input.value = '';
            input.focus();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                loadChat();
            } else {
                document.getElementById('chatTitle').innerText = 'Войдите';
                document.querySelector('.chat-input-area').style.display = 'none';
                document.getElementById('messagesArea').innerHTML = '<div class="empty-chat"><i class="fas fa-lock"></i><div>Войдите в аккаунт</div></div>';
            }
        });

        document.getElementById('backBtn').addEventListener('click', goBack);
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('cancelReplyBtn').addEventListener('click', cancelReply);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
