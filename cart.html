<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Корзина | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
            min-height: 100vh;
        }
        .gold-top { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b); z-index: 1001; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 2; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
        }
        .logo span { background: linear-gradient(135deg, #fbbf24, #ffdd77); background-clip: text; color: transparent; }
        .menu-toggle { display: none; background: rgba(251,191,36,0.1); border: 1px solid #fbbf24; color: #fbbf24; font-size: 1.6rem; cursor: pointer; padding: 8px 14px; border-radius: 12px; }
        .nav-links {
            display: flex;
            gap: 6px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 60px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .nav-links a { color: #ddd; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 8px 18px; border-radius: 40px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .nav-links a i { margin-right: 8px; color: #fbbf24; }
        .nav-links a:hover { color: #fbbf24; }
        .page-header { text-align: center; padding: 40px 20px 20px; }
        .page-header h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #fff, #fbbf24); background-clip: text; color: transparent; }
        .cart-items { background: rgba(15,15,15,0.7); border-radius: 28px; padding: 20px; margin: 20px 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; gap: 12px; }
        .cart-item:last-child { border-bottom: none; }
        .btn-remove { background: #dc2626; color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        .cart-total { background: linear-gradient(135deg, #fbbf24, #e5a500); color: #000; border-radius: 28px; padding: 20px; text-align: center; margin: 20px 0; }
        .cart-total strong { font-size: 1.3rem; }
        .btn-checkout { background: #16a34a; color: white; width: 100%; padding: 16px; border-radius: 60px; font-weight: 700; font-size: 1rem; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .empty-state { text-align: center; padding: 60px; color: #888; }
        .main-footer { background: #0a0a0a; border-top: 1px solid rgba(251,191,36,0.15); margin-top: 60px; padding: 40px 0 24px; }
        .footer-content { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 32px; }
        .footer-bottom { text-align: center; margin-top: 32px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.65rem; color: #555; }
        @media (max-width: 768px) {
            .navbar { padding: 12px 18px; }
            .menu-toggle { display: block; }
            .nav-links { display: none; flex-direction: column; position: absolute; top: 68px; left: 18px; right: 18px; background: #0f0f0f; border-radius: 24px; padding: 20px; gap: 10px; border: 1px solid rgba(251,191,36,0.3); z-index: 1000; }
            .nav-links.show { display: flex; }
            .nav-links a { width: 100%; text-align: center; padding: 12px; }
            .container { padding: 0 16px; }
            .footer-content { flex-direction: column; text-align: center; }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        .icon-gold { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="gold-top"></div>

    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'">PRO<span>RANK</span></div>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <nav class="nav-links" id="navLinks">
            <a href="index.html"><i class="fas fa-home"></i> Главная</a>
            <a href="rating.html"><i class="fas fa-chart-line"></i> Рейтинг</a>
            <a href="leagues.html"><i class="fas fa-trophy"></i> Лиги</a>
            <a href="rules.html"><i class="fas fa-book"></i> Правила</a>
            <a href="shop.html"><i class="fas fa-store"></i> Магазин</a>
            <a href="challenges.html"><i class="fas fa-fist-raised"></i> Вызовы</a>
            <a href="cart.html"><i class="fas fa-shopping-cart"></i> Корзина</a>
            <a href="login.html" id="profileLoginBtn"><i class="fas fa-sign-in-alt"></i> Войти</a>
        </nav>
    </header>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-shopping-cart"></i> Корзина</h1>
        </div>
        <div id="cartItems" class="cart-items"><div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div></div>
        <div id="cartTotal" class="cart-total" style="display: none;"></div>
        <button id="checkoutBtn" class="btn-checkout" style="display: none;"><i class="fas fa-credit-card"></i> Оформить заказ</button>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo"><div class="logo">PRO<span>RANK</span></div><p>Рейтинг любительского спорта</p></div>
                <div class="footer-about"><h4>О проекте</h4><p>Платформа для спортсменов-любителей</p></div>
                <div class="footer-links"><h4>Навигация</h4><a href="index.html">Главная</a><a href="rating.html">Рейтинг</a><a href="login.html">Вход</a></div>
            </div>
            <div class="footer-bottom"><p>&copy; 2026 PRORANK</p></div>
        </div>
    </footer>
<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
        }
    }
</script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, addDoc, collection, doc, getDoc, serverTimestamp } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUser = null;

        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const container = document.getElementById('cartItems');
            const totalDiv = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-cart"></i><p>Корзина пуста</p><p><a href="equipment.html" style="color:#fbbf24;">Перейти в каталог →</a></p></div>';
                totalDiv.style.display = 'none';
                checkoutBtn.style.display = 'none';
                return;
            }
            
            let html = '';
            let total = 0;
            cart.forEach((item, idx) => {
                total += item.price;
                html += `
                    <div class="cart-item">
                        <div><strong>${escapeHtml(item.name)}</strong><br><small>${item.price} ₽</small></div>
                        <button class="btn-remove" data-index="${idx}"><i class="fas fa-trash"></i> Удалить</button>
                    </div>
                `;
            });
            container.innerHTML = html;
            totalDiv.style.display = 'block';
            totalDiv.innerHTML = `<strong>Итого: ${total} ₽</strong><br><small>Комиссия PRORANK: ${Math.floor(total * 0.1)} ₽ (10%)</small>`;
            checkoutBtn.style.display = 'block';
            
            document.querySelectorAll('.btn-remove').forEach(btn => {
                btn.addEventListener('click', () => {
                    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
                    cart.splice(parseInt(btn.dataset.index), 1);
                    localStorage.setItem('cart', JSON.stringify(cart));
                    loadCart();
                });
            });
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        document.getElementById('checkoutBtn')?.addEventListener('click', async () => {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) { alert('Корзина пуста'); return; }
            if (!currentUser) { alert('Войдите в аккаунт для оформления заказа'); window.location.href = 'login.html'; return; }
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            alert(`🔧 Демо-режим: Оформление заказа на сумму ${total} ₽\nКомиссия PRORANK: ${Math.floor(total * 0.1)} ₽\n\nПосле подключения ЮKassa здесь будет переход на оплату.`);
            
            for (const item of cart) {
                await addDoc(collection(db, "orders"), {
                    userId: currentUser.uid,
                    productName: item.name,
                    price: item.price,
                    status: 'pending',
                    createdAt: serverTimestamp()
                });
            }
            localStorage.removeItem('cart');
            alert('✅ Заказ оформлен!');
            loadCart();
        });

        onAuthStateChanged(auth, (user) => { 
            currentUser = user; 
            const loginBtn = document.getElementById('profileLoginBtn');
            if (user && loginBtn) { loginBtn.innerHTML = '<i class="fas fa-user"></i> Мой профиль'; loginBtn.href = `profile.html?id=${user.uid}`; }
            else if (loginBtn) { loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти'; loginBtn.href = 'login.html'; }
            loadCart(); 
        });

        document.getElementById('menuToggle')?.addEventListener('click', () => document.getElementById('navLinks')?.classList.toggle('show'));
    </script>
</body>
</html>
