<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRORANK">
    <meta name="theme-color" content="#fbbf24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fbbf24">
    <meta name="description" content="Корзина PRORANK — оформление заказов на экипировку и товары">
    <title>Корзина | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        main { flex: 1; }
        
        .gold-top { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 3px; 
            background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b); 
            z-index: 1001; 
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 24px; 
            position: relative; 
            z-index: 2;
            width: 100%;
        }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
            transition: transform 0.2s ease;
        }
        
        .logo:hover { transform: scale(1.02); }
        .logo span { background: linear-gradient(135deg, #fbbf24, #ffdd77); background-clip: text; color: transparent; }
        
        .balance-indicator {
            background: #111;
            border: 1px solid rgba(251,191,36,0.5);
            border-radius: 60px;
            padding: 7px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        
        .balance-indicator:hover {
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251,191,36,0.2);
        }
        
        .balance-count { color: #fbbf24; font-size: 1.1rem; }
        
        .balance-plus {
            background: rgba(251,191,36,0.15);
            border: none;
            color: #fbbf24;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        
        .balance-plus:hover {
            background: rgba(251,191,36,0.3);
            transform: scale(1.05);
        }
        
        .balance-plus:active { 
            background: #fbbf24; 
            color: #000;
            transform: scale(0.94);
        }
        
        .menu-toggle { 
            display: none; 
            background: rgba(251,191,36,0.1); 
            border: 1px solid #fbbf24; 
            color: #fbbf24; 
            font-size: 1.6rem; 
            cursor: pointer; 
            padding: 8px 14px; 
            border-radius: 12px;
            transition: all 0.2s ease;
            min-height: 44px;
            min-width: 44px;
        }
        
        .menu-toggle:hover {
            background: rgba(251,191,36,0.2);
            transform: scale(1.02);
        }
        
        .menu-toggle:active { transform: scale(0.95); }
        
        .nav-links {
            display: flex;
            gap: 6px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 60px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        
        .nav-links a { 
            color: #ddd; 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 500; 
            padding: 8px 18px; 
            border-radius: 40px; 
            transition: all 0.2s ease;
        }
        
        .nav-links a i { margin-right: 8px; color: #fbbf24; transition: transform 0.2s ease; }
        .nav-links a:hover { color: #fbbf24; background: rgba(251,191,36,0.1); transform: translateY(-2px); }
        .nav-links a:hover i { transform: scale(1.1); }
        
        .breadcrumb {
            margin: 20px 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.85rem;
        }
        
        .breadcrumb a {
            color: #aaa;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        
        .breadcrumb a:hover { color: #fbbf24; transform: translateX(2px); }
        .breadcrumb span { color: #fbbf24; }
        
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(251,191,36,0.3);
            color: #fff;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            min-height: 38px;
        }
        
        .back-btn:hover {
            background: rgba(251,191,36,0.2);
            color: #fbbf24;
            transform: translateX(-2px);
        }
        
        .back-btn:active { transform: translateX(-1px) scale(0.97); }
        
        .page-header {
            text-align: center;
            padding: 20px 20px 20px;
            animation: fadeInUp 0.5s ease;
        }
        
        .page-header h1 { 
            font-size: clamp(1.5rem, 5vw, 1.8rem); 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff, #fbbf24); 
            background-clip: text; 
            color: transparent; 
        }
        
        .cart-items {
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px;
            margin: 20px 0;
            transition: all 0.3s ease;
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 16px;
            transition: all 0.2s ease;
        }
        
        .cart-item:hover {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            transform: translateX(3px);
        }
        
        .cart-item:last-child { border-bottom: none; }
        
        .cart-item-image {
            width: 70px;
            height: 70px;
            min-width: 70px;
            border-radius: 12px;
            object-fit: cover;
            background: #1a1a1a;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }
        
        .cart-item-price {
            color: #fbbf24;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .quantity-btn {
            background: rgba(251,191,36,0.15);
            border: 1px solid rgba(251,191,36,0.3);
            color: #fbbf24;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        
        .quantity-btn:hover {
            background: rgba(251,191,36,0.3);
            transform: scale(1.05);
        }
        
        .quantity-btn:active { transform: scale(0.95); }
        
        .item-count {
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }
        
        .btn-remove {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            min-height: 36px;
        }
        
        .btn-remove:hover {
            background: #ef4444;
            transform: translateY(-2px);
        }
        
        .btn-remove:active { transform: scale(0.96); }
        
        .cart-total {
            background: linear-gradient(135deg, #fbbf24, #e5a500);
            color: #000;
            border-radius: 28px;
            padding: 24px;
            margin: 20px 0;
            text-align: center;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease 0.1s both;
        }
        
        .cart-total:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(251,191,36,0.2);
        }
        
        .cart-total .total-amount {
            font-size: 2rem;
            font-weight: 800;
        }
        
        .cart-total .commission {
            font-size: 0.8rem;
            margin-top: 8px;
            opacity: 0.8;
        }
        
        .btn-checkout {
            background: #16a34a;
            color: white;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            min-height: 56px;
            animation: fadeInUp 0.5s ease 0.2s both;
        }
        
        .btn-checkout:hover {
            background: #15803d;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(22,163,74,0.3);
        }
        
        .btn-checkout:active { transform: scale(0.97); }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #888;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            color: #555;
        }
        
        .empty-state a {
            color: #fbbf24;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        
        .empty-state a:hover {
            text-decoration: underline;
            transform: translateX(2px);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }
        
        .modal-content {
            background: #151515;
            border-radius: 28px;
            padding: 28px;
            width: 90%;
            max-width: 480px;
            border: 1px solid rgba(251,191,36,0.3);
            animation: slideUp 0.3s ease;
        }
        
        .modal-content h3 {
            color: #fbbf24;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #aaa;
            font-size: 0.8rem;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid rgba(251,191,36,0.25);
            color: #fff;
            border-radius: 40px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251,191,36,0.2);
        }
        
        .form-group textarea {
            border-radius: 20px;
            resize: vertical;
        }
        
        .payment-options {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        
        .payment-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #1a1a1a;
            padding: 12px 20px;
            border-radius: 40px;
            border: 1px solid rgba(251,191,36,0.25);
            transition: all 0.2s;
        }
        
        .payment-option:hover {
            border-color: rgba(251,191,36,0.5);
            background: #222;
        }
        
        .payment-option.selected {
            border-color: #fbbf24;
            background: rgba(251,191,36,0.1);
        }
        
        .payment-option input {
            width: auto;
            margin: 0;
            padding: 0;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            min-height: 48px;
        }
        
        .btn-submit { 
            background: #fbbf24; 
            color: #000;
        }
        
        .btn-submit:hover {
            background: #ffdd44;
            transform: translateY(-2px);
        }
        
        .btn-cancel { 
            background: #333; 
            color: #fff;
        }
        
        .btn-cancel:hover {
            background: #444;
            transform: translateY(-2px);
        }
        
        .main-footer {
            background: #0a0a0a;
            border-top: 1px solid rgba(251,191,36,0.15);
            margin-top: 60px;
            padding: 40px 0 24px;
        }
        
        .footer-inner { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 32px; 
            margin-bottom: 32px; 
        }
        
        .footer-logo .logo { font-size: 1.3rem; display: inline-block; }
        .footer-logo p { font-size: 0.7rem; color: #777; margin-top: 6px; }
        .footer-social { display: flex; gap: 20px; }
        
        .social-icon { 
            color: #aaa; 
            font-size: 1.3rem; 
            transition: all 0.2s ease;
        }
        
        .social-icon:hover { 
            color: #fbbf24;
            transform: translateY(-3px);
        }
        
        .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
        .footer-links a { color: #888; text-decoration: none; font-size: 0.75rem; transition: color 0.2s ease; }
        .footer-links a:hover { color: #fbbf24; }
        .footer-bottom { text-align: center; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.65rem; color: #555; }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .navbar { padding: 12px 18px; }
            .menu-toggle { display: block; }
            .nav-links { 
                display: none; 
                flex-direction: column; 
                position: absolute; 
                top: 68px; 
                left: 18px; 
                right: 18px; 
                background: #0f0f0f; 
                border-radius: 24px; 
                padding: 20px; 
                gap: 10px; 
                border: 1px solid rgba(251,191,36,0.3); 
                z-index: 1000;
                backdrop-filter: blur(20px);
            }
            .nav-links.show { display: flex; animation: fadeIn 0.2s ease; }
            .nav-links a { width: 100%; text-align: center; padding: 12px; }
            .container { padding: 0 16px; }
            .cart-item { flex-direction: column; text-align: center; }
            .cart-item-image { width: 80px; height: 80px; }
            .cart-item-actions { justify-content: center; }
            .payment-options { justify-content: center; }
            .footer-inner { flex-direction: column; text-align: center; }
            .breadcrumb { justify-content: center; }
        }
        
        @media (max-width: 480px) {
            .cart-total .total-amount { font-size: 1.5rem; }
            .btn-checkout { padding: 14px; font-size: 0.9rem; }
            .quantity-btn { width: 30px; height: 30px; }
            .btn-remove { padding: 6px 12px; font-size: 0.7rem; }
            .cart-item-image { width: 60px; height: 60px; }
            .payment-option { padding: 8px 16px; font-size: 0.8rem; }
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        .icon-gold { color: #fbbf24; }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(251,191,36,0.3);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="gold-top"></div>

    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'">PRO<span>RANK</span></div>
        <div class="balance-indicator" id="balanceIndicator" style="display: none;">
            <i class="fas fa-crosshairs"></i>
            <span class="balance-count" id="headerChallengesCount">0</span>
            <button class="balance-plus" id="balancePlusBtn">+</button>
        </div>
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <nav class="nav-links" id="navLinks"></nav>
    </header>

    <main class="container">
        <div class="breadcrumb">
            <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Назад</button>
            <span>/</span>
            <a href="catalog.html">Каталог</a>
            <span>/</span>
            <span>Корзина</span>
        </div>

        <div class="page-header">
            <h1><i class="fas fa-shopping-cart"></i> Корзина</h1>
        </div>

        <div id="cartItems" class="cart-items"><div class="empty-state"><div class="loading-spinner"></div> Загрузка...</div></div>
        <div id="cartTotal" class="cart-total" style="display: none;"></div>
        <button id="checkoutBtn" class="btn-checkout" style="display: none;"><i class="fas fa-credit-card"></i> Оформить заказ</button>
    </main>

    <!-- Модалка оформления заказа -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-truck"></i> Оформление заказа</h3>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Ваше имя *</label>
                <input type="text" id="orderName" placeholder="Иван Иванов">
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Телефон *</label>
                <input type="tel" id="orderPhone" placeholder="+7 999 123-45-67">
            </div>
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Адрес доставки *</label>
                <textarea id="orderAddress" rows="2" placeholder="Город, улица, дом, квартира"></textarea>
            </div>
            <div class="form-group">
                <label><i class="fas fa-comment"></i> Комментарий к заказу</label>
                <textarea id="orderComment" rows="2" placeholder="Пожелания по доставке..."></textarea>
            </div>
            <div class="form-group">
                <label><i class="fas fa-credit-card"></i> Способ оплаты</label>
                <div class="payment-options">
                    <label class="payment-option selected">
                        <input type="radio" name="paymentMethod" value="balance" checked> 💳 С баланса
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="paymentMethod" value="card"> 💰 Банковской картой
                    </label>
                </div>
            </div>
            <div class="modal-buttons">
                <button id="submitOrderBtn" class="btn-submit"><i class="fas fa-check"></i> Подтвердить</button>
                <button id="cancelOrderBtn" class="btn-cancel"><i class="fas fa-times"></i> Отмена</button>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-logo">
                    <div class="logo">PRO<span>RANK</span></div>
                    <p>Рейтинг спортсменов-любителей</p>
                </div>
                <div class="footer-social">
                    <a href="#" target="_blank" class="social-icon"><i class="fab fa-telegram"></i></a>
                    <a href="#" target="_blank" class="social-icon"><i class="fab fa-vk"></i></a>
                    <a href="#" target="_blank" class="social-icon"><i class="fab fa-youtube"></i></a>
                    <a href="#" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
                </div>
                <div class="footer-links">
                    <a href="about.html">О проекте</a>
                    <a href="privacy.html">Конфиденциальность</a>
                    <a href="disclaimer.html">Дисклеймер</a>
                    <a href="rules.html">Правила</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 PRORANK. Все права защищены.</p>
            </div>
        </div>
    </footer>
 <!-- Нижнее мобильное меню -->
<div id="mobileBottomNavContainer"></div>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module" src="header.js"></script>
    <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged } from "firebase/auth";
    import { getFirestore, addDoc, collection, doc, getDoc, serverTimestamp } from "firebase/firestore";

    const firebaseConfig = {
        apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
        authDomain: "proranklive.firebaseapp.com",
        projectId: "proranklive",
        storageBucket: "proranklive.firebasestorage.app",
        messagingSenderId: "716836144015",
        appId: "1:716836144015:web:f1575147750608d0f881fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentUser = null;
    let currentUserData = null;

    async function updateHeaderBalance() {
        const user = auth.currentUser;
        const balanceDiv = document.getElementById('balanceIndicator');
        const balanceCount = document.getElementById('headerChallengesCount');
        if (!user || !balanceDiv) return;
        try {
            const userDoc = await getDoc(doc(db, "fighters", user.uid));
            const data = userDoc.data();
            const total = (data.freeChallenges || 0) + (data.purchasedChallenges || 0);
            balanceCount.innerText = total;
            balanceDiv.style.display = 'flex';
        } catch (err) { 
            console.error(err);
            balanceDiv.style.display = 'none';
        }
    }

    function loadCart() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const container = document.getElementById('cartItems');
        const totalDiv = document.getElementById('cartTotal');
        const checkoutBtn = document.getElementById('checkoutBtn');
        
        if (cart.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-cart"></i><p>Корзина пуста</p><p><a href="catalog.html">Перейти в каталог →</a></p></div>';
            totalDiv.style.display = 'none';
            checkoutBtn.style.display = 'none';
            return;
        }
        
        // Группировка одинаковых товаров
        const grouped = {};
        cart.forEach(item => {
            const key = item.id;
            if (grouped[key]) {
                grouped[key].quantity++;
            } else {
                grouped[key] = { ...item, quantity: 1 };
            }
        });
        
        let html = '';
        let total = 0;
        const items = Object.values(grouped);
        
        items.forEach((item, idx) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            const imageUrl = item.image || 'https://placehold.co/300x200/1a1a1a/fbbf24?text=No+Image';
            
            html += `
                <div class="cart-item" data-idx="${idx}" data-item-id="${item.id}">
                    <img src="${imageUrl}" class="cart-item-image" onerror="this.src='https://placehold.co/300x200/1a1a1a/fbbf24?text=No+Image'">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${escapeHtml(item.name)}</div>
                        <div class="cart-item-price">${item.price.toLocaleString()} ₽</div>
                        ${item.partnerName ? `<div style="font-size: 0.65rem; color: #fbbf24;"><i class="fas fa-store"></i> ${escapeHtml(item.partnerName)}</div>` : ''}
                    </div>
                    <div class="cart-item-actions">
                        <div class="item-quantity">
                            <button class="quantity-btn dec" data-idx="${idx}">-</button>
                            <span class="item-count">${item.quantity}</span>
                            <button class="quantity-btn inc" data-idx="${idx}">+</button>
                        </div>
                        <button class="btn-remove" data-idx="${idx}"><i class="fas fa-trash"></i> Удалить</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        totalDiv.style.display = 'block';
        const commission = Math.floor(total * 0.1);
        totalDiv.innerHTML = `
            <div class="total-amount">${total.toLocaleString()} ₽</div>
            <div class="commission">Комиссия PRORANK (10%): ${commission.toLocaleString()} ₽</div>
            <div style="margin-top: 8px; font-size: 0.9rem;">💰 Продавец получит: ${(total - commission).toLocaleString()} ₽</div>
        `;
        checkoutBtn.style.display = 'block';
        
        // Обработчики кнопок
        document.querySelectorAll('.quantity-btn.dec').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.idx);
                let cart = JSON.parse(localStorage.getItem('cart') || '[]');
                const itemId = document.querySelector(`.cart-item[data-idx="${idx}"]`).dataset.itemId;
                const itemIndex = cart.findIndex(i => i.id === itemId);
                if (itemIndex !== -1) {
                    cart.splice(itemIndex, 1);
                    localStorage.setItem('cart', JSON.stringify(cart));
                    loadCart();
                }
            });
        });
        document.querySelectorAll('.quantity-btn.inc').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.idx);
                let cart = JSON.parse(localStorage.getItem('cart') || '[]');
                const itemId = document.querySelector(`.cart-item[data-idx="${idx}"]`).dataset.itemId;
                const itemIndex = cart.findIndex(i => i.id === itemId);
                if (itemIndex !== -1) {
                    const newItem = { ...cart[itemIndex] };
                    cart.push(newItem);
                    localStorage.setItem('cart', JSON.stringify(cart));
                    loadCart();
                }
            });
        });
        document.querySelectorAll('.btn-remove').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.idx);
                let cart = JSON.parse(localStorage.getItem('cart') || '[]');
                const itemId = document.querySelector(`.cart-item[data-idx="${idx}"]`).dataset.itemId;
                cart = cart.filter(i => i.id !== itemId);
                localStorage.setItem('cart', JSON.stringify(cart));
                loadCart();
            });
        });
    }

    function escapeHtml(str) { 
        if (!str) return ''; 
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); 
    }

    function updatePaymentMethodUI() {
        const options = document.querySelectorAll('.payment-option');
        options.forEach(opt => {
            const radio = opt.querySelector('input');
            opt.classList.toggle('selected', radio.checked);
        });
    }

    const modal = document.getElementById('checkoutModal');
    const checkoutBtn = document.getElementById('checkoutBtn');

    checkoutBtn?.addEventListener('click', () => {
        if (!currentUser) {
            alert('Войдите в аккаунт для оформления заказа');
            window.location.href = 'login.html';
            return;
        }
        if (currentUserData) {
            document.getElementById('orderName').value = currentUserData.name || '';
            document.getElementById('orderPhone').value = currentUserData.phone || '';
        }
        updatePaymentMethodUI();
        modal.style.display = 'flex';
    });

    document.querySelectorAll('.payment-option').forEach(opt => {
        opt.addEventListener('click', () => {
            const radio = opt.querySelector('input');
            radio.checked = true;
            updatePaymentMethodUI();
        });
    });

    document.getElementById('submitOrderBtn')?.addEventListener('click', async () => {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        if (cart.length === 0) { alert('Корзина пуста'); modal.style.display = 'none'; return; }
        
        const orderName = document.getElementById('orderName').value.trim();
        const orderPhone = document.getElementById('orderPhone').value.trim();
        const orderAddress = document.getElementById('orderAddress').value.trim();
        const orderComment = document.getElementById('orderComment').value.trim();
        const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked')?.value || 'card';
        
        if (!orderName || !orderPhone || !orderAddress) {
            alert('Заполните все обязательные поля');
            return;
        }
        
        const btn = document.getElementById('submitOrderBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<div class="loading-spinner"></div> Оформление...';
        btn.disabled = true;
        
        try {
            // Группируем товары
            const grouped = {};
            cart.forEach(item => {
                const key = item.id;
                if (grouped[key]) {
                    grouped[key].quantity++;
                } else {
                    grouped[key] = { ...item, quantity: 1 };
                }
            });
            
            // ✅ ВАЖНО: Сохраняем partnerId для каждого товара
            const itemsList = Object.values(grouped).map(item => ({
                productId: item.id,
                productName: item.name,
                price: item.price,
                quantity: item.quantity,
                totalPrice: item.price * item.quantity,
                partnerId: item.partnerId || null,      // ← КЛЮЧЕВОЕ ПОЛЕ!
                partnerName: item.partnerName || null,
                image: item.image || null
            }));
            
            const totalPrice = itemsList.reduce((sum, item) => sum + item.totalPrice, 0);
            // Собираем уникальных продавцов в заказе
            const uniquePartnerIds = [...new Set(itemsList.map(item => item.partnerId).filter(id => id && id !== 'null'))];
            
            console.log('📦 Создание заказа:', { itemsList, uniquePartnerIds, totalPrice });
            
            if (paymentMethod === 'balance') {
                const { hasSufficientBalance, deductFunds, holdFunds } = await import('./wallet.js');
                
                const hasBalance = await hasSufficientBalance(currentUser.uid, totalPrice);
                if (!hasBalance) {
                    alert('❌ Недостаточно средств на балансе. Пополните баланс или выберите оплату картой.');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }
                
                // Создаём заказ со статусом "paid"
                const orderRef = await addDoc(collection(db, "orders"), {
                    userId: currentUser.uid,
                    userName: orderName,
                    userPhone: orderPhone,
                    userAddress: orderAddress,
                    userComment: orderComment,
                    items: itemsList,
                    partnerIds: uniquePartnerIds,
                    totalPrice: totalPrice,
                    commission: Math.floor(totalPrice * 0.1),
                    paymentMethod: 'balance',
                    status: 'paid',
                    createdAt: serverTimestamp()
                });
                
                // Списание с баланса покупателя
                await deductFunds(currentUser.uid, totalPrice, orderRef.id);
                // Заморозка средств (холд)
                await holdFunds(currentUser.uid, totalPrice, orderRef.id);
                
                localStorage.removeItem('cart');
                alert('✅ Заказ оформлен! Средства заморожены до получения товара.');
                
            } else {
                // Оплата картой
                await addDoc(collection(db, "orders"), {
                    userId: currentUser.uid,
                    userName: orderName,
                    userPhone: orderPhone,
                    userAddress: orderAddress,
                    userComment: orderComment,
                    items: itemsList,
                    partnerIds: uniquePartnerIds,
                    totalPrice: totalPrice,
                    commission: Math.floor(totalPrice * 0.1),
                    paymentMethod: 'card',
                    status: 'paid',
                    createdAt: serverTimestamp()
                });
                
                localStorage.removeItem('cart');
                alert('✅ Заказ оформлен! Продавец скоро свяжется с вами.');
            }
            
            modal.style.display = 'none';
            loadCart();
            
        } catch (err) {
            console.error('Ошибка:', err);
            alert('❌ Ошибка при оформлении заказа. Попробуйте позже.');
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    });

    document.getElementById('cancelOrderBtn')?.addEventListener('click', () => {
        modal.style.display = 'none';
    });
    
    window.addEventListener('click', (e) => {
        if (e.target === modal) modal.style.display = 'none';
    });

    document.getElementById('backBtn')?.addEventListener('click', () => {
        window.history.back();
    });

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            const userDoc = await getDoc(doc(db, "fighters", user.uid));
            currentUserData = userDoc.data();
            setTimeout(updateHeaderBalance, 1000);
        } else {
            const balanceDiv = document.getElementById('balanceIndicator');
            if (balanceDiv) balanceDiv.style.display = 'none';
        }
        loadCart();
    });

    const plusBtn = document.getElementById('balancePlusBtn');
    if (plusBtn) plusBtn.onclick = () => window.location.href = 'shop.html';

    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    if (menuToggle && navLinks) {
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('show');
        });
        
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('show');
            });
        });
    }
</script>

</body>
</html>
