<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRORANK">
    <meta name="theme-color" content="#fbbf24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Мой кошелёк | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        main { flex: 1; }
        
        .gold-top { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b); z-index: 1001; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; width: 100%; }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
        }
        
        .logo span { background: linear-gradient(135deg, #fbbf24, #ffdd77); background-clip: text; color: transparent; }
        
        .menu-toggle {
            display: none;
            background: rgba(251,191,36,0.1);
            border: 1px solid #fbbf24;
            color: #fbbf24;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 12px;
            min-height: 44px;
            min-width: 44px;
        }
        
        .nav-links {
            display: flex;
            gap: 6px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 60px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        
        .nav-links a { color: #ddd; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 8px 18px; border-radius: 40px; transition: all 0.2s; }
        .nav-links a i { margin-right: 8px; color: #fbbf24; }
        .nav-links a:hover { color: #fbbf24; background: rgba(251,191,36,0.1); }
        
        .page-header { text-align: center; padding: 30px 20px 20px; }
        .page-header h1 { font-size: clamp(1.5rem, 5vw, 2rem); font-weight: 800; background: linear-gradient(135deg, #fff, #fbbf24); background-clip: text; color: transparent; }
        
        .balance-card {
            background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(251,191,36,0.05));
            border-radius: 28px;
            padding: 28px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(251,191,36,0.3);
        }
        
        .balance-label { font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
        .balance-amount { font-size: 3rem; font-weight: 800; color: #fbbf24; }
        .btn-deposit {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            min-height: 52px;
            margin-top: 16px;
        }
        .btn-deposit:hover { background: #ffdd44; transform: translateY(-2px); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: rgba(15,15,15,0.6);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value { font-size: 1.3rem; font-weight: 700; color: #fbbf24; }
        .stat-label { font-size: 0.7rem; color: #888; margin-top: 4px; }
        
        .transactions-list {
            background: rgba(15,15,15,0.6);
            border-radius: 24px;
            padding: 20px;
            margin-top: 30px;
        }
        
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .transaction-type { display: flex; align-items: center; gap: 10px; }
        .type-deposit { color: #10b981; }
        .type-payment { color: #f59e0b; }
        .type-refund { color: #10b981; }
        .transaction-amount { font-weight: 700; color: #fbbf24; }
        .transaction-date { font-size: 0.65rem; color: #666; }
        
        .empty-state { text-align: center; padding: 40px; color: #888; }
        
        /* Модалка пополнения */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .modal-content {
            background: #151515;
            border-radius: 24px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(251,191,36,0.3);
        }
        
        .modal-content h3 { color: #fbbf24; margin-bottom: 20px; text-align: center; }
        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 40px;
        }
        
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; }
        .btn-confirm { background: #fbbf24; color: #000; }
        .btn-cancel { background: #333; color: #fff; }
        
        @media (max-width: 768px) {
            .navbar { padding: 12px 18px; }
            .menu-toggle { display: block; }
            .nav-links { display: none; flex-direction: column; position: absolute; top: 68px; left: 18px; right: 18px; background: #0f0f0f; border-radius: 20px; padding: 16px; gap: 10px; border: 1px solid rgba(251,191,36,0.3); z-index: 1000; }
            .nav-links.show { display: flex; }
            .nav-links a { width: 100%; text-align: center; padding: 12px; }
            .container { padding: 0 16px; }
            .balance-amount { font-size: 2rem; }
            .stats-grid { grid-template-columns: 1fr; }
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="gold-top"></div>

    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'">PRO<span>RANK</span></div>
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <nav class="nav-links" id="navLinks"></nav>
    </header>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-wallet"></i> Мой кошелёк</h1>
        </div>

        <div class="balance-card">
            <div class="balance-label">Ваш баланс</div>
            <div class="balance-amount" id="balanceAmount">0 ₽</div>
            <button class="btn-deposit" id="depositBtn"><i class="fas fa-plus-circle"></i> Пополнить баланс</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalSpent">0 ₽</div>
                <div class="stat-label">Всего потрачено</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRefunded">0 ₽</div>
                <div class="stat-label">Возвращено</div>
            </div>
        </div>

        <div class="transactions-list">
            <h3 style="margin-bottom: 16px;"><i class="fas fa-history"></i> История операций</h3>
            <div id="transactionsList">Загрузка...</div>
        </div>
    </main>

    <div id="depositModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-credit-card"></i> Пополнение баланса</h3>
            <input type="number" id="depositAmount" placeholder="Сумма пополнения (от 100 ₽)" min="100">
            <div class="modal-buttons">
                <button id="confirmDepositBtn" class="btn-confirm">Оплатить</button>
                <button id="cancelDepositBtn" class="btn-cancel">Отмена</button>
            </div>
            <p style="font-size: 0.7rem; text-align: center; margin-top: 12px; color: #666;">После оплаты средства поступят на баланс автоматически</p>
        </div>
    </div>

    <footer class="main-footer" style="background: #0a0a0a; border-top: 1px solid rgba(251,191,36,0.15); margin-top: 40px; padding: 30px 0 20px;">
        <div class="container">
            <div class="footer-inner" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <div class="footer-logo"><div class="logo">PRO<span>RANK</span></div><p>Рейтинг спортсменов-любителей</p></div>
                <div class="footer-social"><a href="#" class="social-icon"><i class="fab fa-telegram"></i></a><a href="#" class="social-icon"><i class="fab fa-vk"></i></a><a href="#" class="social-icon"><i class="fab fa-youtube"></i></a><a href="#" class="social-icon"><i class="fab fa-instagram"></i></a></div>
                <div class="footer-links"><a href="about.html">О проекте</a><a href="privacy.html">Конфиденциальность</a><a href="disclaimer.html">Дисклеймер</a></div>
            </div>
            <div class="footer-bottom"><p>© 2026 PRORANK. Все права защищены.</p></div>
        </div>
    </footer>
 <!-- Нижнее мобильное меню -->
<div id="mobileBottomNavContainer"></div>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module" src="header.js"></script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, getDoc, getDocs, collection, query, where, orderBy, addDoc, updateDoc } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        async function loadWallet() {
            if (!currentUser) return;
            
            try {
                const balanceDoc = await getDoc(doc(db, "wallet_balances", currentUser.uid));
                if (balanceDoc.exists()) {
                    const data = balanceDoc.data();
                    document.getElementById('balanceAmount').innerHTML = `${(data.available || 0).toLocaleString()} ₽`;
                    document.getElementById('totalSpent').innerHTML = `${(data.totalSpent || 0).toLocaleString()} ₽`;
                    document.getElementById('totalRefunded').innerHTML = `${(data.totalRefunded || 0).toLocaleString()} ₽`;
                } else {
                    document.getElementById('balanceAmount').innerHTML = '0 ₽';
                }
                
                const transactionsQuery = query(
                    collection(db, "wallet_transactions"),
                    where("userId", "==", currentUser.uid),
                    orderBy("createdAt", "desc")
                );
                const transactionsSnap = await getDocs(transactionsQuery);
                const container = document.getElementById('transactionsList');
                
                if (transactionsSnap.empty) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i> История операций пуста</div>';
                    return;
                }
                
                let html = '';
                transactionsSnap.forEach(docSnap => {
                    const t = docSnap.data();
                    const date = t.createdAt?.toDate().toLocaleString() || '—';
                    const typeNames = { 'deposit': 'Пополнение', 'payment': 'Оплата заказа', 'refund': 'Возврат' };
                    const typeClass = `type-${t.type}`;
                    const sign = t.type === 'deposit' || t.type === 'refund' ? '+' : '-';
                    const amountColor = t.type === 'deposit' || t.type === 'refund' ? '#10b981' : '#f59e0b';
                    
                    html += `
                        <div class="transaction-item">
                            <div class="transaction-type"><i class="fas ${t.type === 'deposit' ? 'fa-arrow-down' : (t.type === 'refund' ? 'fa-undo' : 'fa-shopping-cart')} ${typeClass}"></i><span>${typeNames[t.type] || t.type}</span></div>
                            <div class="transaction-amount" style="color: ${amountColor};">${sign} ${(t.amount || 0).toLocaleString()} ₽</div>
                            <div class="transaction-date">${date}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                console.error('Ошибка:', err);
            }
        }

        async function deposit() {
            const amount = parseInt(document.getElementById('depositAmount').value);
            if (!amount || amount < 100) {
                alert('Минимальная сумма пополнения — 100 ₽');
                return;
            }
            
            // ВРЕМЕННО: заглушка оплаты
            // Потом заменишь на реальный эквайринг
            alert(`✅ Демо-режим: баланс пополнен на ${amount} ₽`);
            
            // Обновляем баланс (временно)
            const balanceRef = doc(db, "wallet_balances", currentUser.uid);
            const balanceDoc = await getDoc(balanceRef);
            const currentBalance = balanceDoc.exists() ? balanceDoc.data().available || 0 : 0;
            await updateDoc(balanceRef, { available: currentBalance + amount, updatedAt: new Date() }, { merge: true });
            
            await addDoc(collection(db, "wallet_transactions"), {
                userId: currentUser.uid,
                userType: 'fighter',
                type: 'deposit',
                amount: amount,
                status: 'completed',
                description: `Пополнение баланса на ${amount} ₽`,
                createdAt: new Date()
            });
            
            document.getElementById('depositModal').style.display = 'none';
            document.getElementById('depositAmount').value = '';
            await loadWallet();
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) loadWallet();
            else document.getElementById('balanceAmount').innerHTML = '0 ₽';
        });

        document.getElementById('depositBtn')?.addEventListener('click', () => {
            if (!currentUser) { alert('Войдите в аккаунт'); window.location.href = 'login.html'; return; }
            document.getElementById('depositModal').style.display = 'flex';
        });
        
        document.getElementById('confirmDepositBtn')?.addEventListener('click', deposit);
        document.getElementById('cancelDepositBtn')?.addEventListener('click', () => document.getElementById('depositModal').style.display = 'none');
        
        window.addEventListener('click', (e) => { if (e.target === document.getElementById('depositModal')) document.getElementById('depositModal').style.display = 'none'; });

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        if (menuToggle && navLinks) menuToggle.addEventListener('click', () => navLinks.classList.toggle('show'));
    </script>
   
</body>
</html>
