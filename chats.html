<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRORANK">
    <meta name="theme-color" content="#fbbf24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fbbf24">
    <meta name="description" content="Чаты PRORANK — общайся с соперниками после принятых вызовов">
    <title>Чаты | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        .gold-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b);
            z-index: 1001;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
            width: 100%;
        }

        /* ===== ШАПКА ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
            transition: transform 0.2s ease;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .logo span {
            background: linear-gradient(135deg, #fbbf24, #ffdd77);
            background-clip: text;
            color: transparent;
        }

        .balance-indicator {
            background: #111;
            border: 1px solid rgba(251, 191, 36, 0.5);
            border-radius: 60px;
            padding: 7px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .balance-indicator:hover {
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251,191,36,0.2);
        }

        .balance-count {
            color: #fbbf24;
            font-size: 1.1rem;
        }

        .balance-plus {
            background: rgba(251,191,36,0.15);
            border: none;
            color: #fbbf24;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .balance-plus:hover {
            background: rgba(251,191,36,0.3);
            transform: scale(1.05);
        }

        .balance-plus:active {
            background: #fbbf24;
            color: #000;
            transform: scale(0.94);
        }

        .menu-toggle {
            display: none;
            background: rgba(251,191,36,0.1);
            border: 1px solid #fbbf24;
            color: #fbbf24;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 12px;
            transition: all 0.2s ease;
            min-height: 44px;
            min-width: 44px;
        }

        .menu-toggle:hover {
            background: rgba(251,191,36,0.2);
            transform: scale(1.02);
        }

        .menu-toggle:active {
            transform: scale(0.95);
        }

        .nav-links {
            display: flex;
            gap: 6px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 60px;
            border: 1px solid rgba(251,191,36,0.2);
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 40px;
            transition: all 0.2s ease;
        }

        .nav-links a i {
            margin-right: 8px;
            color: #fbbf24;
            transition: transform 0.2s ease;
        }

        .nav-links a:hover {
            color: #fbbf24;
            background: rgba(251,191,36,0.1);
            transform: translateY(-2px);
        }

        .nav-links a:hover i {
            transform: scale(1.1);
        }

        /* ===== ЗАГОЛОВОК ===== */
        .page-header {
            text-align: center;
            padding: 40px 20px 20px;
            animation: fadeInUp 0.5s ease;
        }

        .page-header h1 {
            font-size: clamp(1.6rem, 5vw, 2rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #fbbf24);
            background-clip: text;
            color: transparent;
        }

        .page-header h1 i {
            background: none;
            background-clip: unset;
            color: #fbbf24;
        }

        .page-header p {
            color: #aaa;
            margin-top: 8px;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
        }

        /* ===== СПИСОК ЧАТОВ ===== */
        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .chat-item {
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(251,191,36,0.15);
            animation: fadeInUp 0.4s ease both;
            position: relative;
        }

        .chat-item:nth-child(1) { animation-delay: 0.05s; }
        .chat-item:nth-child(2) { animation-delay: 0.1s; }
        .chat-item:nth-child(3) { animation-delay: 0.15s; }
        .chat-item:nth-child(4) { animation-delay: 0.2s; }

        .chat-item:hover {
            transform: translateX(8px);
            border-color: rgba(251,191,36,0.4);
            background: rgba(25,25,35,0.9);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .chat-item:active {
            transform: translateX(4px) scale(0.99);
        }

        .chat-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fbbf24;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .chat-item:hover .chat-avatar {
            transform: scale(1.05);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-last-message {
            font-size: 0.75rem;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        .chat-time {
            font-size: 0.65rem;
            color: #666;
            flex-shrink: 0;
            margin-right: 8px;
        }

        .unread-badge {
            background: #fbbf24;
            color: #000;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }

        /* ===== КНОПКИ ДЕЙСТВИЙ ===== */
        .chat-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .chat-item:hover .chat-actions {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .chat-actions {
                opacity: 1;
            }
        }

        .chat-actions button {
            background: rgba(255,255,255,0.05);
            border: none;
            color: #888;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-actions button:hover {
            background: rgba(251,191,36,0.15);
            color: #fbbf24;
        }

        .chat-actions .clear-btn:hover {
            color: #f59e0b;
            background: rgba(251,191,36,0.15);
        }

        .chat-actions .block-btn:hover {
            color: #ef4444;
            background: rgba(239,68,68,0.15);
        }

        .chat-actions .delete-btn:hover {
            color: #ef4444;
            background: rgba(239,68,68,0.15);
        }

        .chat-item.blocked {
            opacity: 0.5;
        }

        .chat-item.blocked .chat-last-message {
            color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #888;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            color: #555;
        }

        .empty-state p {
            margin-top: 8px;
        }

        /* ===== МОДАЛЬНОЕ ОКНО ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal {
            background: #1a1a2e;
            border: 1px solid rgba(251,191,36,0.2);
            border-radius: 20px;
            padding: 32px 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: fadeInUp 0.2s ease;
        }

        .modal h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #fff;
        }

        .modal p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal .actions button {
            padding: 10px 32px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .modal .cancel-btn {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .modal .cancel-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .modal .danger-btn {
            background: #ef4444;
            color: #fff;
        }

        .modal .danger-btn:hover {
            background: #dc2626;
            transform: scale(1.02);
        }

        .modal .warning-btn {
            background: #f59e0b;
            color: #000;
        }

        .modal .warning-btn:hover {
            background: #d97706;
            transform: scale(1.02);
        }

        /* ===== ПОДВАЛ ===== */
        .main-footer {
            background: #0a0a0a;
            border-top: 1px solid rgba(251,191,36,0.15);
            margin-top: 40px;
            padding: 40px 0 24px;
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 32px;
            margin-bottom: 32px;
        }

        .footer-logo .logo {
            font-size: 1.3rem;
            display: inline-block;
        }

        .footer-logo p {
            font-size: 0.7rem;
            color: #777;
            margin-top: 6px;
        }

        .footer-social {
            display: flex;
            gap: 20px;
        }

        .social-icon {
            color: #aaa;
            font-size: 1.3rem;
            transition: all 0.2s ease;
        }

        .social-icon:hover {
            color: #fbbf24;
            transform: translateY(-3px);
        }

        .footer-links {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.75rem;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: #fbbf24;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.65rem;
            color: #555;
        }

        /* Анимации */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .container {
                padding: 0 16px;
            }
            
            .navbar {
                padding: 12px 18px;
            }
            
            .menu-toggle {
                display: block;
            }
            
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 68px;
                left: 18px;
                right: 18px;
                background: #0f0f0f;
                border-radius: 24px;
                padding: 20px;
                gap: 10px;
                border: 1px solid rgba(251,191,36,0.3);
                z-index: 1000;
                backdrop-filter: blur(20px);
            }
            
            .nav-links.show {
                display: flex;
                animation: fadeIn 0.2s ease;
            }
            
            .nav-links a {
                width: 100%;
                text-align: center;
                padding: 12px;
            }
            
            .page-header h1 {
                font-size: 1.6rem;
            }
            
            .chat-last-message {
                max-width: 150px;
            }
            
            .chat-name {
                font-size: 1rem;
            }
            
            .chat-avatar {
                width: 48px;
                height: 48px;
            }
            
            .footer-inner {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .chat-item {
                padding: 14px;
                gap: 12px;
            }
            
            .chat-avatar {
                width: 40px;
                height: 40px;
            }
            
            .chat-name {
                font-size: 0.9rem;
            }
            
            .chat-last-message {
                max-width: 120px;
                font-size: 0.7rem;
            }
            
            .chat-time {
                font-size: 0.55rem;
            }

            .chat-actions button {
                width: 30px;
                height: 30px;
                font-size: 0.7rem;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 10px;
        }
        
        .icon-gold {
            color: #fbbf24;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(251,191,36,0.3);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>

    <!-- Нижнее мобильное меню -->
    <div id="mobileBottomNavContainer"></div>

    <!-- Контейнер для ошибок -->

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module" src="header.js"></script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { 
            getFirestore, 
            collection, getDocs, getDoc, 
            query, where, orderBy, 
            doc, updateDoc, deleteDoc, setDoc,
            writeBatch, 
            onSnapshot
        } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";
        import { showError } from './error-handler.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let unsubscribeChats = null;

        // ===== МОДАЛЬНОЕ ОКНО =====
        let modalResolve = null;

        function showModal(title, message, type = 'danger') {
            return new Promise((resolve) => {
                const modal = document.getElementById('modal');
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('modalMessage').textContent = message;
                
                const confirmBtn = document.getElementById('modalConfirm');
                confirmBtn.className = type === 'danger' ? 'danger-btn' : 'warning-btn';
                confirmBtn.textContent = type === 'danger' ? 'Удалить' : 'Очистить';
                
                modal.style.display = 'flex';
                modalResolve = resolve;
            });
        }

        document.getElementById('modalCancel').addEventListener('click', () => {
            document.getElementById('modal').style.display = 'none';
            if (modalResolve) modalResolve(false);
        });

        document.getElementById('modalConfirm').addEventListener('click', () => {
            document.getElementById('modal').style.display = 'none';
            if (modalResolve) modalResolve(true);
        });

        // ===== УДАЛИТЬ ЧАТ =====
        async function deleteChat(chatId) {
            if (!currentUser || !chatId) return;
            
            const confirmed = await showModal(
                'Удалить чат?',
                'Все сообщения в этом чате будут удалены безвозвратно. Вы уверены?',
                'danger'
            );
            if (!confirmed) return;

            try {
                await deleteDoc(doc(db, "chats", chatId));
                showNotification('✅ Чат удалён', 'success');
            } catch (err) {
                console.error('❌ Ошибка удаления чата:', err);
                showNotification('Не удалось удалить чат', 'error');
            }
        }

        // ===== ОЧИСТИТЬ ИСТОРИЮ ЧАТА =====
        async function clearChatHistory(chatId) {
            if (!currentUser || !chatId) return;
            
            const confirmed = await showModal(
                'Очистить историю?',
                'Все сообщения в этом чате будут удалены, но чат останется. Вы уверены?',
                'warning'
            );
            if (!confirmed) return;

            try {
                const messagesRef = collection(db, "chats", chatId, "messages");
                const snapshot = await getDocs(messagesRef);
                
                const batch = writeBatch(db);
                snapshot.forEach(doc => {
                    batch.delete(doc.ref);
                });
                await batch.commit();
                
                await updateDoc(doc(db, "chats", chatId), {
                    lastMessage: '',
                    lastMessageTime: null,
                    lastMessageAuthor: null
                });
                
                showNotification('✅ История очищена', 'success');
            } catch (err) {
                console.error('❌ Ошибка очистки истории:', err);
                showNotification('Не удалось очистить историю', 'error');
            }
        }

        // ===== ЗАБЛОКИРОВАТЬ ПОЛЬЗОВАТЕЛЯ =====
        async function blockUser(chatId, userId) {
            if (!currentUser || !chatId || !userId) return;
            
            const confirmed = await showModal(
                'Заблокировать пользователя?',
                'Вы не сможете отправлять сообщения этому пользователю. Разблокировать можно будет позже.',
                'danger'
            );
            if (!confirmed) return;

            try {
                const blockedRef = doc(db, "users", currentUser.uid, "blocked", userId);
                await setDoc(blockedRef, {
                    blockedAt: new Date(),
                    userId: userId
                });

                await deleteDoc(doc(db, "chats", chatId));
                
                showNotification('🔒 Пользователь заблокирован', 'success');
            } catch (err) {
                console.error('❌ Ошибка блокировки:', err);
                showNotification('Не удалось заблокировать', 'error');
            }
        }

        // ===== УВЕДОМЛЕНИЯ =====
        function showNotification(message, type = 'info') {
            const container = document.getElementById('errorContainer');
            if (!container) return;
            
            const colors = {
                success: '#22c55e',
                error: '#ef4444',
                warning: '#f59e0b',
                info: '#fbbf24'
            };
            
            container.style.display = 'block';
            container.style.background = colors[type] || colors.info;
            container.style.color = '#000';
            container.textContent = message;
            
            setTimeout(() => {
                container.style.display = 'none';
            }, 3000);
        }

        // ===== ОБНОВЛЕНИЕ БАЛАНСА =====
        async function updateHeaderBalance() {
            const user = auth.currentUser;
            const balanceDiv = document.getElementById('balanceIndicator');
            const balanceCount = document.getElementById('headerChallengesCount');
            if (!user || !balanceDiv) return;
            try {
                const userDoc = await getDoc(doc(db, "fighters", user.uid));
                const data = userDoc.data();
                const total = (data.freeChallenges || 0) + (data.purchasedChallenges || 0);
                balanceCount.innerText = total;
                balanceDiv.style.display = 'flex';
            } catch (err) { 
                console.error(err);
                balanceDiv.style.display = 'none';
            }
        }

        // ===== ЗАГРУЗКА ЧАТОВ (с реальным временем) =====
        function loadChatsRealtime() {
            if (!currentUser) return;

            if (unsubscribeChats) {
                unsubscribeChats();
                unsubscribeChats = null;
            }

            const q = query(
                collection(db, "chats"),
                where("participants", "array-contains", currentUser.uid),
                orderBy("lastMessageTime", "desc")
            );

            unsubscribeChats = onSnapshot(q, async (snapshot) => {
                const container = document.getElementById('chatsList');
                
                if (snapshot.empty) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-comments" style="font-size: 3rem;"></i>
                            <p>У вас пока нет чатов</p>
                            <p style="font-size: 0.75rem; margin-top: 8px;">Начните общение после принятия вызова</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                for (const docSnap of snapshot.docs) {
                    const chat = docSnap.data();
                    const chatId = docSnap.id;
                    const participants = chat.participants || [];
                    const otherId = participants.find(id => id !== currentUser.uid);
                    
                    if (!otherId) continue;
                    
                    // Проверяем, заблокирован ли пользователь
                    let isBlocked = false;
                    try {
                        const blockedRef = doc(db, "users", currentUser.uid, "blocked", otherId);
                        const blockedSnap = await getDoc(blockedRef);
                        isBlocked = blockedSnap.exists();
                    } catch (err) {}
                    
                    const otherFighterRef = doc(db, "fighters", otherId);
                    const otherFighterSnap = await getDoc(otherFighterRef);
                    const otherData = otherFighterSnap.data();
                    const otherName = otherData?.name || 'Соперник';
                    const otherAvatar = otherData?.avatar || 'Avatar.png';
                    
                    let isOnline = false;
                    if (otherData?.lastSeen) {
                        const lastSeen = otherData.lastSeen.toDate();
                        isOnline = (new Date() - lastSeen) < 5 * 60 * 1000;
                    }
                    
                    const lastMessage = chat.lastMessage || 'Нет сообщений';
                    const lastMessageTime = chat.lastMessageTime?.toDate();
                    const timeStr = lastMessageTime ? formatTime(lastMessageTime) : '';
                    
                    const lastMessageAuthor = chat.lastMessageAuthor || '';
                    const isMyMessage = lastMessageAuthor === currentUser.uid;
                    
                    const unreadCount = chat.unreadCounts?.[currentUser.uid] || 0;
                    
                    let messagePreview = escapeHtml(lastMessage);
                    if (isMyMessage) {
                        messagePreview = `<span style="color: #fbbf24; font-weight: 600;">Вы: </span>${messagePreview}`;
                    }
                    
                    if (isBlocked) {
                        messagePreview = '🔒 Заблокирован';
                    }
                    
                    html += `
                        <div class="chat-item ${isBlocked ? 'blocked' : ''}" data-chat-id="${chatId}" data-other-id="${otherId}">
                            <div style="position: relative;">
                                <img src="${otherAvatar}" class="chat-avatar" onerror="this.src='Avatar.png'">
                                ${isOnline ? '<span style="position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #22c55e; border: 2px solid #0f0f0f; border-radius: 50%;"></span>' : ''}
                            </div>
                            <div class="chat-info">
                                <div class="chat-name">
                                    ${escapeHtml(otherName)}
                                    ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount > 99 ? '99+' : unreadCount}</span>` : ''}
                                    ${isBlocked ? '<span style="color:#ef4444;font-size:0.7rem;"><i class="fas fa-ban"></i></span>' : ''}
                                </div>
                                <div class="chat-last-message">${messagePreview}</div>
                            </div>
                            <div class="chat-time">${timeStr}</div>
                            <div class="chat-actions">
                                <button class="clear-btn" data-action="clear" title="Очистить историю">
                                    <i class="fas fa-eraser"></i>
                                </button>
                                <button class="block-btn" data-action="block" title="Заблокировать">
                                    <i class="fas fa-ban"></i>
                                </button>
                                <button class="delete-btn" data-action="delete" title="Удалить чат">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;

                // Обработчики
                container.querySelectorAll('.chat-item').forEach(item => {
                    const chatId = item.dataset.chatId;
                    const otherId = item.dataset.otherId;

                    // Клик по чату
                    item.addEventListener('click', async (e) => {
                        if (e.target.closest('.chat-actions')) return;
                        
                        try {
                            const chatRef = doc(db, "chats", chatId);
                            const updateData = {};
                            updateData[`unreadCounts.${currentUser.uid}`] = 0;
                            await updateDoc(chatRef, updateData);
                        } catch (err) {}
                        
                        window.location.href = `chat.html?id=${chatId}`;
                    });

                    // Удаление чата
                    item.querySelector('[data-action="delete"]')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteChat(chatId);
                    });

                    // Очистка истории
                    item.querySelector('[data-action="clear"]')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        clearChatHistory(chatId);
                    });

                    // Блокировка
                    item.querySelector('[data-action="block"]')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (otherId) blockUser(chatId, otherId);
                    });
                });
            }, (error) => {
                console.error('Ошибка загрузки чатов:', error);
                const container = document.getElementById('chatsList');
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Ошибка загрузки чатов</p></div>';
            });
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / (1000 * 60));
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (minutes < 1) return 'только что';
            if (minutes < 60) return `${minutes} мин`;
            if (hours < 24) return `${hours} ч`;
            if (days < 7) return `${days} д`;
            return date.toLocaleDateString();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        // ===== АВТОРИЗАЦИЯ =====
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                setTimeout(updateHeaderBalance, 1000);
                loadChatsRealtime();
            } else {
                if (unsubscribeChats) {
                    unsubscribeChats();
                    unsubscribeChats = null;
                }
                const balanceDiv = document.getElementById('balanceIndicator');
                if (balanceDiv) balanceDiv.style.display = 'none';
                document.getElementById('chatsList').innerHTML = '<div class="empty-state"><i class="fas fa-lock"></i><p>Войдите, чтобы увидеть чаты</p></div>';
            }
        });

        // ===== ОБРАБОТЧИКИ =====
        const plusBtn = document.getElementById('balancePlusBtn');
        if (plusBtn) plusBtn.onclick = () => window.location.href = 'shop.html';

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('show');
            });
            
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('show');
                });
            });
        }

        console.log('✅ Чаты загружены с функциями: удаление, очистка, блокировка');
    </script>
</body>
</html>
