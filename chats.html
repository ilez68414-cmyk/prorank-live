<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Чаты | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        /* Все стили как были, но без навигации */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
            min-height: 100vh;
        }
        .gold-top { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b); z-index: 1001; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 2; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
        }
        .logo span { background: linear-gradient(135deg, #fbbf24, #ffdd77); background-clip: text; color: transparent; }
        .balance-indicator {
            background: #111;
            border: 1px solid rgba(251, 191, 36, 0.5);
            border-radius: 60px;
            padding: 7px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .balance-count { color: #fbbf24; }
        .balance-plus {
            background: rgba(251,191,36,0.15);
            border: none;
            color: #fbbf24;
            cursor: pointer;
            width: 26px;
            height: 26px;
            border-radius: 50%;
        }
        .menu-toggle {
            display: none;
            background: rgba(251,191,36,0.1);
            border: 1px solid #fbbf24;
            color: #fbbf24;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 12px;
        }
        .nav-links {
            display: flex;
            gap: 6px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 60px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .nav-links a i { margin-right: 8px; color: #fbbf24; }
        .nav-links a:hover { color: #fbbf24; }
        .page-header { text-align: center; padding: 40px 20px 20px; }
        .page-header h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #fff, #fbbf24); background-clip: text; color: transparent; }
        .chats-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
        .chat-item {
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid rgba(251,191,36,0.15);
        }
        .chat-item:active { transform: scale(0.98); background: rgba(25,25,25,0.8); }
        .chat-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid #fbbf24; flex-shrink: 0; }
        .chat-info { flex: 1; }
        .chat-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
        .chat-last-message { font-size: 0.75rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }
        .chat-time { font-size: 0.65rem; color: #666; flex-shrink: 0; }
        .empty-state { text-align: center; padding: 60px; color: #888; }
        .main-footer { background: #0a0a0a; border-top: 1px solid rgba(251,191,36,0.15); margin-top: 60px; padding: 40px 0 24px; }
        .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 32px; margin-bottom: 32px; }
        .footer-logo .logo { font-size: 1.3rem; display: inline-block; }
        .footer-logo p { font-size: 0.7rem; color: #777; margin-top: 6px; }
        .footer-social { display: flex; gap: 20px; }
        .social-icon { color: #aaa; font-size: 1.3rem; transition: 0.2s; }
        .social-icon:hover { color: #fbbf24; }
        .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
        .footer-links a { color: #888; text-decoration: none; font-size: 0.75rem; }
        .footer-links a:hover { color: #fbbf24; }
        .footer-bottom { text-align: center; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.65rem; color: #555; }
        @media (max-width: 768px) {
            .navbar { padding: 12px 18px; }
            .menu-toggle { display: block; }
            .nav-links { display: none; flex-direction: column; position: absolute; top: 68px; left: 18px; right: 18px; background: #0f0f0f; border-radius: 24px; padding: 20px; gap: 10px; border: 1px solid rgba(251,191,36,0.3); }
            .nav-links.show { display: flex; }
            .nav-links a { width: 100%; text-align: center; padding: 12px; }
            .container { padding: 0 16px; }
            .page-header h1 { font-size: 1.6rem; }
            .chat-last-message { max-width: 150px; }
            .footer-inner { flex-direction: column; text-align: center; }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        .icon-gold { color: #fbbf24; }
        .loading { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="gold-top"></div>

    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'">PRO<span>RANK</span></div>
        <div class="balance-indicator" id="balanceIndicator" style="display: none;">
            <i class="fas fa-crosshairs"></i>
            <span class="balance-count" id="headerChallengesCount">0</span>
            <button class="balance-plus" id="balancePlusBtn">+</button>
        </div>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <nav class="nav-links" id="navLinks"></nav>
    </header>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-comments"></i> Мои чаты</h1>
        </div>
        <div id="chatsList" class="chats-list">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка чатов...</div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-logo">
                    <div class="logo">PRO<span>RANK</span></div>
                    <p>Рейтинг спортсменов-любителей</p>
                </div>
                <div class="footer-social">
                    <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Telegram"><i class="fab fa-telegram"></i></a>
                    <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="VK"><i class="fab fa-vk"></i></a>
                    <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                    <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                </div>
                <div class="footer-links">
                    <a href="about.html">О проекте</a>
                    <a href="privacy.html">Конфиденциальность</a>
                    <a href="disclaimer.html">Дисклеймер</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 PRORANK. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module" src="header.js"></script>
    <script type="module">
        import { getFirestore, collection, getDocs, query, where, doc, getDoc } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";

        const db = getFirestore();
        const auth = getAuth();

        let currentUser = null;

        async function updateHeaderBalance() {
            const user = auth.currentUser;
            const balanceDiv = document.getElementById('balanceIndicator');
            const balanceCount = document.getElementById('headerChallengesCount');
            if (!user || !balanceDiv) return;
            try {
                const userDoc = await getDoc(doc(db, "fighters", user.uid));
                const data = userDoc.data();
                const total = (data.freeChallenges || 0) + (data.purchasedChallenges || 0);
                balanceCount.innerText = total;
                balanceDiv.style.display = 'flex';
            } catch (err) { console.error(err); }
        }

        async function loadChats() {
            const container = document.getElementById('chatsList');
            if (!currentUser) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-lock"></i> Войдите, чтобы увидеть чаты</div>';
                return;
            }

            try {
                const q = query(
                    collection(db, "chats"),
                    where("participants", "array-contains", currentUser.uid)
                );
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-comments" style="font-size: 3rem;"></i>
                            <p style="margin-top: 12px;">У вас пока нет чатов</p>
                            <p style="font-size: 0.8rem;">Начните общение после принятия вызова</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                for (const docSnap of snapshot.docs) {
                    const chat = docSnap.data();
                    const participants = chat.participants || [];
                    const otherId = participants.find(id => id !== currentUser.uid);
                    
                    if (!otherId) continue;
                    
                    const otherFighterRef = doc(db, "fighters", otherId);
                    const otherFighterSnap = await getDoc(otherFighterRef);
                    const otherName = otherFighterSnap.data()?.name || 'Соперник';
                    const otherAvatar = otherFighterSnap.data()?.avatar || 'Avatar.png';
                    
                    const lastMessage = chat.lastMessage || 'Нет сообщений';
                    const lastMessageTime = chat.lastMessageTime?.toDate();
                    const timeStr = lastMessageTime ? formatTime(lastMessageTime) : '';
                    
                    html += `
                        <div class="chat-item" data-chat-id="${docSnap.id}">
                            <img src="${otherAvatar}" class="chat-avatar" onerror="this.src='Avatar.png'">
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(otherName)}</div>
                                <div class="chat-last-message">${escapeHtml(lastMessage)}</div>
                            </div>
                            <div class="chat-time">${timeStr}</div>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
                document.querySelectorAll('.chat-item').forEach(item => {
                    item.addEventListener('click', () => {
                        window.location.href = `chat.html?id=${item.dataset.chatId}`;
                    });
                });
            } catch (err) {
                console.error('Ошибка загрузки чатов:', err);
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки</div>';
            }
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / (1000 * 60));
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (minutes < 1) return 'только что';
            if (minutes < 60) return `${minutes} мин`;
            if (hours < 24) return `${hours} ч`;
            if (days < 7) return `${days} д`;
            return date.toLocaleDateString();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                setTimeout(updateHeaderBalance, 1000);
                await loadChats();
            } else {
                const balanceDiv = document.getElementById('balanceIndicator');
                if (balanceDiv) balanceDiv.style.display = 'none';
                document.getElementById('chatsList').innerHTML = '<div class="empty-state"><i class="fas fa-lock"></i> Войдите, чтобы увидеть чаты</div>';
            }
        });

        const plusBtn = document.getElementById('balancePlusBtn');
        if (plusBtn) plusBtn.onclick = () => window.location.href = 'shop.html';

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => navLinks.classList.toggle('show'));
        }
    </script>
</body>
</html>
