<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRORANK">
    <meta name="theme-color" content="#fbbf24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#fbbf24">
    <meta name="description" content="Чаты PRORANK — общайся с соперниками после принятых вызовов">
    <title>Чаты | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        .gold-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b);
            z-index: 1001;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
            width: 100%;
        }

        /* ===== ШАПКА ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
            transition: transform 0.2s ease;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .logo span {
            background: linear-gradient(135deg, #fbbf24, #ffdd77);
            background-clip: text;
            color: transparent;
        }

        .balance-indicator {
            background: #111;
            border: 1px solid rgba(251, 191, 36, 0.5);
            border-radius: 60px;
            padding: 7px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .balance-indicator:hover {
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251,191,36,0.2);
        }

        .balance-count {
            color: #fbbf24;
            font-size: 1.1rem;
        }

        .balance-plus {
            background: rgba(251,191,36,0.15);
            border: none;
            color: #fbbf24;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .balance-plus:hover {
            background: rgba(251,191,36,0.3);
            transform: scale(1.05);
        }

        .balance-plus:active {
            background: #fbbf24;
            color: #000;
            transform: scale(0.94);
        }

        .menu-toggle {
            display: none;
            background: rgba(251,191,36,0.1);
            border: 1px solid #fbbf24;
            color: #fbbf24;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 12px;
            transition: all 0.2s ease;
            min-height: 44px;
            min-width: 44px;
        }

        .menu-toggle:hover {
            background: rgba(251,191,36,0.2);
            transform: scale(1.02);
        }

        .menu-toggle:active {
            transform: scale(0.95);
        }

        .nav-links {
            display: flex;
            gap: 6px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 60px;
            border: 1px solid rgba(251,191,36,0.2);
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 40px;
            transition: all 0.2s ease;
        }

        .nav-links a i {
            margin-right: 8px;
            color: #fbbf24;
            transition: transform 0.2s ease;
        }

        .nav-links a:hover {
            color: #fbbf24;
            background: rgba(251,191,36,0.1);
            transform: translateY(-2px);
        }

        .nav-links a:hover i {
            transform: scale(1.1);
        }

        /* ===== ЗАГОЛОВОК ===== */
        .page-header {
            text-align: center;
            padding: 40px 20px 20px;
            animation: fadeInUp 0.5s ease;
        }

        .page-header h1 {
            font-size: clamp(1.6rem, 5vw, 2rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #fbbf24);
            background-clip: text;
            color: transparent;
        }

        .page-header h1 i {
            background: none;
            background-clip: unset;
            color: #fbbf24;
        }

        .page-header p {
            color: #aaa;
            margin-top: 8px;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
        }

        /* ===== СПИСОК ЧАТОВ ===== */
        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .chat-item {
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(251,191,36,0.15);
            animation: fadeInUp 0.4s ease both;
        }

        .chat-item:nth-child(1) { animation-delay: 0.05s; }
        .chat-item:nth-child(2) { animation-delay: 0.1s; }
        .chat-item:nth-child(3) { animation-delay: 0.15s; }
        .chat-item:nth-child(4) { animation-delay: 0.2s; }

        .chat-item:hover {
            transform: translateX(8px);
            border-color: rgba(251,191,36,0.4);
            background: rgba(25,25,35,0.9);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .chat-item:active {
            transform: translateX(4px) scale(0.99);
        }

        .chat-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fbbf24;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .chat-item:hover .chat-avatar {
            transform: scale(1.05);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-last-message {
            font-size: 0.75rem;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        .chat-time {
            font-size: 0.65rem;
            color: #666;
            flex-shrink: 0;
        }

        .unread-badge {
            background: #fbbf24;
            color: #000;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #888;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            color: #555;
        }

        .empty-state p {
            margin-top: 8px;
        }

        /* ===== ПОДВАЛ ===== */
        .main-footer {
            background: #0a0a0a;
            border-top: 1px solid rgba(251,191,36,0.15);
            margin-top: 40px;
            padding: 40px 0 24px;
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 32px;
            margin-bottom: 32px;
        }

        .footer-logo .logo {
            font-size: 1.3rem;
            display: inline-block;
        }

        .footer-logo p {
            font-size: 0.7rem;
            color: #777;
            margin-top: 6px;
        }

        .footer-social {
            display: flex;
            gap: 20px;
        }

        .social-icon {
            color: #aaa;
            font-size: 1.3rem;
            transition: all 0.2s ease;
        }

        .social-icon:hover {
            color: #fbbf24;
            transform: translateY(-3px);
        }

        .footer-links {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.75rem;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: #fbbf24;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.65rem;
            color: #555;
        }

        /* Анимации */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .container {
                padding: 0 16px;
            }
            
            .navbar {
                padding: 12px 18px;
            }
            
            .menu-toggle {
                display: block;
            }
            
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 68px;
                left: 18px;
                right: 18px;
                background: #0f0f0f;
                border-radius: 24px;
                padding: 20px;
                gap: 10px;
                border: 1px solid rgba(251,191,36,0.3);
                z-index: 1000;
                backdrop-filter: blur(20px);
            }
            
            .nav-links.show {
                display: flex;
                animation: fadeIn 0.2s ease;
            }
            
            .nav-links a {
                width: 100%;
                text-align: center;
                padding: 12px;
            }
            
            .page-header h1 {
                font-size: 1.6rem;
            }
            
            .chat-last-message {
                max-width: 150px;
            }
            
            .chat-name {
                font-size: 1rem;
            }
            
            .chat-avatar {
                width: 48px;
                height: 48px;
            }
            
            .footer-inner {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .chat-item {
                padding: 14px;
                gap: 12px;
            }
            
            .chat-avatar {
                width: 40px;
                height: 40px;
            }
            
            .chat-name {
                font-size: 0.9rem;
            }
            
            .chat-last-message {
                max-width: 120px;
                font-size: 0.7rem;
            }
            
            .chat-time {
                font-size: 0.55rem;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 10px;
        }
        
        .icon-gold {
            color: #fbbf24;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(251,191,36,0.3);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>

<div id="mobileBottomNavContainer"></div>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module" src="header.js"></script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, getDocs, query, where, doc, getDoc, orderBy, updateDoc } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        async function updateHeaderBalance() {
            const user = auth.currentUser;
            const balanceDiv = document.getElementById('balanceIndicator');
            const balanceCount = document.getElementById('headerChallengesCount');
            if (!user || !balanceDiv) return;
            try {
                const userDoc = await getDoc(doc(db, "fighters", user.uid));
                const data = userDoc.data();
                const total = (data.freeChallenges || 0) + (data.purchasedChallenges || 0);
                balanceCount.innerText = total;
                balanceDiv.style.display = 'flex';
            } catch (err) { 
                console.error(err);
                balanceDiv.style.display = 'none';
            }
        }

        async function loadChats() {
            const container = document.getElementById('chatsList');
            if (!currentUser) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-lock"></i><p>Войдите, чтобы увидеть чаты</p></div>';
                return;
            }

            try {
                const q = query(
                    collection(db, "chats"),
                    where("participants", "array-contains", currentUser.uid),
                    orderBy("lastMessageTime", "desc")
                );
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-comments" style="font-size: 3rem;"></i>
                            <p>У вас пока нет чатов</p>
                            <p style="font-size: 0.75rem; margin-top: 8px;">Начните общение после принятия вызова</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                for (const docSnap of snapshot.docs) {
                    const chat = docSnap.data();
                    const participants = chat.participants || [];
                    const otherId = participants.find(id => id !== currentUser.uid);
                    
                    if (!otherId) continue;
                    
                    const otherFighterRef = doc(db, "fighters", otherId);
                    const otherFighterSnap = await getDoc(otherFighterRef);
                    const otherData = otherFighterSnap.data();
                    const otherName = otherData?.name || 'Соперник';
                    const otherAvatar = otherData?.avatar || 'Avatar.png';
                    
                    // Проверяем онлайн (если есть поле lastSeen)
                    let isOnline = false;
                    if (otherData?.lastSeen) {
                        const lastSeen = otherData.lastSeen.toDate();
                        isOnline = (new Date() - lastSeen) < 5 * 60 * 1000;
                    }
                    
                    const lastMessage = chat.lastMessage || 'Нет сообщений';
                    const lastMessageTime = chat.lastMessageTime?.toDate();
                    const timeStr = lastMessageTime ? formatTime(lastMessageTime) : '';
                    
                    // Проверяем автора последнего сообщения (если есть поле)
                    const lastMessageAuthor = chat.lastMessageAuthor || '';
                    const isMyMessage = lastMessageAuthor === currentUser.uid;
                    
                    // Получаем счётчик непрочитанных (если есть)
                    const unreadCount = chat.unreadCounts?.[currentUser.uid] || 0;
                    
                    // Формируем превью сообщения
                    let messagePreview = escapeHtml(lastMessage);
                    if (isMyMessage) {
                        messagePreview = `<span style="color: #fbbf24; font-weight: 600;">Вы: </span>${messagePreview}`;
                    }
                    
                    html += `
                        <div class="chat-item" data-chat-id="${docSnap.id}">
                            <div style="position: relative;">
                                <img src="${otherAvatar}" class="chat-avatar" onerror="this.src='Avatar.png'">
                                ${isOnline ? '<span style="position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #22c55e; border: 2px solid #0f0f0f; border-radius: 50%;"></span>' : ''}
                            </div>
                            <div class="chat-info">
                                <div class="chat-name">
                                    ${escapeHtml(otherName)}
                                    ${unreadCount > 0 ? `<span class="unread-badge" style="background: #ef4444; color: white;">${unreadCount > 99 ? '99+' : unreadCount}</span>` : ''}
                                </div>
                                <div class="chat-last-message">${messagePreview}</div>
                            </div>
                            <div class="chat-time">${timeStr}</div>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
                // Обработка кликов по чатам
                for (const item of document.querySelectorAll('.chat-item')) {
                    item.addEventListener('click', async () => {
                        const chatId = item.dataset.chatId;
                        // Пытаемся обнулить непрочитанные (если есть поле unreadCounts)
                        try {
                            const chatRef = doc(db, "chats", chatId);
                            const updateData = {};
                            updateData[`unreadCounts.${currentUser.uid}`] = 0;
                            await updateDoc(chatRef, updateData);
                        } catch (err) {
                            // Если поля нет — просто игнорируем ошибку
                            console.log('Нет поля unreadCounts, пропускаем обнуление');
                        }
                        window.location.href = `chat.html?id=${chatId}`;
                    });
                }
            } catch (err) {
                console.error('Ошибка загрузки чатов:', err);
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Ошибка загрузки чатов</p></div>';
            }
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / (1000 * 60));
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (minutes < 1) return 'только что';
            if (minutes < 60) return `${minutes} мин`;
            if (hours < 24) return `${hours} ч`;
            if (days < 7) return `${days} д`;
            return date.toLocaleDateString();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                setTimeout(updateHeaderBalance, 1000);
                await loadChats();
            } else {
                const balanceDiv = document.getElementById('balanceIndicator');
                if (balanceDiv) balanceDiv.style.display = 'none';
                document.getElementById('chatsList').innerHTML = '<div class="empty-state"><i class="fas fa-lock"></i><p>Войдите, чтобы увидеть чаты</p></div>';
            }
        });

        const plusBtn = document.getElementById('balancePlusBtn');
        if (plusBtn) plusBtn.onclick = () => window.location.href = 'shop.html';

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('show');
            });
            
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('show');
                });
            });
        }
    </script>
</body>
</html>
