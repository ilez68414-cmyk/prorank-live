<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .rating-table thead tr { background: #1a1a1a !important; border-bottom: 2px solid #fbbf24; cursor: default; transform: none !important; }
        .rating-table thead tr:hover { background: #1a1a1a !important; transform: none !important; }
        .rating-table thead th { color: #fbbf24; font-weight: bold; }
        .rating-table tbody tr { transition: 0.2s; cursor: pointer; }
        .rating-table tbody tr:hover { background: #2a2a2a !important; transform: scale(1.01); }
        .rating-table tbody tr.gold { background: linear-gradient(90deg, #2a2410, #1f1a0a); border-left: 4px solid #FFD700; }
        .rating-table tbody tr.silver { background: linear-gradient(90deg, #242424, #1a1a1a); border-left: 4px solid #C0C0C0; }
        .rating-table tbody tr.bronze { background: linear-gradient(90deg, #241e15, #1a1510); border-left: 4px solid #CD7F32; }
        .rank-number { font-weight: bold; font-size: 1.2rem; }
        .gold .rank-number { color: #FFD700; text-shadow: 0 0 2px #FFD700; }
        .silver .rank-number { color: #C0C0C0; }
        .bronze .rank-number { color: #CD7F32; }
        .avatar-thumb { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #2a2a2a; border: 1px solid #fbbf24; }
        .search-container, .city-filter, .weight-filter { margin-bottom: 1rem; }
        .city-filter, .weight-filter { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        #rankSearch, #citySelect, #weightClassSelect { padding: 0.7rem; background: #1e1e1e; border: 1px solid #333; color: white; border-radius: 2rem; }
        #rankSearch { width: 100%; }
        #citySelect, #weightClassSelect { min-width: 180px; }
        .rating-filters { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .filter-btn { background: #1e1e1e; border: 1px solid #333; color: #ccc; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; transition: 0.2s; }
        .filter-btn.active { background: #fbbf24; color: black; border-color: #fbbf24; }
        .rating-table { width: 100%; border-collapse: collapse; background: #0f0f0f; border-radius: 1rem; overflow: hidden; }
        .rating-table th, .rating-table td { padding: 0.8rem 0.5rem; text-align: left; border-bottom: 1px solid #222; vertical-align: middle; }
        .rating-table th { background: #1a1a1a; }
        /* Адаптивная навигация */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #1a1a1a;
            border-bottom: 2px solid #fbbf24;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }
        .logo span {
            color: #fbbf24;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        .nav-links a:hover {
            color: #fbbf24;
        }
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 5px 10px;
        }
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: #1a1a1a;
                padding: 20px;
                gap: 15px;
                z-index: 100;
                border-top: 1px solid #333;
            }
            .nav-links.show {
                display: flex;
            }
            .menu-toggle {
                display: block;
            }
            .avatar-thumb { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'" style="cursor:pointer">PRO<span>RANK</span></div>
<div class="balance-indicator" id="balanceIndicator" style="display: none;">
    <span class="balance-icon">🎯</span>
    <span class="balance-count" id="headerChallengesCount">0</span>
    <button class="balance-plus" id="balancePlusBtn" title="Купить вызовы">+</button>
</div>
<button class="menu-toggle" id="menuToggle">☰</button>
        <nav class="nav-links" id="navLinks">
            <a href="index.html">Главная</a>
            <a href="rules.html">Правила</a>
            <a href="shop.html">Магазин</a>
            <a href="challenges.html">Мои вызовы</a>
            <a href="login.html" id="profileLoginBtn" class="btn-primary">Войти</a>
        </nav>
    </header>

    <main class="container">
        <section class="hero"><h1>🏆 Рейтинг спортсменов</h1></section>
        <div class="rating-section">
            <div class="search-container"><input type="text" id="rankSearch" placeholder="🔍 Поиск по имени..."></div>
            <div class="city-filter"><label style="color:#fbbf24;">🏙️ Город:</label><select id="citySelect"><option value="all">Все города</option></select></div>
            <div class="weight-filter"><label style="color:#fbbf24;">⚖️ Весовая категория:</label>
                <select id="weightClassSelect">
                    <option value="all">Все категории</option>
                    <option value="Наилегчайшая (45–50 кг)">Наилегчайшая (45–50 кг)</option><option value="Легчайшая (51–56 кг)">Легчайшая (51–56 кг)</option>
                    <option value="Полулёгкая (57–61 кг)">Полулёгкая (57–61 кг)</option><option value="Лёгкая (62–66 кг)">Лёгкая (62–66 кг)</option>
                    <option value="1-я полусредняя (67–71 кг)">1-я полусредняя (67–71 кг)</option><option value="Полусредняя (72–77 кг)">Полусредняя (72–77 кг)</option>
                    <option value="1-я средняя (78–83 кг)">1-я средняя (78–83 кг)</option><option value="Средняя (84–89 кг)">Средняя (84–89 кг)</option>
                    <option value="Полутяжёлая (90–99 кг)">Полутяжёлая (90–99 кг)</option><option value="Тяжёлая (100+ кг)">Тяжёлая (100+ кг)</option>
                </select>
            </div>
            <div class="rating-filters" id="ratingFilters">
                <button class="filter-btn active" data-sport="all">Все виды</button>
                <button class="filter-btn" data-sport="Бокс">Бокс</button>
                <button class="filter-btn" data-sport="Борьба">Борьба</button>
                <button class="filter-btn" data-sport="ММА">ММА</button>
            </div>
            <table class="rating-table"><thead><tr><th>№</th><th>Аватар</th><th>Спортсмен</th><th>Город</th><th>⭐ FRS</th></tr></thead>
            <tbody id="ratingTableBody"><tr id="loadingRow"><td colspan="5">⏳ Загрузка...</td></table></tbody></table>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container footer-content"><div class="footer-logo"><div class="logo">PRO<span>RANK</span></div><p>Рейтинг любительского спорта</p></div>
        <div class="footer-about"><h4>О проекте</h4><p>Платформа для спортсменов-любителей.</p></div>
        <div class="footer-links"><h4>Навигация</h4><a href="index.html">Главная</a><a href="rating.html">Рейтинг</a><a href="login.html">Вход</a></div></div>
        <div class="footer-bottom"><p>&copy; 2026 PRORANK</p></div>
    </footer>

    <script type="importmap">

    </script>
    <script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, getDocs, query, orderBy, where, doc, getDoc } from "firebase/firestore";
    import { getAuth, onAuthStateChanged } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
        authDomain: "proranklive.firebaseapp.com",
        projectId: "proranklive",
        storageBucket: "proranklive.firebasestorage.app",
        messagingSenderId: "716836144015",
        appId: "1:716836144015:web:f1575147750608d0f881fa"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allFighters = [];
    let currentSport = 'all';
    let currentCity = 'all';
    let currentWeightClass = 'all';

    // Обновление баланса вызовов в шапке
    async function updateHeaderBalance() {
        const user = auth.currentUser;
        const balanceDiv = document.getElementById('balanceIndicator');
        const balanceCount = document.getElementById('headerChallengesCount');
        
        if (!user || !balanceDiv) return;
        
        try {
            const userDoc = await getDoc(doc(db, "fighters", user.uid));
            const data = userDoc.data();
            const free = data.freeChallenges || 0;
            const purchased = data.purchasedChallenges || 0;
            const total = free + purchased;
            // Кнопка "+" в индикаторе вызовов
function setupBalancePlusButton() {
    const plusBtn = document.getElementById('balancePlusBtn');
    if (plusBtn) {
        plusBtn.onclick = () => window.location.href = 'shop.html';
    }
}

// Вызови её после обновления баланса
// Внутри updateHeaderBalance, после того как показали индикатор, добавь:
setupBalancePlusButton();
            balanceCount.innerText = total;
            balanceDiv.style.display = 'flex';
        } catch (err) {
            console.error('Ошибка загрузки баланса:', err);
        }
    }

    async function loadFighters() {
        const tbody = document.getElementById('ratingTableBody');
        tbody.innerHTML = '<tr><td colspan="5">⏳ Загрузка...</td></tr>';
        try {
            const q = query(collection(db, "fighters"), orderBy("frs", "desc"));
            const snapshot = await getDocs(q);
            allFighters = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const cities = [...new Set(allFighters.map(f => f.city).filter(c => c && c !== 'all'))];
            const citySelect = document.getElementById('citySelect');
            citySelect.innerHTML = '<option value="all">Все города</option>';
            cities.forEach(city => { 
                const option = document.createElement('option'); 
                option.value = city; 
                option.textContent = city; 
                citySelect.appendChild(option); 
            });
            
            applyFilters();
        } catch (error) { 
            console.error("Ошибка загрузки:", error); 
            tbody.innerHTML = '<tr><td colspan="5">❌ Ошибка загрузки. Проверьте интернет.</td></tr>';
        }
    }

    function applyFilters() {
        let filtered = [...allFighters];
        if (currentCity !== 'all') filtered = filtered.filter(f => f.city === currentCity);
        if (currentWeightClass !== 'all') filtered = filtered.filter(f => f.weightClass === currentWeightClass);
        if (currentSport !== 'all') filtered = filtered.filter(f => f.sport === currentSport);
        renderTable(filtered);
    }

    function renderTable(fighters) {
        const tbody = document.getElementById('ratingTableBody');
        tbody.innerHTML = '';
        if (fighters.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5">❌ Нет бойцов по выбранным фильтрам</td></tr>';
            return;
        }
        let rank = 1;
        fighters.forEach(f => {
            const row = tbody.insertRow();
            let medalClass = '';
            if (rank === 1) medalClass = 'gold';
            else if (rank === 2) medalClass = 'silver';
            else if (rank === 3) medalClass = 'bronze';
            row.className = medalClass;
            row.insertCell(0).innerHTML = `<span class="rank-number">${rank}</span>`;
            row.insertCell(1).innerHTML = `<img src="${f.avatar || 'Avatar.png'}" class="avatar-thumb" onerror="this.src='Avatar.png'">`;
            row.insertCell(2).innerHTML = `<strong>${f.name || 'Боец'}</strong><br><small style="color:#888">${f.sport || ''}</small>`;
            row.insertCell(3).innerText = f.city || '—';
            row.insertCell(4).innerHTML = `<span style="color:#fbbf24; font-weight:bold;">${f.frs || 0}</span> ⭐`;
            row.onclick = () => window.location.href = `profile.html?id=${f.id}`;
            rank++;
        });
    }

    function setActiveSportButton(sport) {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.getAttribute('data-sport') === sport) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    document.getElementById('citySelect').addEventListener('change', (e) => { 
        currentCity = e.target.value; 
        applyFilters(); 
    });
    
    document.getElementById('weightClassSelect').addEventListener('change', (e) => { 
        currentWeightClass = e.target.value; 
        applyFilters(); 
    });
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentSport = btn.getAttribute('data-sport');
            setActiveSportButton(currentSport);
            applyFilters();
        });
    });
    
    document.getElementById('rankSearch').addEventListener('keyup', function() {
        const term = this.value.toLowerCase().trim();
        const rows = document.querySelectorAll('#ratingTableBody tr');
        rows.forEach(row => {
            const nameCell = row.cells[2];
            if (nameCell) {
                const name = nameCell.innerText.toLowerCase();
                row.style.display = name.includes(term) ? '' : 'none';
            }
        });
    });

    const loginBtn = document.getElementById('profileLoginBtn');
    onAuthStateChanged(auth, (user) => {
        if (user && loginBtn) { 
            loginBtn.innerText = 'Мой профиль'; 
            loginBtn.href = `profile.html?id=${user.uid}`; 
            setTimeout(updateHeaderBalance, 1000);
        } else if (loginBtn) {
            loginBtn.innerText = 'Войти'; 
            loginBtn.href = 'login.html';
            const balanceDiv = document.getElementById('balanceIndicator');
            if (balanceDiv) balanceDiv.style.display = 'none';
        }
    });
    
    loadFighters();
</script>
    <script>
        // Бургер-меню
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        
        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('show');
            });
        }
    </script>
</body>
</html>
