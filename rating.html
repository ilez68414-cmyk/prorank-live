<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Рейтинг | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
        }

        .gold-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b);
            z-index: 1001;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 28px;
            position: relative;
            z-index: 2;
        }

        /* ===== ШАПКА ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo span {
            background: linear-gradient(135deg, #fbbf24, #ffdd77);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .balance-indicator {
            background: #111;
            border: 1px solid rgba(251, 191, 36, 0.5);
            border-radius: 60px;
            padding: 7px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 0 10px rgba(251,191,36,0.1);
        }
        .balance-count {
            color: #fbbf24;
            font-size: 1.1rem;
        }
        .balance-plus {
            background: rgba(251,191,36,0.15);
            border: none;
            color: #fbbf24;
            cursor: pointer;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            font-weight: bold;
            transition: 0.1s;
        }
        .balance-plus:active {
            background: #fbbf24;
            color: #000;
            transform: scale(0.94);
        }

        .menu-toggle {
            display: none;
            background: rgba(251,191,36,0.1);
            border: 1px solid #fbbf24;
            color: #fbbf24;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 12px;
        }

        .nav-links {
            display: flex;
            gap: 6px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 60px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .nav-links a i {
            margin-right: 8px;
            color: #fbbf24;
        }
        .nav-links a:hover {
            color: #fbbf24;
            background: transparent;
            text-shadow: 0 0 6px rgba(251,191,36,0.4);
        }

        /* ===== HERO ===== */
        .hero {
            text-align: center;
            padding: 50px 20px 30px;
        }
        .hero h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero h1 i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #fbbf24;
        }

        /* ===== ФИЛЬТРЫ ===== */
        .filters-section {
            background: rgba(15,15,15,0.6);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(251,191,36,0.15);
        }
        .search-container {
            margin-bottom: 20px;
        }
        #rankSearch {
            width: 100%;
            padding: 14px 20px;
            background: #1a1a1a;
            border: 1px solid rgba(251,191,36,0.3);
            color: #fff;
            border-radius: 60px;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        #rankSearch:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 10px rgba(251,191,36,0.2);
        }
        .filters-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filter-group {
            flex: 1;
            min-width: 180px;
        }
        .filter-group label {
            display: block;
            font-size: 0.75rem;
            color: #fbbf24;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .filter-group select {
            width: 100%;
            padding: 10px 16px;
            background: #1a1a1a;
            border: 1px solid rgba(251,191,36,0.3);
            color: #fff;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .sport-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #1a1a1a;
            border: 1px solid rgba(251,191,36,0.2);
            color: #ccc;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .filter-btn i {
            color: #fbbf24;
        }
        .filter-btn.active {
            background: #fbbf24;
            color: #000;
            border-color: #fbbf24;
        }
        .filter-btn.active i {
            color: #000;
        }
        .filter-btn:active {
            transform: scale(0.96);
        }

        /* ===== ТАБЛИЦА ===== */
.rating-table-wrapper {
    background: rgba(10,10,10,0.7);
    border-radius: 28px;
    overflow-x: auto;
    border: 1px solid rgba(251,191,36,0.15);
}
.rating-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
}
.rating-table thead tr {
    background: #0f0f0f;
    border-bottom: 2px solid #fbbf24;
}
.rating-table th {
    padding: 16px 12px;
    text-align: left;
    color: #ffffff;
    font-weight: 600;
    font-size: 0.85rem;
    background: #0f0f0f;
    letter-spacing: 0.3px;
}
.rating-table th i {
    margin-right: 8px;
    color: #fbbf24;
}
.rating-table td {
    padding: 14px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    vertical-align: middle;
}
        .rating-table tbody tr {
            cursor: pointer;
            transition: 0.1s;
        }
        .rating-table tbody tr:active {
            background: #1f1f1f;
        }
        .rating-table tbody tr.gold {
            background: linear-gradient(90deg, rgba(251,191,36,0.1), rgba(251,191,36,0.02));
            border-left: 3px solid #fbbf24;
        }
        .rating-table tbody tr.silver {
            background: linear-gradient(90deg, rgba(192,192,192,0.08), transparent);
            border-left: 3px solid #C0C0C0;
        }
        .rating-table tbody tr.bronze {
            background: linear-gradient(90deg, rgba(205,127,50,0.08), transparent);
            border-left: 3px solid #CD7F32;
        }
        .rank-number {
            font-size: 1.3rem;
            font-weight: 800;
            color: #fbbf24;
        }
        .gold .rank-number { color: #fbbf24; text-shadow: 0 0 5px rgba(251,191,36,0.5); }
        .silver .rank-number { color: #C0C0C0; }
        .bronze .rank-number { color: #CD7F32; }
        .avatar-thumb {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fbbf24;
        }
        .fighter-name {
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .fighter-sport {
            font-size: 0.7rem;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
        }
        .city-cell {
            font-size: 0.85rem;
        }
        .frs-cell {
            font-weight: 800;
            color: #fbbf24;
            font-size: 1rem;
        }

        /* ===== ПОДВАЛ ===== */
        .main-footer {
            background: #0a0a0a;
            border-top: 1px solid rgba(251,191,36,0.15);
            margin-top: 60px;
            padding: 48px 0 24px;
        }
        .footer-content {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 32px;
            margin-bottom: 32px;
        }
        .footer-logo .logo {
            font-size: 1.3rem;
            display: inline-block;
        }
        .footer-logo p {
            font-size: 0.75rem;
            color: #777;
            margin-top: 8px;
        }
        .footer-about h4, .footer-links h4 {
            color: #fbbf24;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .footer-about p {
            font-size: 0.8rem;
            color: #888;
            max-width: 250px;
        }
        .footer-links a {
            display: block;
            color: #aaa;
            text-decoration: none;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }
        .footer-links a:hover {
            color: #fbbf24;
        }
        .footer-bottom {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.7rem;
            color: #666;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 18px;
            }
            .navbar {
                padding: 12px 18px;
            }
            .menu-toggle {
                display: block;
            }
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 68px;
                left: 18px;
                right: 18px;
                background: #0f0f0f;
                border-radius: 24px;
                padding: 20px;
                gap: 10px;
                border: 1px solid rgba(251,191,36,0.3);
            }
            .nav-links.show {
                display: flex;
            }
            .nav-links a {
                width: 100%;
                text-align: center;
                padding: 12px;
            }
            .hero h1 {
                font-size: 1.6rem;
            }
            .filters-row {
                flex-direction: column;
                gap: 12px;
            }
            .avatar-thumb {
                width: 36px;
                height: 36px;
            }
            .fighter-name {
                font-size: 0.85rem;
            }
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
            .footer-about p {
                margin: 0 auto;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 10px;
        }
        .icon-gold { color: #fbbf24; }
        .icon-red { color: #ff5555; }
    </style>
</head>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, getDocs, query, orderBy, doc, getDoc } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allFighters = [];
        let currentSport = 'all';
        let currentCity = 'all';
        let currentWeightClass = 'all';

        function getLeague(frs) {
            if (frs >= 5000) return { name: 'ЛЕГЕНДАРНАЯ', icon: 'fa-skull', color: '#ff4500' };
            if (frs >= 3500) return { name: 'ЭЛИТНАЯ', icon: 'fa-dragon', color: '#9400d3' };
            if (frs >= 2000) return { name: 'АЛМАЗНАЯ', icon: 'fa-gem', color: '#00ffff' };
            if (frs >= 1000) return { name: 'ЗОЛОТАЯ', icon: 'fa-crown', color: '#ffd700' };
            if (frs >= 500) return { name: 'СЕРЕБРЯНАЯ', icon: 'fa-medal', color: '#c0c0c0' };
            return { name: 'БРОНЗОВАЯ', icon: 'fa-medal', color: '#cd7f32' };
        }

        async function updateHeaderBalance() {
            const user = auth.currentUser;
            const balanceDiv = document.getElementById('balanceIndicator');
            const balanceCount = document.getElementById('headerChallengesCount');
            if (!user || !balanceDiv) return;
            try {
                const userDoc = await getDoc(doc(db, "fighters", user.uid));
                const data = userDoc.data();
                const total = (data.freeChallenges || 0) + (data.purchasedChallenges || 0);
                balanceCount.innerText = total;
                balanceDiv.style.display = 'flex';
            } catch (err) { console.error(err); }
        }

        async function loadFighters() {
            const tbody = document.getElementById('ratingTableBody');
            tbody.innerHTML = '<tr><td colspan="5"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</td></tr>';
            try {
                const q = query(collection(db, "fighters"), orderBy("frs", "desc"));
                const snapshot = await getDocs(q);
                allFighters = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                const cities = [...new Set(allFighters.map(f => f.city).filter(c => c && c !== 'all'))];
                const citySelect = document.getElementById('citySelect');
                citySelect.innerHTML = '<option value="all">Все города</option>';
                cities.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
                
                applyFilters();
            } catch (error) {
                console.error("Ошибка загрузки:", error);
                tbody.innerHTML = '<tr><td colspan="5"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки. Проверьте интернет.</td></tr>';
            }
        }

        function applyFilters() {
            let filtered = [...allFighters];
            if (currentCity !== 'all') filtered = filtered.filter(f => f.city === currentCity);
            if (currentWeightClass !== 'all') filtered = filtered.filter(f => f.weightClass === currentWeightClass);
            if (currentSport !== 'all') filtered = filtered.filter(f => f.sport === currentSport);
            renderTable(filtered);
        }

        function renderTable(fighters) {
            const tbody = document.getElementById('ratingTableBody');
            tbody.innerHTML = '';
            if (fighters.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5"><i class="fas fa-info-circle"></i> Нет бойцов по выбранным фильтрам</td></tr>';
                return;
            }
            let rank = 1;
            fighters.forEach(f => {
                const row = tbody.insertRow();
                let medalClass = '';
                if (rank === 1) medalClass = 'gold';
                else if (rank === 2) medalClass = 'silver';
                else if (rank === 3) medalClass = 'bronze';
                row.className = medalClass;
                
                row.insertCell(0).innerHTML = `<span class="rank-number">${rank}</span>`;
                row.insertCell(1).innerHTML = `<img src="${f.avatar || 'Avatar.png'}" class="avatar-thumb" onerror="this.src='Avatar.png'">`;
                
                const league = getLeague(f.frs || 0);
                const leagueIcon = `<i class="fas ${league.icon}" style="color:${league.color}; font-size:0.8rem;"></i>`;
                const sportIcon = f.sport === 'Бокс' ? 'fa-fist-raised' : (f.sport === 'Борьба' ? 'fa-handshake' : 'fa-shield-alt');
                
                row.insertCell(2).innerHTML = `
                    <div class="fighter-name">
                        <strong>${f.name || 'Боец'}</strong> ${leagueIcon}
                    </div>
                    <div class="fighter-sport">
                        <i class="fas ${sportIcon}"></i> ${f.sport || ''}
                    </div>
                `;
                row.insertCell(3).innerHTML = `<span class="city-cell"><i class="fas fa-location-dot" style="color:#fbbf24; font-size:0.7rem;"></i> ${f.city || '—'}</span>`;
                row.insertCell(4).innerHTML = `<span class="frs-cell"><i class="fas fa-star"></i> ${f.frs || 0}</span>`;
                row.onclick = () => window.location.href = `profile.html?id=${f.id}`;
                rank++;
            });
        }

        function setActiveSportButton(sport) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.getAttribute('data-sport') === sport) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        document.getElementById('citySelect').addEventListener('change', (e) => {
            currentCity = e.target.value;
            applyFilters();
        });
        
        document.getElementById('weightClassSelect').addEventListener('change', (e) => {
            currentWeightClass = e.target.value;
            applyFilters();
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentSport = btn.getAttribute('data-sport');
                setActiveSportButton(currentSport);
                applyFilters();
            });
        });
        
        document.getElementById('rankSearch').addEventListener('keyup', function() {
            const term = this.value.toLowerCase().trim();
            const rows = document.querySelectorAll('#ratingTableBody tr');
            rows.forEach(row => {
                const nameCell = row.cells[2];
                if (nameCell) {
                    const name = nameCell.innerText.toLowerCase();
                    row.style.display = name.includes(term) ? '' : 'none';
                }
            });
        });

        const loginBtn = document.getElementById('profileLoginBtn');
        onAuthStateChanged(auth, (user) => {
            if (user && loginBtn) {
                loginBtn.innerHTML = '<i class="fas fa-user"></i> Мой профиль';
                loginBtn.href = `profile.html?id=${user.uid}`;
                setTimeout(updateHeaderBalance, 1000);
            } else if (loginBtn) {
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
                loginBtn.href = 'login.html';
                const balanceDiv = document.getElementById('balanceIndicator');
                if (balanceDiv) balanceDiv.style.display = 'none';
            }
        });
        
        const plusBtn = document.getElementById('balancePlusBtn');
        if (plusBtn) plusBtn.onclick = () => window.location.href = 'shop.html';
        
        loadFighters();

        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('show');
        });
    </script>
</body>
</html>
