<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реквизиты | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: rgba(15,15,15,0.8);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .container h1 {
            font-size: 1.6rem;
            color: #fbbf24;
            margin-bottom: 8px;
        }
        .container .subtitle {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }
        .requisite-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }
        .requisite-item .label {
            color: #888;
        }
        .requisite-item .value {
            color: #fff;
            font-weight: 500;
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #fbbf24;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Реквизиты</h1>
        <p class="subtitle">Юридическая информация для документов и оплаты</p>

        <div class="requisite-item">
            <span class="label">ИНН</span>
            <span class="value" id="innDisplay">060801575802</span>
        </div>
        <div class="requisite-item">
            <span class="label">ОГРНИП</span>
            <span class="value" id="ogrnDisplay">322770012345678</span>
        </div>
        <div class="requisite-item">
            <span class="label">ИП</span>
            <span class="value">Султыгов Илез Якубович</span>
        </div>
        <div class="requisite-item">
            <span class="label">Юридический адрес</span>
            <span class="value">г. Назрань</span>
        </div>
        <div class="requisite-item">
            <span class="label">Сайт</span>
            <span class="value">prorank.ru</span>
        </div>

        <a href="index.html" class="back-link">← На главную</a>
    </div>
</body>
</html>
