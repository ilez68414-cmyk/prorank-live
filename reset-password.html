<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Сброс пароля | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(15,15,15,0.8);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(251,191,36,0.2);
            animation: fadeInUp 0.4s ease;
        }
        .container h1 {
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #fff, #fbbf24);
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }
        .container .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #aaa;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #1a1a1a;
            border: 1px solid rgba(251,191,36,0.25);
            color: #fff;
            border-radius: 60px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251,191,36,0.15);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #fbbf24;
            color: #000;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-submit:hover {
            background: #ffdd44;
            transform: translateY(-2px);
        }
        .btn-submit:active {
            transform: scale(0.97);
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 16px;
            min-height: 24px;
        }
        .message.success { color: #16a34a; }
        .message.error { color: #dc2626; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .back-link:hover { color: #fbbf24; }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .password-requirements {
            font-size: 0.7rem;
            color: #666;
            margin-top: 4px;
        }
        .password-requirements .ok { color: #16a34a; }
        .password-requirements .fail { color: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Сброс пароля</h1>
        <p class="subtitle">Введите новый пароль для вашего аккаунта</p>

        <div id="resetForm">
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Новый пароль</label>
                <input type="password" id="newPassword" placeholder="Минимум 6 символов" minlength="6">
                <div class="password-requirements" id="passwordHint">
                    <span id="lengthCheck">🔴 Минимум 6 символов</span>
                </div>
            </div>

            <div class="input-group">
                <label><i class="fas fa-check-circle"></i> Подтвердите пароль</label>
                <input type="password" id="confirmPassword" placeholder="Повторите пароль">
            </div>

            <button class="btn-submit" id="resetBtn">
                <i class="fas fa-save"></i> Сохранить пароль
            </button>
        </div>

        <div id="resultMessage" class="message"></div>

        <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Вернуться ко входу</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, confirmPasswordReset, verifyPasswordResetCode } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Получаем код из URL
        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode');
        const mode = urlParams.get('mode');

        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const resetBtn = document.getElementById('resetBtn');
        const messageDiv = document.getElementById('resultMessage');
        const passwordHint = document.getElementById('passwordHint');

        // Проверяем, что это режим сброса пароля
        if (mode !== 'resetPassword' || !oobCode) {
            messageDiv.className = 'message error';
            messageDiv.textContent = '❌ Недействительная ссылка для сброса пароля.';
            resetBtn.disabled = true;
            resetBtn.style.opacity = '0.5';
        }

        // Проверка длины пароля
        function updatePasswordHint() {
            const len = newPassword.value.length;
            const span = document.getElementById('lengthCheck');
            if (len >= 6) {
                span.innerHTML = '✅ Минимум 6 символов';
                span.style.color = '#16a34a';
            } else {
                span.innerHTML = '🔴 Минимум 6 символов';
                span.style.color = '#dc2626';
            }
        }

        newPassword.addEventListener('input', updatePasswordHint);

        resetBtn.addEventListener('click', async () => {
            const password = newPassword.value;
            const confirm = confirmPassword.value;

            // Очищаем предыдущие сообщения
            messageDiv.className = 'message';
            messageDiv.textContent = '';

            // Проверяем пароль
            if (!password || password.length < 6) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Пароль должен быть минимум 6 символов';
                newPassword.focus();
                return;
            }

            if (password !== confirm) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Пароли не совпадают';
                confirmPassword.focus();
                return;
            }

            if (!oobCode) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Недействительная ссылка';
                return;
            }

            // Блокируем кнопку
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<div class="loading-spinner"></div> Сохранение...';

            try {
                // Проверяем код (опционально, но полезно)
                const email = await verifyPasswordResetCode(auth, oobCode);
                console.log('✅ Код валиден для email:', email);

                // Устанавливаем новый пароль
                await confirmPasswordReset(auth, oobCode, password);

                messageDiv.className = 'message success';
                messageDiv.innerHTML = '✅ Пароль успешно изменён! <br> Теперь вы можете войти с новым паролем.';

                resetBtn.innerHTML = '<i class="fas fa-check"></i> Готово!';
                resetBtn.style.background = '#16a34a';
                resetBtn.style.color = '#fff';

                // Перенаправление через 3 секунды
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);

            } catch (err) {
                console.error('Ошибка сброса пароля:', err);

                if (err.code === 'auth/expired-action-code') {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Ссылка устарела. Запросите восстановление пароля заново.';
                } else if (err.code === 'auth/invalid-action-code') {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Недействительная ссылка. Запросите восстановление заново.';
                } else if (err.code === 'auth/weak-password') {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Пароль слишком слабый. Используйте минимум 6 символов.';
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Ошибка: ' + err.message;
                }

                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-save"></i> Сохранить пароль';
            }
        });

        // Enter для отправки
        confirmPassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') resetBtn.click();
        });
        newPassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') confirmPassword.focus();
        });
    </script>
</body>
</html>
