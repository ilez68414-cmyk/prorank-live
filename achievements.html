<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRORANK">
    <meta name="theme-color" content="#fbbf24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#fbbf24">
    <meta name="description" content="Достижения PRORANK — получай награды за победы, активность и рост рейтинга">
    <title>Достижения | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        .gold-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b);
            z-index: 1001;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
            width: 100%;
        }

        /* ===== ПРОСТАЯ ШАПКА ===== */
        .simple-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 0;
            margin-bottom: 10px;
            position: relative;
        }
        .back-arrow {
            background: rgba(251,191,36,0.1);
            border: 1px solid rgba(251,191,36,0.3);
            color: #fbbf24;
            font-size: 1.3rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .back-arrow:hover {
            background: rgba(251,191,36,0.2);
            transform: scale(1.05);
        }
        .back-arrow:active {
            transform: scale(0.94);
        }
        .simple-header h1 {
            font-size: clamp(1.3rem, 5vw, 1.6rem);
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #fbbf24);
            background-clip: text;
            color: transparent;
        }
        .simple-header h1 i {
            background: none;
            background-clip: unset;
            color: #fbbf24;
        }

        /* Баланс в правом углу */
        .balance-indicator {
            background: #111;
            border: 1px solid rgba(251, 191, 36, 0.5);
            border-radius: 60px;
            padding: 7px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            position: absolute;
            top: 20px;
            right: 0;
            transition: all 0.2s ease;
        }
        .balance-indicator:hover {
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251,191,36,0.2);
        }
        .balance-count {
            color: #fbbf24;
            font-size: 1.1rem;
        }
        .balance-plus {
            background: rgba(251,191,36,0.15);
            border: none;
            color: #fbbf24;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .balance-plus:hover {
            background: rgba(251,191,36,0.3);
            transform: scale(1.05);
        }
        .balance-plus:active {
            background: #fbbf24;
            color: #000;
            transform: scale(0.94);
        }

        /* Статистика прогресса */
        .progress-stats {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(8px);
            padding: 12px 28px;
            border-radius: 60px;
            margin: 20px 0;
            border: 1px solid rgba(251,191,36,0.2);
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .progress-stats:hover {
            border-color: rgba(251,191,36,0.4);
            transform: translateY(-2px);
        }
        .progress-stats i {
            color: #fbbf24;
        }
        .progress-stats .earned-count {
            color: #fbbf24;
            font-size: 1.2rem;
            font-weight: 800;
        }

        /* Сетка достижений - компактная на телефоне */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin: 20px 0 50px;
        }
        
        .achievement-card {
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            gap: 14px;
            align-items: center;
            border: 1px solid rgba(251,191,36,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.4s ease both;
        }
        .achievement-card:nth-child(1) { animation-delay: 0.05s; }
        .achievement-card:nth-child(2) { animation-delay: 0.1s; }
        .achievement-card:nth-child(3) { animation-delay: 0.15s; }
        .achievement-card:nth-child(4) { animation-delay: 0.2s; }
        .achievement-card:nth-child(5) { animation-delay: 0.25s; }
        .achievement-card:nth-child(6) { animation-delay: 0.3s; }

        .achievement-card:hover {
            transform: translateY(-3px);
            border-color: rgba(251,191,36,0.3);
            background: rgba(25,25,35,0.9);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .achievement-card:active {
            transform: translateY(-1px) scale(0.99);
        }
        
        /* ПОЛУЧЕННЫЕ достижения - цветные */
        .achievement-card.earned {
            border: 1px solid rgba(251,191,36,0.4);
            background: linear-gradient(135deg, rgba(30,42,26,0.7), rgba(15,26,15,0.7));
        }
        
        /* НЕПОЛУЧЕННЫЕ достижения - серые/бесцветные */
        .achievement-card.locked {
            background: rgba(30,30,35,0.6);
            border: 1px solid rgba(100,100,120,0.2);
            filter: grayscale(0.4);
        }
        .achievement-card.locked .achievement-icon i {
            color: #666;
        }
        .achievement-card.locked .achievement-name {
            color: #999;
        }
        .achievement-card.locked .achievement-desc {
            color: #777;
        }
        .achievement-card.locked .achievement-how {
            color: #888;
        }
        .achievement-card.locked .achievement-reward {
            opacity: 0.5;
        }
        
        .achievement-icon {
            font-size: 2rem;
            width: 52px;
            text-align: center;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }
        .earned .achievement-icon i {
            color: #fbbf24;
        }
        .achievement-card:hover .achievement-icon {
            transform: scale(1.05);
        }
        .achievement-info {
            flex: 1;
        }
        .achievement-name {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .achievement-desc {
            font-size: 0.65rem;
            color: #aaa;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .achievement-how {
            font-size: 0.6rem;
            color: #fbbf24;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .locked .achievement-how {
            color: #888;
        }
        .achievement-reward {
            font-size: 0.6rem;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .achievement-reward.positive {
            color: #16a34a;
        }
        .locked .achievement-reward.positive {
            color: #558855;
        }
        .achievement-status {
            min-width: 80px;
            text-align: right;
            font-size: 0.7rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .status-earned {
            color: #16a34a;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
        }
        .status-locked {
            color: #dc2626;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }

        /* Анимации */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== ПОДВАЛ ===== */
        .main-footer {
            background: #0a0a0a;
            border-top: 1px solid rgba(251,191,36,0.15);
            margin-top: 40px;
            padding: 40px 0 24px;
        }
        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 32px;
            margin-bottom: 32px;
        }
        .footer-logo .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .footer-logo .logo span {
            background: linear-gradient(135deg, #fbbf24, #ffdd77);
            background-clip: text;
            color: transparent;
        }
        .footer-logo p {
            font-size: 0.7rem;
            color: #777;
            margin-top: 6px;
        }
        .footer-social {
            display: flex;
            gap: 20px;
        }
        .social-icon {
            color: #aaa;
            font-size: 1.3rem;
            transition: all 0.2s ease;
        }
        .social-icon:hover {
            color: #fbbf24;
            transform: translateY(-3px);
        }
        .footer-links {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.75rem;
            transition: color 0.2s ease;
        }
        .footer-links a:hover {
            color: #fbbf24;
        }
        .footer-bottom {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.65rem;
            color: #555;
        }

        /* Адаптив - компактные карточки на телефоне */
        @media (max-width: 768px) {
            .container {
                padding: 0 16px;
            }
            .simple-header {
                padding: 16px 0;
            }
            .back-arrow {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
            .simple-header h1 {
                font-size: 1.3rem;
            }
            .balance-indicator {
                padding: 5px 12px;
                top: 16px;
            }
            .balance-indicator span {
                font-size: 0.8rem;
            }
            .achievements-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .achievement-card {
                padding: 12px;
                gap: 10px;
            }
            .achievement-icon {
                font-size: 1.6rem;
                width: 45px;
            }
            .achievement-name {
                font-size: 0.85rem;
            }
            .achievement-desc {
                font-size: 0.6rem;
            }
            .achievement-how {
                font-size: 0.55rem;
            }
            .achievement-status {
                font-size: 0.65rem;
                min-width: 70px;
            }
            .status-earned, .status-locked {
                justify-content: center;
            }
            .footer-inner {
                flex-direction: column;
                text-align: center;
            }
            .progress-stats {
                padding: 8px 16px;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .achievement-card {
                padding: 10px;
                gap: 8px;
            }
            .achievement-icon {
                font-size: 1.4rem;
                width: 40px;
            }
            .achievement-name {
                font-size: 0.8rem;
            }
            .achievement-status {
                font-size: 0.6rem;
                min-width: 65px;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 10px;
        }
        .icon-gold { color: #fbbf24; }
        
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(251,191,36,0.3);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="gold-top"></div>

    <div class="container">
        <div class="simple-header">
            <button class="back-arrow" id="backBtn"><i class="fas fa-arrow-left"></i></button>
            <h1><i class="fas fa-trophy"></i> Все достижения</h1>
            <div class="balance-indicator" id="balanceIndicator" style="display: none;">
                <i class="fas fa-crosshairs"></i>
                <span class="balance-count" id="headerChallengesCount">0</span>
                <button class="balance-plus" id="balancePlusBtn">+</button>
            </div>
        </div>

        <div style="text-align: center;">
            <div id="progressStats" class="progress-stats">
                <div class="loading-spinner"></div> Загрузка...
            </div>
        </div>

        <div id="achievementsGrid" class="achievements-grid">
            <div class="loading"><div class="loading-spinner"></div> Загрузка достижений...</div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-logo">
                    <div class="logo">PRO<span>RANK</span></div>
                    <p>Рейтинг спортсменов-любителей</p>
                </div>
                <div class="footer-social">
                    <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Telegram"><i class="fab fa-telegram"></i></a>
                    <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="VK"><i class="fab fa-vk"></i></a>
                    <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                    <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                </div>
                <div class="footer-links">
                    <a href="about.html">О проекте</a>
                    <a href="privacy.html">Конфиденциальность</a>
                    <a href="disclaimer.html">Дисклеймер</a>
                    <a href="rules.html">Правила</a>
                    <a href="leagues.html">Лиги</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 PRORANK. Все права защищены.</p>
            </div>
        </div>
    </footer>
 <!-- Нижнее мобильное меню -->
<div id="mobileBottomNavContainer"></div>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, getDocs, query, where, doc, getDoc } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        async function updateHeaderBalance() {
            const user = auth.currentUser;
            const balanceDiv = document.getElementById('balanceIndicator');
            const balanceCount = document.getElementById('headerChallengesCount');
            if (!user || !balanceDiv) return;
            try {
                const userDoc = await getDoc(doc(db, "fighters", user.uid));
                const data = userDoc.data();
                const total = (data.freeChallenges || 0) + (data.purchasedChallenges || 0);
                balanceCount.innerText = total;
                balanceDiv.style.display = 'flex';
            } catch (err) { 
                console.error(err);
                balanceDiv.style.display = 'none';
            }
        }

        async function loadAchievementsPage() {
            const container = document.getElementById('achievementsGrid');
            const progressStats = document.getElementById('progressStats');
            
            try {
                const achievementsSnap = await getDocs(collection(db, "achievements"));
                const allAchievements = [];
                achievementsSnap.forEach(doc => allAchievements.push({ id: doc.id, ...doc.data() }));
                
                let earnedIds = new Set();
                let earnedCount = 0;
                
                if (currentUser) {
                    const userAchievementsSnap = await getDocs(query(collection(db, "userAchievements"), where("userId", "==", currentUser.uid)));
                    userAchievementsSnap.forEach(doc => earnedIds.add(doc.data().achievementId));
                    earnedCount = earnedIds.size;
                }
                
                const totalCount = allAchievements.length;
                
                if (progressStats) {
                    if (currentUser) {
                        const percent = totalCount > 0 ? Math.round((earnedCount / totalCount) * 100) : 0;
                        progressStats.innerHTML = `
                            <i class="fas fa-medal icon-gold"></i>
                            <span class="earned-count">${earnedCount}</span>
                            <span>/ ${totalCount} достижений</span>
                            <span style="margin-left: 8px; color: #fbbf24;">${percent}%</span>
                        `;
                    } else {
                        progressStats.innerHTML = `<i class="fas fa-lock"></i> Войдите, чтобы отслеживать прогресс`;
                    }
                }
                
                if (allAchievements.length === 0) {
                    container.innerHTML = '<div class="loading"><i class="fas fa-info-circle"></i> Достижения пока не добавлены</div>';
                    return;
                }
                
                let html = '';
                allAchievements.forEach(ach => {
                    const earned = earnedIds.has(ach.id);
                    const icon = ach.icon || 'fa-medal';
                    
                    let rewardText = '';
                    let rewardClass = 'positive';
                    if (ach.reward) {
                        const amount = ach.reward.amount;
                        const type = ach.reward.type === 'frs' ? 'FRS' : (ach.reward.type === 'challenges' ? 'вызовов' : (ach.reward.type === 'premium' ? 'дней премиума' : ''));
                        const sign = amount > 0 ? '+' : '';
                        rewardText = `${sign}${amount} ${type}`;
                        rewardClass = amount > 0 ? 'positive' : 'negative';
                    }
                    
                    html += `
                        <div class="achievement-card ${earned ? 'earned' : 'locked'}">
                            <div class="achievement-icon"><i class="fas ${icon}"></i></div>
                            <div class="achievement-info">
                                <div class="achievement-name">${escapeHtml(ach.name)}</div>
                                <div class="achievement-desc">${escapeHtml(ach.description || '')}</div>
                                <div class="achievement-how"><i class="fas fa-question-circle"></i> ${escapeHtml(ach.howTo || ach.description || '')}</div>
                                ${rewardText ? `<div class="achievement-reward ${rewardClass}"><i class="fas fa-gift"></i> Награда: ${rewardText}</div>` : ''}
                            </div>
                            <div class="achievement-status">
                                ${earned ? '<span class="status-earned"><i class="fas fa-check-circle"></i> Получено</span>' : '<span class="status-locked"><i class="fas fa-lock"></i> Не получено</span>'}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            } catch (err) {
                console.error('Ошибка загрузки ачивок:', err);
                container.innerHTML = '<div class="loading"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки достижений</div>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                setTimeout(updateHeaderBalance, 1000);
            } else {
                const balanceDiv = document.getElementById('balanceIndicator');
                if (balanceDiv) balanceDiv.style.display = 'none';
            }
            await loadAchievementsPage();
        });

        const plusBtn = document.getElementById('balancePlusBtn');
        if (plusBtn) plusBtn.onclick = () => window.location.href = 'shop.html';

        const backBtn = document.getElementById('backBtn');
        if (backBtn) {
            backBtn.addEventListener('click', () => {
                if (document.referrer && document.referrer.includes(window.location.host)) {
                    window.history.back();
                } else {
                    window.location.href = 'profile.html';
                }
            });
        }
    </script>
</body>
</html>
