<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="/prorank-live/manifest.json">
    <link rel="apple-touch-icon" href="/prorank-live/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRORANK">
    <meta name="theme-color" content="#fbbf24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Достижения PRORANK — получай награды за победы, активность и рост рейтинга">
    <title>Достижения | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                    radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                    linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
        background-attachment: fixed;
        color: #fff;
        line-height: 1.4;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    main { flex: 1; }

    .gold-top {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b);
        z-index: 1001;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
        position: relative;
        z-index: 2;
        width: 100%;
    }

    .simple-header {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 20px 0;
        margin-bottom: 10px;
        position: relative;
    }
    .back-arrow {
        background: rgba(251,191,36,0.1);
        border: 1px solid rgba(251,191,36,0.3);
        color: #fbbf24;
        font-size: 1.3rem;
        cursor: pointer;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
    }
    .back-arrow:hover {
        background: rgba(251,191,36,0.2);
        transform: scale(1.05);
    }
    .simple-header h1 {
        font-size: clamp(1.3rem, 5vw, 1.6rem);
        font-weight: 700;
        background: linear-gradient(135deg, #fff, #fbbf24);
        background-clip: text;
        color: transparent;
    }
    .simple-header h1 i {
        background: none;
        background-clip: unset;
        color: #fbbf24;
    }

    .balance-indicator {
        background: #111;
        border: 1px solid rgba(251, 191, 36, 0.5);
        border-radius: 60px;
        padding: 7px 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        font-size: 0.9rem;
        position: absolute;
        top: 20px;
        right: 0;
        transition: all 0.2s ease;
    }
    .balance-indicator:hover {
        border-color: #fbbf24;
        box-shadow: 0 0 15px rgba(251,191,36,0.2);
    }
    .balance-count { color: #fbbf24; font-size: 1.1rem; }
    .balance-plus {
        background: rgba(251,191,36,0.15);
        border: none;
        color: #fbbf24;
        cursor: pointer;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        transition: all 0.2s ease;
    }
    .balance-plus:hover {
        background: rgba(251,191,36,0.3);
        transform: scale(1.05);
    }

    .progress-stats {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        background: rgba(15,15,15,0.7);
        backdrop-filter: blur(8px);
        padding: 12px 28px;
        border-radius: 60px;
        margin: 20px 0;
        border: 1px solid rgba(251,191,36,0.2);
        font-size: 0.9rem;
        font-weight: 600;
    }
    .progress-stats:hover {
        border-color: rgba(251,191,36,0.4);
        transform: translateY(-2px);
    }
    .progress-stats .earned-count {
        color: #fbbf24;
        font-size: 1.2rem;
        font-weight: 800;
    }

    /* ===== ОБНОВЛЕННАЯ СЕТКА АЧИВОК С УВЕЛИЧЕННЫМИ ИКОНКАМИ ===== */
    .achievements-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
        margin: 20px 0 50px;
    }
    
    .achievement-card {
        background: rgba(15,15,15,0.7);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 16px 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        border: 1px solid rgba(251,191,36,0.1);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .achievement-card::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at center, rgba(251,191,36,0.03), transparent 70%);
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
    }

    .achievement-card:hover::before {
        opacity: 1;
    }

    .achievement-card:hover {
        transform: translateY(-4px);
        border-color: rgba(251,191,36,0.35);
        background: rgba(25,25,35,0.95);
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .achievement-card.earned {
        border: 1px solid rgba(251,191,36,0.35);
        background: linear-gradient(145deg, rgba(30,42,26,0.75), rgba(15,26,15,0.7));
        box-shadow: 0 4px 15px rgba(251,191,36,0.05);
    }

    .achievement-card.earned:hover {
        border-color: rgba(251,191,36,0.6);
        box-shadow: 0 8px 30px rgba(251,191,36,0.12);
    }

    .achievement-card.locked {
        background: rgba(30,30,35,0.6);
        border: 1px solid rgba(100,100,120,0.15);
        opacity: 0.8;
    }

    .achievement-card.locked:hover {
        opacity: 0.95;
        border-color: rgba(100,100,120,0.3);
        background: rgba(30,30,35,0.85);
    }
    
    /* ===== УВЕЛИЧЕННЫЙ КОНТЕЙНЕР ИКОНКИ С ФОНОМ ===== */
    .achievement-icon {
        width: 80px;
        height: 80px;
        margin-bottom: 12px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 18px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.05);
        transition: all 0.3s ease;
        position: relative;
    }

    .earned .achievement-icon {
        background: rgba(251,191,36,0.06);
        border-color: rgba(251,191,36,0.12);
        box-shadow: 0 0 20px rgba(251,191,36,0.04);
    }

    .earned:hover .achievement-icon {
        background: rgba(251,191,36,0.1);
        border-color: rgba(251,191,36,0.2);
        box-shadow: 0 0 30px rgba(251,191,36,0.08);
        transform: scale(1.03);
    }

    .locked .achievement-icon {
        background: rgba(255,255,255,0.01);
        border-color: rgba(255,255,255,0.02);
        opacity: 0.6;
    }

    /* ===== УВЕЛИЧЕННЫЕ PNG КАРТИНКИ ===== */
    .achievement-icon img {
        width: 80px;
        height: 80px;
        object-fit: contain;
        transition: all 0.3s ease;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }

    .earned .achievement-icon img {
        filter: drop-shadow(0 2px 8px rgba(251,191,36,0.15));
    }

    .earned:hover .achievement-icon img {
        filter: drop-shadow(0 4px 16px rgba(251,191,36,0.25));
        transform: scale(1.05);
    }

    .achievement-icon i {
        font-size: 2.8rem;
        color: #fbbf24;
        transition: all 0.3s ease;
    }

    .locked .achievement-icon i {
        color: #666;
    }
    
    .achievement-info {
        width: 100%;
    }
    .achievement-name {
        font-size: 0.85rem;
        font-weight: 700;
        margin-bottom: 4px;
        word-break: break-word;
        transition: color 0.3s ease;
    }

    .earned .achievement-name {
        color: #fff;
    }

    .locked .achievement-name {
        color: #999;
    }

    .achievement-card:hover .achievement-name {
        color: #fbbf24;
    }

    .achievement-desc {
        font-size: 0.6rem;
        color: #aaa;
        margin-bottom: 6px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        transition: color 0.3s ease;
    }

    .achievement-card:hover .achievement-desc {
        color: #ccc;
    }

    .achievement-how {
        font-size: 0.55rem;
        color: #fbbf24;
        margin-top: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        transition: all 0.3s ease;
    }

    .locked .achievement-how {
        color: #888;
    }

    .achievement-card:hover .achievement-how {
        color: #ffdd77;
    }

    .achievement-reward {
        font-size: 0.55rem;
        margin-top: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 2px 10px;
        border-radius: 20px;
        background: rgba(255,255,255,0.03);
        transition: all 0.3s ease;
    }

    .earned:hover .achievement-reward {
        background: rgba(255,255,255,0.06);
    }

    .achievement-reward.positive { color: #4ade80; }
    .achievement-reward.negative { color: #f87171; }
    
    .achievement-status {
        margin-top: 10px;
        font-size: 0.65rem;
        font-weight: 600;
        text-align: center;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(255,255,255,0.03);
        transition: all 0.3s ease;
    }

    .earned .achievement-status {
        background: rgba(22, 163, 74, 0.1);
    }

    .locked .achievement-status {
        background: rgba(220, 38, 38, 0.05);
    }

    .status-earned { color: #4ade80; display: flex; align-items: center; gap: 4px; justify-content: center; }
    .status-locked { color: #f87171; display: flex; align-items: center; gap: 4px; justify-content: center; }
    
    .loading { text-align: center; padding: 60px; color: #888; }
    .loading-spinner {
        display: inline-block;
        width: 24px;
        height: 24px;
        border: 2px solid rgba(251,191,36,0.3);
        border-top-color: #fbbf24;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== АДАПТИВ ===== */
    @media (min-width: 600px) {
        .achievements-grid {
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .achievement-icon {
            width: 86px;
            height: 86px;
        }
        .achievement-icon img {
            width: 68px;
            height: 68px;
        }
    }

    @media (min-width: 900px) {
        .achievements-grid {
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .achievement-icon {
            width: 92px;
            height: 92px;
            border-radius: 20px;
        }
        .achievement-icon img {
            width: 74px;
            height: 74px;
        }
        .achievement-name {
            font-size: 0.9rem;
        }
    }

    @media (max-width: 480px) {
        .container { padding: 0 12px; }
        .achievements-grid {
            gap: 10px;
        }
        .achievement-card {
            padding: 14px 10px;
        }
        .achievement-icon {
            width: 66px;
            height: 66px;
            border-radius: 14px;
        }
        .achievement-icon img {
            width: 52px;
            height: 52px;
        }
        .achievement-name {
            font-size: 0.75rem;
        }
        .achievement-desc {
            font-size: 0.55rem;
        }
        .achievement-how, .achievement-reward {
            font-size: 0.5rem;
        }
        .achievement-status {
            font-size: 0.55rem;
        }
    }

    .main-footer {
        background: #0a0a0a;
        border-top: 1px solid rgba(251,191,36,0.15);
        margin-top: 40px;
        padding: 40px 0 24px;
    }
    .footer-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 32px;
        margin-bottom: 32px;
    }
    .footer-logo .logo {
        font-size: 1.3rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ffffff, #fbbf24);
        background-clip: text;
        color: transparent;
    }
    .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
    .footer-links a { color: #888; text-decoration: none; font-size: 0.75rem; transition: color 0.2s; }
    .footer-links a:hover { color: #fbbf24; }
    .footer-social { display: flex; gap: 20px; }
    .social-icon { color: #aaa; font-size: 1.3rem; transition: all 0.2s ease; }
    .social-icon:hover { color: #fbbf24; transform: translateY(-3px); }
    .footer-bottom {
        text-align: center;
        padding-top: 24px;
        border-top: 1px solid rgba(255,255,255,0.05);
        font-size: 0.65rem;
        color: #555;
    }
    
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }  
</style>
</head>
<body>
    <div class="gold-top"></div>

    <div class="container">

    <div id="mobileBottomNavContainer"></div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, getDocs, query, where, doc, getDoc } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        function getAchievementIconPath(achievementId) {
            return `./achiev-icons/${achievementId}.png`;
        }

        function renderAchievementIcon(achievementId, achievementName) {
            const iconPath = getAchievementIconPath(achievementId);
            return `<img src="${iconPath}" 
                         alt="${escapeHtml(achievementName)}" 
                         class="achievement-img"
                         loading="lazy"
                         onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\\'fas fa-medal\\'></i>';">`;
        }

        async function updateHeaderBalance() {
            const user = auth.currentUser;
            const balanceDiv = document.getElementById('balanceIndicator');
            const balanceCount = document.getElementById('headerChallengesCount');
            if (!user || !balanceDiv) return;
            try {
                const userDoc = await getDoc(doc(db, "fighters", user.uid));
                const data = userDoc.data();
                const total = (data.freeChallenges || 0) + (data.purchasedChallenges || 0);
                balanceCount.innerText = total;
                balanceDiv.style.display = 'flex';
            } catch (err) { 
                console.error(err);
                balanceDiv.style.display = 'none';
            }
        }

        async function loadAchievementsPage() {
            const container = document.getElementById('achievementsGrid');
            const progressStats = document.getElementById('progressStats');
            
            try {
                const achievementsSnap = await getDocs(collection(db, "achievements"));
                const allAchievements = [];
                achievementsSnap.forEach(doc => allAchievements.push({ id: doc.id, ...doc.data() }));
                
                let earnedIds = new Set();
                let earnedCount = 0;
                
                if (currentUser) {
                    const userAchievementsSnap = await getDocs(query(collection(db, "userAchievements"), where("userId", "==", currentUser.uid)));
                    userAchievementsSnap.forEach(doc => earnedIds.add(doc.data().achievementId));
                    earnedCount = earnedIds.size;
                }
                
                const totalCount = allAchievements.length;
                
                if (progressStats) {
                    if (currentUser) {
                        const percent = totalCount > 0 ? Math.round((earnedCount / totalCount) * 100) : 0;
                        progressStats.innerHTML = `
                            <i class="fas fa-medal icon-gold"></i>
                            <span class="earned-count">${earnedCount}</span>
                            <span>/ ${totalCount} достижений</span>
                            <span style="margin-left: 8px; color: #fbbf24;">${percent}%</span>
                        `;
                    } else {
                        progressStats.innerHTML = `<i class="fas fa-lock"></i> Войдите, чтобы отслеживать прогресс`;
                    }
                }
                
                if (allAchievements.length === 0) {
                    container.innerHTML = '<div class="loading"><i class="fas fa-info-circle"></i> Достижения пока не добавлены</div>';
                    return;
                }
                
                let html = '';
                for (const ach of allAchievements) {
                    const earned = earnedIds.has(ach.id);
                    
                    let rewardText = '';
                    let rewardClass = 'positive';
                    if (ach.reward) {
                        const amount = ach.reward.amount;
                        const type = ach.reward.type === 'frs' ? 'FRS' : (ach.reward.type === 'challenges' ? 'вызовов' : (ach.reward.type === 'premium' ? 'дней премиума' : ''));
                        const sign = amount > 0 ? '+' : '';
                        rewardText = `${sign}${amount} ${type}`;
                        rewardClass = amount > 0 ? 'positive' : 'negative';
                    }
                    
                    html += `
                        <div class="achievement-card ${earned ? 'earned' : 'locked'}">
                            <div class="achievement-icon">
                                ${renderAchievementIcon(ach.id, ach.name)}
                            </div>
                            <div class="achievement-info">
                                <div class="achievement-name">${escapeHtml(ach.name)}</div>
                                <div class="achievement-desc">${escapeHtml(ach.description || '')}</div>
                                <div class="achievement-how"><i class="fas fa-question-circle"></i> ${escapeHtml(ach.howTo || ach.description || '')}</div>
                                ${rewardText ? `<div class="achievement-reward ${rewardClass}"><i class="fas fa-gift"></i> Награда: ${rewardText}</div>` : ''}
                            </div>
                            <div class="achievement-status">
                                ${earned ? '<span class="status-earned"><i class="fas fa-check-circle"></i> Получено</span>' : '<span class="status-locked"><i class="fas fa-lock"></i> Не получено</span>'}
                            </div>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
            } catch (err) {
                console.error('Ошибка загрузки ачивок:', err);
                container.innerHTML = '<div class="loading"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки достижений</div>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                setTimeout(updateHeaderBalance, 1000);
            } else {
                const balanceDiv = document.getElementById('balanceIndicator');
                if (balanceDiv) balanceDiv.style.display = 'none';
            }
            await loadAchievementsPage();
        });

        const plusBtn = document.getElementById('balancePlusBtn');
        if (plusBtn) plusBtn.onclick = () => window.location.href = 'shop.html';

        const backBtn = document.getElementById('backBtn');
        if (backBtn) {
            backBtn.addEventListener('click', () => {
                if (document.referrer && document.referrer.includes(window.location.host)) {
                    window.history.back();
                } else {
                    window.location.href = 'profile.html';
                }
            });
        }
    </script>
</body>
</html>
