<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Достижения | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
        }

        .gold-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b);
            z-index: 1001;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
        }

        /* ===== ПРОСТАЯ ШАПКА СТРЕЛКА ===== */
        .simple-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 16px 0;
            margin-bottom: 10px;
        }
        .back-arrow {
            background: rgba(251,191,36,0.1);
            border: 1px solid rgba(251,191,36,0.3);
            color: #fbbf24;
            font-size: 1.3rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }
        .back-arrow:active {
            transform: scale(0.94);
            background: rgba(251,191,36,0.2);
        }
        .simple-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #fbbf24);
            background-clip: text;
            color: transparent;
        }
        .simple-header h1 i {
            background: none;
            background-clip: unset;
            color: #fbbf24;
        }

        /* Баланс в правом углу */
        .balance-indicator {
            background: #111;
            border: 1px solid rgba(251, 191, 36, 0.5);
            border-radius: 60px;
            padding: 7px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            position: absolute;
            top: 16px;
            right: 24px;
        }
        .balance-count {
            color: #fbbf24;
        }
        .balance-plus {
            background: rgba(251,191,36,0.15);
            border: none;
            color: #fbbf24;
            cursor: pointer;
            width: 26px;
            height: 26px;
            border-radius: 50%;
        }
        .balance-plus:active {
            background: #fbbf24;
            color: #000;
        }

        /* Статистика прогресса */
        .progress-stats {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(8px);
            padding: 10px 24px;
            border-radius: 60px;
            margin: 20px 0;
            border: 1px solid rgba(251,191,36,0.2);
            font-size: 0.9rem;
            font-weight: 600;
        }
        .progress-stats i {
            color: #fbbf24;
        }

        /* Сетка достижений */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin: 20px 0 50px;
        }
        .achievement-card {
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            gap: 16px;
            align-items: center;
            border: 1px solid rgba(251,191,36,0.1);
            transition: 0.15s;
        }
        .achievement-card:active {
            transform: scale(0.98);
        }
        .achievement-card.earned {
            border: 1px solid rgba(251,191,36,0.4);
            background: linear-gradient(135deg, rgba(30,42,26,0.6), rgba(15,26,15,0.6));
        }
        .achievement-card.locked {
            opacity: 0.65;
        }
        .achievement-icon {
            font-size: 2.2rem;
            width: 60px;
            text-align: center;
            flex-shrink: 0;
        }
        .achievement-info {
            flex: 1;
        }
        .achievement-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .achievement-desc {
            font-size: 0.7rem;
            color: #aaa;
            margin-bottom: 6px;
        }
        .achievement-how {
            font-size: 0.65rem;
            color: #fbbf24;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .achievement-reward {
            font-size: 0.65rem;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .achievement-reward.positive {
            color: #16a34a;
        }
        .achievement-status {
            min-width: 90px;
            text-align: right;
            font-size: 0.75rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .status-earned {
            color: #16a34a;
        }
        .status-locked {
            color: #dc2626;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }

        /* ===== ПОДВАЛ ===== */
        .main-footer {
            background: #0a0a0a;
            border-top: 1px solid rgba(251,191,36,0.15);
            margin-top: 40px;
            padding: 40px 0 24px;
        }
        .footer-content {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 32px;
        }
        .footer-logo .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .footer-logo .logo span {
            background: linear-gradient(135deg, #fbbf24, #ffdd77);
            background-clip: text;
            color: transparent;
        }
        .footer-logo p {
            font-size: 0.7rem;
            color: #777;
            margin-top: 6px;
        }
        .footer-about h4, .footer-links h4 {
            color: #fbbf24;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .footer-about p {
            font-size: 0.75rem;
            color: #888;
            max-width: 220px;
        }
        .footer-links a {
            display: block;
            color: #aaa;
            text-decoration: none;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }
        .footer-links a:hover {
            color: #fbbf24;
        }
        .footer-bottom {
            text-align: center;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.65rem;
            color: #555;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 16px;
            }
            .simple-header {
                padding: 12px 0;
            }
            .back-arrow {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
            .simple-header h1 {
                font-size: 1.3rem;
            }
            .balance-indicator {
                padding: 5px 12px;
                top: 12px;
                right: 16px;
            }
            .balance-indicator span {
                font-size: 0.8rem;
            }
            .achievements-grid {
                grid-template-columns: 1fr;
            }
            .achievement-card {
                flex-direction: column;
                text-align: center;
            }
            .achievement-status {
                text-align: center;
            }
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
            .footer-about p {
                margin: 0 auto;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 10px;
        }
        .icon-gold { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="gold-top"></div>

    <div class="container">
        <div class="simple-header">
            <button class="back-arrow" id="backBtn"><i class="fas fa-arrow-left"></i></button>
            <h1><i class="fas fa-trophy"></i> Все достижения</h1>
        </div>
        <div class="balance-indicator" id="balanceIndicator" style="display: none;">
            <i class="fas fa-crosshairs"></i>
            <span class="balance-count" id="headerChallengesCount">0</span>
            <button class="balance-plus" id="balancePlusBtn">+</button>
        </div>

        <div style="text-align: center;">
            <div id="progressStats" class="progress-stats">
                <i class="fas fa-spinner fa-pulse"></i> Загрузка...
            </div>
        </div>

        <div id="achievementsGrid" class="achievements-grid">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка достижений...</div>
        </div>
    </div>

    <footer class="main-footer">
    <div class="container">
        <div class="footer-inner">
            <div class="footer-logo">
                <div class="logo">PRO<span>RANK</span></div>
                <p>Рейтинг спортсменов-любителей</p>
            </div>
            <div class="footer-social">
                <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Telegram"><i class="fab fa-telegram"></i></a>
                <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="VK"><i class="fab fa-vk"></i></a>
                <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                <a href="#" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            </div>
            <div class="footer-links">
                <a href="about.html">О проекте</a>
                <a href="privacy.html">Конфиденциальность</a>
                <a href="disclaimer.html">Дисклеймер</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 PRORANK. Все права защищены.</p>
        </div>
    </div>
</footer>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, getDocs, query, where, doc, getDoc } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        async function updateHeaderBalance() {
            const user = auth.currentUser;
            const balanceDiv = document.getElementById('balanceIndicator');
            const balanceCount = document.getElementById('headerChallengesCount');
            if (!user || !balanceDiv) return;
            try {
                const userDoc = await getDoc(doc(db, "fighters", user.uid));
                const data = userDoc.data();
                const total = (data.freeChallenges || 0) + (data.purchasedChallenges || 0);
                balanceCount.innerText = total;
                balanceDiv.style.display = 'flex';
            } catch (err) { console.error(err); }
        }

        async function loadAchievementsPage() {
            const container = document.getElementById('achievementsGrid');
            
            try {
                const achievementsSnap = await getDocs(collection(db, "achievements"));
                const allAchievements = [];
                achievementsSnap.forEach(doc => allAchievements.push({ id: doc.id, ...doc.data() }));
                
                let earnedIds = new Set();
                let earnedCount = 0;
                
                if (currentUser) {
                    const userAchievementsSnap = await getDocs(query(collection(db, "userAchievements"), where("userId", "==", currentUser.uid)));
                    userAchievementsSnap.forEach(doc => earnedIds.add(doc.data().achievementId));
                    earnedCount = earnedIds.size;
                }
                
                const totalCount = allAchievements.length;
                const progressStats = document.getElementById('progressStats');
                if (progressStats && currentUser) {
                    progressStats.innerHTML = `<i class="fas fa-medal"></i> ${earnedCount}/${totalCount} достижений получено`;
                } else if (progressStats) {
                    progressStats.innerHTML = `<i class="fas fa-lock"></i> Войдите, чтобы отслеживать прогресс`;
                }
                
                if (allAchievements.length === 0) {
                    container.innerHTML = '<div class="loading"><i class="fas fa-info-circle"></i> Достижения пока не добавлены</div>';
                    return;
                }
                
                let html = '';
                allAchievements.forEach(ach => {
                    const earned = earnedIds.has(ach.id);
                    const icon = ach.icon || 'fa-medal';
                    
                    let rewardText = '';
                    let rewardClass = 'positive';
                    if (ach.reward) {
                        const amount = ach.reward.amount;
                        const type = ach.reward.type === 'frs' ? 'FRS' : (ach.reward.type === 'challenges' ? 'вызовов' : (ach.reward.type === 'premium' ? 'дней премиума' : ''));
                        const sign = amount > 0 ? '+' : '';
                        rewardText = `${sign}${amount} ${type}`;
                        rewardClass = amount > 0 ? 'positive' : 'negative';
                    }
                    
                    html += `
                        <div class="achievement-card ${earned ? 'earned' : 'locked'}">
                            <div class="achievement-icon"><i class="fas ${icon}"></i></div>
                            <div class="achievement-info">
                                <div class="achievement-name">${escapeHtml(ach.name)}</div>
                                <div class="achievement-desc">${escapeHtml(ach.description || '')}</div>
                                <div class="achievement-how"><i class="fas fa-question-circle"></i> ${escapeHtml(ach.howTo || ach.description || '')}</div>
                                ${rewardText ? `<div class="achievement-reward ${rewardClass}"><i class="fas fa-gift"></i> Награда: ${rewardText}</div>` : ''}
                            </div>
                            <div class="achievement-status">
                                ${earned ? '<span class="status-earned"><i class="fas fa-check-circle"></i> Получено</span>' : '<span class="status-locked"><i class="fas fa-lock"></i> Не получено</span>'}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            } catch (err) {
                console.error('Ошибка загрузки ачивок:', err);
                container.innerHTML = '<div class="loading"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки достижений</div>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                setTimeout(updateHeaderBalance, 1000);
            } else {
                const balanceDiv = document.getElementById('balanceIndicator');
                if (balanceDiv) balanceDiv.style.display = 'none';
            }
            await loadAchievementsPage();
        });

        const plusBtn = document.getElementById('balancePlusBtn');
        if (plusBtn) plusBtn.onclick = () => window.location.href = 'shop.html';

        const backBtn = document.getElementById('backBtn');
        if (backBtn) {
            backBtn.addEventListener('click', () => {
                if (document.referrer && document.referrer.includes(window.location.host)) {
                    window.history.back();
                } else {
                    window.location.href = 'profile.html';
                }
            });
        }
    </script>
</body>
</html>
