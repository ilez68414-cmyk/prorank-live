<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
    <script>
        // Определяем вид спорта из имени файла
        const sport = window.location.pathname.split('/').pop().replace('.html', '');
        let sportName = '';
        if (sport === 'mma') sportName = 'ММА';
        else if (sport === 'boxing') sportName = 'Бокс';
        else if (sport === 'wrestling') sportName = 'Борьба';
        
        // Перенаправляем на rating.html с параметром sport
        window.location.href = `rating.html?sport=${sportName}`;
    </script>
</head>
<body>Перенаправление...</body>
</html>
