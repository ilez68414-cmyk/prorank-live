<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Пополнение баланса | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        main { flex: 1; }
        
        .gold-top { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b); z-index: 1001; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 0 24px; width: 100%; }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
        }
        
        .logo span { background: linear-gradient(135deg, #fbbf24, #ffdd77); background-clip: text; color: transparent; }
        
        .menu-toggle {
            display: none;
            background: rgba(251,191,36,0.1);
            border: 1px solid #fbbf24;
            color: #fbbf24;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 12px;
            min-height: 44px;
            min-width: 44px;
        }
        
        .nav-links {
            display: flex;
            gap: 6px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 60px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        
        .nav-links a { color: #ddd; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 8px 18px; border-radius: 40px; transition: all 0.2s; }
        .nav-links a i { margin-right: 8px; color: #fbbf24; }
        .nav-links a:hover { color: #fbbf24; background: rgba(251,191,36,0.1); }
        
        .page-header { text-align: center; padding: 30px 20px 20px; }
        .page-header h1 { font-size: clamp(1.5rem, 5vw, 1.8rem); font-weight: 800; background: linear-gradient(135deg, #fff, #fbbf24); background-clip: text; color: transparent; }
        
        .deposit-card {
            background: rgba(15,15,15,0.6);
            border-radius: 28px;
            padding: 28px;
            margin: 20px 0;
            border: 1px solid rgba(251,191,36,0.2);
        }
        
        .amount-input {
            margin-bottom: 24px;
        }
        
        .amount-input label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.85rem;
        }
        
        .amount-input input {
            width: 100%;
            padding: 16px 20px;
            background: #1a1a1a;
            border: 1px solid rgba(251,191,36,0.25);
            color: #fff;
            border-radius: 60px;
            font-size: 1.2rem;
            text-align: center;
            font-weight: 600;
        }
        
        .amount-input input:focus {
            outline: none;
            border-color: #fbbf24;
        }
        
        .preset-amounts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .preset-btn {
            background: #1a1a1a;
            border: 1px solid rgba(251,191,36,0.3);
            color: #fbbf24;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .preset-btn:hover {
            background: rgba(251,191,36,0.2);
            transform: translateY(-2px);
        }
        
        .payment-methods {
            margin-bottom: 24px;
        }
        
        .payment-methods label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.85rem;
        }
        
        .method-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid rgba(251,191,36,0.1);
            transition: all 0.2s;
        }
        
        .method-option:hover {
            border-color: rgba(251,191,36,0.4);
            background: #222;
        }
        
        .method-option.selected {
            border-color: #fbbf24;
            background: rgba(251,191,36,0.1);
        }
        
        .method-option i { font-size: 1.5rem; color: #fbbf24; width: 40px; }
        .method-option .method-info { flex: 1; }
        .method-name { font-weight: 600; margin-bottom: 4px; }
        .method-desc { font-size: 0.7rem; color: #888; }
        
        .btn-pay {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            min-height: 56px;
        }
        
        .btn-pay:hover { background: #ffdd44; transform: translateY(-2px); }
        .btn-pay:active { transform: scale(0.97); }
        
        .commission-info {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .navbar { padding: 12px 18px; }
            .menu-toggle { display: block; }
            .nav-links { display: none; flex-direction: column; position: absolute; top: 68px; left: 18px; right: 18px; background: #0f0f0f; border-radius: 20px; padding: 16px; gap: 10px; border: 1px solid rgba(251,191,36,0.3); z-index: 1000; }
            .nav-links.show { display: flex; }
            .nav-links a { width: 100%; text-align: center; padding: 12px; }
            .container { padding: 0 16px; }
            .preset-amounts { grid-template-columns: repeat(2, 1fr); }
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="gold-top"></div>

    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'">PRO<span>RANK</span></div>
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <nav class="nav-links" id="navLinks"></nav>
    </header>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-credit-card"></i> Пополнение баланса</h1>
        </div>

        <div class="deposit-card">
            <div class="amount-input">
                <label>Сумма пополнения (₽)</label>
                <input type="number" id="amount" placeholder="Введите сумму" min="100" step="100">
            </div>

            <div class="preset-amounts">
                <button class="preset-btn" data-amount="500">500 ₽</button>
                <button class="preset-btn" data-amount="1000">1 000 ₽</button>
                <button class="preset-btn" data-amount="2500">2 500 ₽</button>
                <button class="preset-btn" data-amount="5000">5 000 ₽</button>
                <button class="preset-btn" data-amount="10000">10 000 ₽</button>
                <button class="preset-btn" data-amount="25000">25 000 ₽</button>
            </div>

            <div class="payment-methods">
                <label>Способ оплаты</label>
                <div class="method-option selected" data-method="card">
                    <i class="fas fa-credit-card"></i>
                    <div class="method-info">
                        <div class="method-name">Банковская карта</div>
                        <div class="method-desc">Visa, Mastercard, МИР</div>
                    </div>
                </div>
                <div class="method-option" data-method="sbp">
                    <i class="fas fa-mobile-alt"></i>
                    <div class="method-info">
                        <div class="method-name">СБП (Система быстрых платежей)</div>
                        <div class="method-desc">По номеру телефона</div>
                    </div>
                </div>
            </div>

            <button class="btn-pay" id="payBtn"><i class="fas fa-arrow-right"></i> Оплатить</button>

            <div class="commission-info">
                <i class="fas fa-info-circle"></i> Без комиссии. Средства зачисляются мгновенно
            </div>
        </div>
    </main>

    <footer class="main-footer" style="background: #0a0a0a; border-top: 1px solid rgba(251,191,36,0.15); margin-top: 40px; padding: 30px 0 20px;">
        <div class="container">
            <div class="footer-inner" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <div class="footer-logo"><div class="logo">PRO<span>RANK</span></div><p>Рейтинг спортсменов-любителей</p></div>
                <div class="footer-social"><a href="#" class="social-icon"><i class="fab fa-telegram"></i></a><a href="#" class="social-icon"><i class="fab fa-vk"></i></a><a href="#" class="social-icon"><i class="fab fa-youtube"></i></a><a href="#" class="social-icon"><i class="fab fa-instagram"></i></a></div>
                <div class="footer-links"><a href="about.html">О проекте</a><a href="privacy.html">Конфиденциальность</a><a href="disclaimer.html">Дисклеймер</a></div>
            </div>
            <div class="footer-bottom"><p>© 2026 PRORANK. Все права защищены.</p></div>
        </div>
    </footer>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module" src="header.js"></script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, updateDoc, getDoc, addDoc, collection } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let selectedMethod = 'card';

        document.querySelectorAll('.method-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.method-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedMethod = opt.dataset.method;
            });
        });

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('amount').value = btn.dataset.amount;
            });
        });

        async function processPayment() {
            if (!currentUser) {
                alert('Войдите в аккаунт');
                window.location.href = 'login.html';
                return;
            }
            
            const amount = parseInt(document.getElementById('amount').value);
            if (!amount || amount < 100) {
                alert('Введите сумму пополнения (минимум 100 ₽)');
                return;
            }
            
            const btn = document.getElementById('payBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="loading-spinner"></div> Обработка...';
            btn.disabled = true;
            
            // ВРЕМЕННАЯ ЗАГЛУШКА
            // При подключении ИП заменишь на реальный эквайринг
            setTimeout(async () => {
                try {
                    const balanceRef = doc(db, "wallet_balances", currentUser.uid);
                    const balanceDoc = await getDoc(balanceRef);
                    const currentBalance = balanceDoc.exists() ? (balanceDoc.data().available || 0) : 0;
                    
                    await updateDoc(balanceRef, {
                        available: currentBalance + amount,
                        totalSpent: (balanceDoc.data()?.totalSpent || 0),
                        updatedAt: new Date()
                    }, { merge: true });
                    
                    await addDoc(collection(db, "wallet_transactions"), {
                        userId: currentUser.uid,
                        userType: 'fighter',
                        type: 'deposit',
                        amount: amount,
                        status: 'completed',
                        description: `Пополнение баланса на ${amount} ₽ (${selectedMethod === 'card' ? 'карта' : 'СБП'})`,
                        createdAt: new Date()
                    });
                    
                    alert(`✅ Баланс пополнен на ${amount} ₽!`);
                    window.location.href = 'buyer-wallet.html';
                } catch (err) {
                    console.error('Ошибка:', err);
                    alert('❌ Ошибка при пополнении баланса');
                } finally {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }, 1000);
        }

        document.getElementById('payBtn')?.addEventListener('click', processPayment);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (!user) {
                document.getElementById('payBtn').disabled = true;
                document.getElementById('payBtn').innerHTML = 'Войдите в аккаунт';
            }
        });

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        if (menuToggle && navLinks) menuToggle.addEventListener('click', () => navLinks.classList.toggle('show'));
    </script>
</body>
</html>
