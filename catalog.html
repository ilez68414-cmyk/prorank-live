<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Каталог товаров | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
        }
        .gold-top { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b); z-index: 1001; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 2; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
        }
        .logo span { background: linear-gradient(135deg, #fbbf24, #ffdd77); background-clip: text; color: transparent; }
        .balance-indicator {
            background: #111;
            border: 1px solid rgba(251,191,36,0.5);
            border-radius: 60px;
            padding: 7px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .balance-count { color: #fbbf24; }
        .balance-plus {
            background: rgba(251,191,36,0.15);
            border: none;
            color: #fbbf24;
            cursor: pointer;
            width: 26px;
            height: 26px;
            border-radius: 50%;
        }
        .balance-plus:active { background: #fbbf24; color: #000; }
        .menu-toggle { display: none; background: rgba(251,191,36,0.1); border: 1px solid #fbbf24; color: #fbbf24; font-size: 1.6rem; cursor: pointer; padding: 8px 14px; border-radius: 12px; }
        .nav-links {
            display: flex;
            gap: 6px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 60px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .nav-links a { color: #ddd; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 8px 18px; border-radius: 40px; transition: all 0.2s; }
        .nav-links a i { margin-right: 8px; color: #fbbf24; }
        .nav-links a:hover { color: #fbbf24; }

        .page-header {
            text-align: center;
            padding: 30px 20px 20px;
            position: relative;
        }
        .page-header h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #fff, #fbbf24); background-clip: text; color: transparent; }
        .cart-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(251,191,36,0.15);
            border: 1px solid rgba(251,191,36,0.3);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
        }
        .cart-icon:active { transform: translateY(-50%) scale(0.95); }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #fbbf24;
            color: #000;
            font-size: 0.65rem;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* КОМПАКТНЫЕ ФИЛЬТРЫ */
        .filters-container {
            background: rgba(15,15,15,0.5);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 24px;
        }
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group {
            flex: 1;
            min-width: 140px;
        }
        .filter-group label {
            display: none;
        }
        .filter-group select, .filter-group input, .reset-filters {
            width: 100%;
            padding: 10px 14px;
            background: #1a1a1a;
            border: 1px solid rgba(251,191,36,0.25);
            color: #fff;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .filter-group input {
            cursor: text;
        }
        .reset-filters {
            background: rgba(255,255,255,0.1);
            border-color: rgba(251,191,36,0.3);
            color: #fbbf24;
            white-space: nowrap;
            padding: 10px 16px;
        }
        .reset-filters i {
            margin-right: 4px;
        }

        /* Мобильная версия фильтров */
        @media (max-width: 640px) {
            .filters-container {
                padding: 12px;
            }
            .filter-row {
                flex-direction: column;
                gap: 8px;
            }
            .filter-group {
                width: 100%;
                min-width: auto;
            }
            .reset-filters {
                width: 100%;
                justify-content: center;
            }
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 24px 0;
        }
        .product-card {
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(251,191,36,0.15);
            transition: 0.2s;
        }
        .product-card:hover { transform: translateY(-4px); border-color: rgba(251,191,36,0.4); }
        .product-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 10px;
            background: #1a1a1a;
        }
        .product-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
        .product-desc { font-size: 0.65rem;color: #aaa;margin-bottom: 8px;display: -webkit-box;-webkit-line-clamp: 2; line-clamp: 2;  -webkit-box-orient: vertical; overflow: hidden;}
        .product-store { font-size: 0.65rem; color: #fbbf24; margin-bottom: 10px; }
        .product-price { font-size: 1.1rem; font-weight: 800; color: #fbbf24; margin-bottom: 12px; }
        .btn-add-to-cart {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.1s;
        }
        .btn-add-to-cart:active { transform: scale(0.96); }

        .empty-state { text-align: center; padding: 40px; color: #888; font-size: 0.9rem; }
        .loading { text-align: center; padding: 40px; color: #888; }

        .main-footer {
            background: #0a0a0a;
            border-top: 1px solid rgba(251,191,36,0.15);
            margin-top: 40px;
            padding: 30px 0 20px;
        }
        .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .footer-logo .logo { font-size: 1.2rem; display: inline-block; }
        .footer-logo p { font-size: 0.65rem; color: #777; margin-top: 4px; }
        .footer-social { display: flex; gap: 16px; }
        .social-icon { color: #aaa; font-size: 1.1rem; transition: 0.2s; }
        .social-icon:hover { color: #fbbf24; }
        .footer-links { display: flex; gap: 16px; flex-wrap: wrap; }
        .footer-links a { color: #888; text-decoration: none; font-size: 0.7rem; }
        .footer-links a:hover { color: #fbbf24; }
        .footer-bottom { text-align: center; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.6rem; color: #555; }

        @media (max-width: 768px) {
            .navbar { padding: 12px 18px; }
            .menu-toggle { display: block; }
            .nav-links { display: none; flex-direction: column; position: absolute; top: 68px; left: 18px; right: 18px; background: #0f0f0f; border-radius: 24px; padding: 20px; gap: 10px; border: 1px solid rgba(251,191,36,0.3); z-index: 1000; }
            .nav-links.show { display: flex; }
            .nav-links a { width: 100%; text-align: center; padding: 12px; }
            .container { padding: 0 16px; }
            .page-header h1 { font-size: 1.5rem; }
            .cart-icon { width: 40px; height: 40px; right: 10px; }
            .products-grid { grid-template-columns: 1fr; gap: 16px; }
            .footer-inner { flex-direction: column; text-align: center; }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        .icon-gold { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="gold-top"></div>

    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'">PRO<span>RANK</span></div>
        <div class="balance-indicator" id="balanceIndicator" style="display: none;">
            <i class="fas fa-crosshairs"></i>
            <span class="balance-count" id="headerChallengesCount">0</span>
            <button class="balance-plus" id="balancePlusBtn">+</button>
        </div>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <nav class="nav-links" id="navLinks"></nav>
    </header>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-store"></i> Каталог</h1>
            <div class="cart-icon" id="cartIcon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>

        <!-- КОМПАКТНЫЕ ФИЛЬТРЫ -->
        <div class="filters-container">
            <div class="filter-row">
                <div class="filter-group">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск...">
                </div>
                <div class="filter-group">
                    <select id="categorySelect">
                        <option value="all">📂 Все категории</option>
                        <option value="equipment">🥊 Экипировка</option>
                        <option value="sportpit">💪 Спорт-пит</option>
                        <option value="clothing">👕 Одежда</option>
                        <option value="accessories">🎯 Аксессуары</option>
                    </select>
                </div>
                <div class="filter-group">
                    <select id="partnerSelect">
                        <option value="all">🏪 Все магазины</option>
                    </select>
                </div>
                <div class="filter-group">
                    <select id="sortSelect">
                        <option value="name">📋 По названию</option>
                        <option value="price_asc">💰 Сначала дешёвые</option>
                        <option value="price_desc">💰 Сначала дорогие</option>
                    </select>
                </div>
                <button id="resetFiltersBtn" class="reset-filters"><i class="fas fa-undo-alt"></i> Сброс</button>
            </div>
        </div>

        <div id="productsGrid" class="products-grid">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-logo">
                    <div class="logo">PRO<span>RANK</span></div>
                    <p>Рейтинг спортсменов</p>
                </div>
                <div class="footer-social">
                    <a href="#" target="_blank" class="social-icon"><i class="fab fa-telegram"></i></a>
                    <a href="#" target="_blank" class="social-icon"><i class="fab fa-vk"></i></a>
                    <a href="#" target="_blank" class="social-icon"><i class="fab fa-youtube"></i></a>
                    <a href="#" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
                </div>
                <div class="footer-links">
                    <a href="about.html">О проекте</a>
                    <a href="privacy.html">Конфиденциальность</a>
                    <a href="disclaimer.html">Дисклеймер</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 PRORANK</p>
            </div>
        </div>
    </footer>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module" src="header.js"></script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, getDocs, doc, getDoc } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allProducts = [];
        let allPartners = [];
        let currentUser = null;

        async function updateHeaderBalance() {
            const user = auth.currentUser;
            const balanceDiv = document.getElementById('balanceIndicator');
            const balanceCount = document.getElementById('headerChallengesCount');
            if (!user || !balanceDiv) return;
            try {
                const userDoc = await getDoc(doc(db, "fighters", user.uid));
                const data = userDoc.data();
                const total = (data.freeChallenges || 0) + (data.purchasedChallenges || 0);
                balanceCount.innerText = total;
                balanceDiv.style.display = 'flex';
            } catch (err) { console.error(err); }
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const cartCount = document.getElementById('cartCount');
            if (cartCount) cartCount.innerText = cart.length;
        }

        async function loadPartners() {
            try {
                const snapshot = await getDocs(collection(db, "partners"));
                allPartners = snapshot.docs.map(doc => ({ id: doc.id, name: doc.data().name }));
                const partnerSelect = document.getElementById('partnerSelect');
                partnerSelect.innerHTML = '<option value="all">🏪 Все магазины</option>';
                allPartners.forEach(partner => {
                    const option = document.createElement('option');
                    option.value = partner.id;
                    option.textContent = partner.name;
                    partnerSelect.appendChild(option);
                });
            } catch (err) {
                console.error('Ошибка загрузки магазинов:', err);
            }
        }

        async function loadProducts() {
            const container = document.getElementById('productsGrid');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>';
            try {
                const snapshot = await getDocs(collection(db, "products"));
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                applyFilters();
            } catch (err) {
                console.error('Ошибка загрузки товаров:', err);
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки</div>';
            }
        }

        function applyFilters() {
            let filtered = [...allProducts];
            
            const category = document.getElementById('categorySelect').value;
            if (category !== 'all') {
                filtered = filtered.filter(p => p.category === category);
            }
            
            const partnerId = document.getElementById('partnerSelect').value;
            if (partnerId !== 'all') {
                filtered = filtered.filter(p => p.partnerId === partnerId);
            }
            
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            if (searchTerm) {
                filtered = filtered.filter(p => p.name?.toLowerCase().includes(searchTerm) || p.desc?.toLowerCase().includes(searchTerm));
            }
            
            const sort = document.getElementById('sortSelect')?.value || 'name';
            if (sort === 'price_asc') filtered.sort((a, b) => (a.price || 0) - (b.price || 0));
            else if (sort === 'price_desc') filtered.sort((a, b) => (b.price || 0) - (a.price || 0));
            else filtered.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            
            renderProducts(filtered);
        }

        function renderProducts(products) {
            const container = document.getElementById('productsGrid');
            if (products.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>Ничего не найдено</p></div>';
                return;
            }
            let html = '';
            products.forEach(product => {
                html += `
                    <div class="product-card">
                        ${product.image ? `<img src="${product.image}" class="product-image" onerror="this.src='https://placehold.co/300x200/1a1a1a/fbbf24?text=No+Image'">` : '<div class="product-image" style="display:flex;align-items:center;justify-content:center;"><i class="fas fa-image" style="font-size: 2.5rem; color: #555;"></i></div>'}
                        <div class="product-title">${escapeHtml(product.name)}</div>
                        <div class="product-desc">${escapeHtml(product.desc?.substring(0, 70))}${product.desc?.length > 70 ? '...' : ''}</div>
                        <div class="product-store"><i class="fas fa-store"></i> ${escapeHtml(product.partnerName || 'Магазин')}</div>
                        <div class="product-price">${(product.price || 0).toLocaleString()} ₽</div>
                        <button class="btn-add-to-cart" data-product='${JSON.stringify({ id: product.id, name: product.name, price: product.price, desc: product.desc, image: product.image })}'><i class="fas fa-cart-plus"></i> В корзину</button>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            document.querySelectorAll('.btn-add-to-cart').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!currentUser) {
                        alert('Войдите в аккаунт');
                        window.location.href = 'login.html';
                        return;
                    }
                    const product = JSON.parse(btn.dataset.product);
                    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
                    cart.push(product);
                    localStorage.setItem('cart', JSON.stringify(cart));
                    updateCartCount();
                    
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> Добавлено!';
                    btn.style.background = '#10b981';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.style.background = '#3b82f6';
                    }, 1200);
                });
            });
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categorySelect').value = 'all';
            document.getElementById('partnerSelect').value = 'all';
            document.getElementById('sortSelect').value = 'name';
            applyFilters();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        document.getElementById('searchInput')?.addEventListener('input', applyFilters);
        document.getElementById('categorySelect')?.addEventListener('change', applyFilters);
        document.getElementById('partnerSelect')?.addEventListener('change', applyFilters);
        document.getElementById('sortSelect')?.addEventListener('change', applyFilters);
        document.getElementById('resetFiltersBtn')?.addEventListener('click', resetFilters);
        document.getElementById('cartIcon')?.addEventListener('click', () => {
            window.location.href = 'cart.html';
        });

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                setTimeout(updateHeaderBalance, 1000);
            } else {
                const balanceDiv = document.getElementById('balanceIndicator');
                if (balanceDiv) balanceDiv.style.display = 'none';
            }
            updateCartCount();
            await loadPartners();
            await loadProducts();
        });

        const plusBtn = document.getElementById('balancePlusBtn');
        if (plusBtn) plusBtn.onclick = () => window.location.href = 'shop.html';

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        if (menuToggle && navLinks) menuToggle.addEventListener('click', () => navLinks.classList.toggle('show'));
    </script>
</body>
</html>
