<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PRORANK">
    <meta name="theme-color" content="#fbbf24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Каталог товаров | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        main { flex: 1; }
        
        .gold-top { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 3px; 
            background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b); 
            z-index: 1001; 
        }
        
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0 24px; 
            position: relative; 
            z-index: 2;
            width: 100%;
        }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
            transition: transform 0.2s ease;
        }
        
        .logo:hover { transform: scale(1.02); }
        .logo span { background: linear-gradient(135deg, #fbbf24, #ffdd77); background-clip: text; color: transparent; }
        
        .balance-indicator {
            background: #111;
            border: 1px solid rgba(251,191,36,0.5);
            border-radius: 60px;
            padding: 7px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .balance-count { color: #fbbf24; }
        
        .balance-plus {
            background: rgba(251,191,36,0.15);
            border: none;
            color: #fbbf24;
            cursor: pointer;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        
        .balance-plus:hover {
            background: rgba(251,191,36,0.3);
            transform: scale(1.05);
        }
        
        .balance-plus:active { 
            background: #fbbf24; 
            color: #000;
            transform: scale(0.95);
        }
        
        .menu-toggle { 
            display: none; 
            background: rgba(251,191,36,0.1); 
            border: 1px solid #fbbf24; 
            color: #fbbf24; 
            font-size: 1.6rem; 
            cursor: pointer; 
            padding: 8px 14px; 
            border-radius: 12px;
            transition: all 0.2s ease;
            min-height: 44px;
            min-width: 44px;
        }
        
        .menu-toggle:hover {
            background: rgba(251,191,36,0.2);
            transform: scale(1.02);
        }
        
        .menu-toggle:active { transform: scale(0.95); }
        
        .nav-links {
            display: flex;
            gap: 6px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 60px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        
        .nav-links a { 
            color: #ddd; 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 500; 
            padding: 8px 18px; 
            border-radius: 40px; 
            transition: all 0.2s ease;
        }
        
        .nav-links a i { margin-right: 8px; color: #fbbf24; transition: transform 0.2s ease; }
        .nav-links a:hover { color: #fbbf24; background: rgba(251,191,36,0.1); transform: translateY(-2px); }
        
        .page-header {
            text-align: center;
            padding: 30px 20px 20px;
            position: relative;
        }
        
        .page-header h1 { 
            font-size: clamp(1.5rem, 5vw, 1.8rem); 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff, #fbbf24); 
            background-clip: text; 
            color: transparent; 
        }
        
        .cart-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(251,191,36,0.15);
            border: 1px solid rgba(251,191,36,0.3);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .cart-icon:hover {
            background: rgba(251,191,36,0.25);
            transform: translateY(-50%) scale(1.05);
        }
        
        .cart-icon:active { transform: translateY(-50%) scale(0.95); }
        
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #fbbf24;
            color: #000;
            font-size: 0.65rem;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* ФИЛЬТРЫ */
        .filters-container {
            background: rgba(15,15,15,0.5);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }
        
        .filters-container:hover {
            border-color: rgba(251,191,36,0.2);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group { flex: 1; min-width: 140px; }
        .filter-group label { display: none; }
        
        .filter-group select, .filter-group input, .reset-filters {
            width: 100%;
            padding: 10px 14px;
            background: #1a1a1a;
            border: 1px solid rgba(251,191,36,0.25);
            color: #fff;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .filter-group input { cursor: text; }
        .filter-group select:hover, .filter-group input:hover { border-color: rgba(251,191,36,0.5); }
        .filter-group select:focus, .filter-group input:focus { outline: none; border-color: #fbbf24; box-shadow: 0 0 0 3px rgba(251,191,36,0.2); }
        
        .reset-filters {
            background: rgba(255,255,255,0.1);
            border-color: rgba(251,191,36,0.3);
            color: #fbbf24;
            white-space: nowrap;
            padding: 10px 16px;
            transition: all 0.2s ease;
        }
        
        .reset-filters:hover {
            background: rgba(251,191,36,0.2);
            transform: translateY(-2px);
        }
        
        .reset-filters:active { transform: translateY(0); }
        .reset-filters i { margin-right: 4px; }
        
        /* ТОВАРЫ - КОМПАКТНЫЕ, ФОТО ВИДНО ПОЛНОСТЬЮ */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 24px 0;
        }
        
        .product-card {
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 14px;
            text-align: center;
            border: 1px solid rgba(251,191,36,0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        
        .product-card:hover { 
            transform: translateY(-5px); 
            border-color: rgba(251,191,36,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .product-card:active {
            transform: translateY(-2px);
        }
        
        .product-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 10px;
            background: #1a1a1a;
        }
        
        .product-rating {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 6px 0;
            font-size: 0.75rem;
        }
        
        .stars {
            color: #fbbf24;
            letter-spacing: 2px;
        }
        
        .rating-count {
            color: #888;
            font-size: 0.65rem;
        }
        
        .product-title { 
            font-size: 0.95rem; 
            font-weight: 700; 
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-desc { 
            font-size: 0.65rem; 
            color: #aaa; 
            margin-bottom: 6px; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden;
            min-height: 32px;
        }
        
        .product-store { 
            font-size: 0.65rem; 
            color: #fbbf24; 
            margin-bottom: 6px;
        }
        
        .product-store i { margin-right: 4px; }
        
        .product-price { 
            font-size: 1.1rem; 
            font-weight: 800; 
            color: #fbbf24; 
            margin-bottom: 10px;
        }
        
        .btn-add-to-cart {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            min-height: 38px;
        }
        
        .btn-add-to-cart:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        
        .btn-add-to-cart:active { transform: scale(0.97); }
        
        /* МОДАЛЬНОЕ ОКНО ТОВАРА С ОТЗЫВАМИ */
        .product-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(16px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }
        
        .product-modal-content {
            background: #151515;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(251,191,36,0.3);
            animation: slideUp 0.3s ease;
        }
        
        .product-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .product-modal-header h2 { color: #fbbf24; font-size: 1.3rem; }
        .close-modal {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        
        .close-modal:hover {
            background: rgba(251,191,36,0.2);
            transform: rotate(90deg);
        }
        
        .product-modal-body {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .product-modal-image {
    width: 100%;
    max-height: 400px;
    object-fit: contain;
    border-radius: 20px;
    background: #0a0a0a;
}
        
        .product-modal-info { flex: 1; }
        .product-modal-price { font-size: 1.5rem; font-weight: 800; color: #fbbf24; margin: 10px 0; }
        .product-modal-desc { color: #aaa; line-height: 1.5; margin-bottom: 16px; }
        
        /* ОТЗЫВЫ */
        .reviews-section {
            margin-top: 20px;
            border-top: 1px solid rgba(251,191,36,0.2);
            padding-top: 20px;
        }
        
        .reviews-section h3 {
            color: #fbbf24;
            margin-bottom: 16px;
            font-size: 1.1rem;
        }
        
        .review-form {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .rating-input {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-direction: column;
        }
        
        .stars-input {
            display: flex;
            gap: 5px;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .stars-input i {
            color: #555;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .stars-input i.active,
        .stars-input i:hover,
        .stars-input i:hover ~ i {
            color: #fbbf24;
        }
        
        .review-textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid rgba(251,191,36,0.3);
            color: #fff;
            border-radius: 16px;
            font-size: 0.85rem;
            resize: vertical;
            margin-bottom: 12px;
        }
        
        .btn-submit-review {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-submit-review:hover {
            background: #ffdd44;
            transform: translateY(-2px);
        }
        
        .reviews-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .review-item {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .review-author {
            font-weight: 600;
            color: #fbbf24;
            font-size: 0.85rem;
        }
        
        .review-stars {
            color: #fbbf24;
            font-size: 0.8rem;
        }
        
        .review-date {
            font-size: 0.65rem;
            color: #666;
        }
        
        .review-text {
            font-size: 0.8rem;
            color: #ccc;
            line-height: 1.4;
        }
        
        .review-reply {
            margin-top: 8px;
            padding-left: 12px;
            border-left: 2px solid #fbbf24;
            font-size: 0.75rem;
            color: #aaa;
        }
        
        .empty-reviews {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.8rem;
        }
        
        /* АДАПТИВ */
        @media (max-width: 640px) {
            .filters-container { padding: 12px; }
            .filter-row { flex-direction: column; gap: 8px; }
            .filter-group { width: 100%; min-width: auto; }
            .reset-filters { width: 100%; justify-content: center; }
            .products-grid { 
                grid-template-columns: repeat(2, 1fr);
                gap: 12px; 
            }
            .product-card { padding: 10px; }
            .product-image { height: 120px; }
            .product-title { font-size: 0.8rem; }
            .product-price { font-size: 0.9rem; }
            .btn-add-to-cart { padding: 6px 10px; font-size: 0.65rem; min-height: 34px; }
            .product-desc { font-size: 0.55rem; min-height: 28px; }
            .product-modal-content { width: 95%; padding: 16px; }
        }
        
        @media (max-width: 480px) {
            .products-grid { gap: 8px; }
            .product-image { height: 100px; }
            .product-title { font-size: 0.7rem; }
            .product-price { font-size: 0.8rem; }
            .product-rating { font-size: 0.65rem; }
            .stars { letter-spacing: 1px; }
        }
        
        @media (min-width: 641px) and (max-width: 900px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
        }
        
        @media (min-width: 901px) and (max-width: 1200px) {
            .products-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
        }
        
        @media (min-width: 1201px) {
            .products-grid { grid-template-columns: repeat(4, 1fr); gap: 24px; }
        }
        
        @media (max-width: 768px) {
            .navbar { padding: 12px 18px; }
            .menu-toggle { display: block; }
            .nav-links { 
                display: none; 
                flex-direction: column; 
                position: absolute; 
                top: 68px; 
                left: 18px; 
                right: 18px; 
                background: #0f0f0f; 
                border-radius: 24px; 
                padding: 20px; 
                gap: 10px; 
                border: 1px solid rgba(251,191,36,0.3); 
                z-index: 1000; 
                backdrop-filter: blur(20px);
            }
            .nav-links.show { display: flex; animation: fadeIn 0.2s ease; }
            .nav-links a { width: 100%; text-align: center; padding: 12px; }
            .container { padding: 0 16px; }
            .page-header h1 { font-size: 1.5rem; }
            .cart-icon { width: 40px; height: 40px; right: 10px; }
        }
        
        .main-footer {
            background: #0a0a0a;
            border-top: 1px solid rgba(251,191,36,0.15);
            margin-top: 40px;
            padding: 30px 0 20px;
        }
        
        .footer-inner { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        
        .footer-logo .logo { font-size: 1.2rem; display: inline-block; }
        .footer-logo p { font-size: 0.65rem; color: #777; margin-top: 4px; }
        .footer-social { display: flex; gap: 16px; }
        
        .social-icon { 
            color: #aaa; 
            font-size: 1.1rem; 
            transition: all 0.2s ease;
        }
        
        .social-icon:hover { 
            color: #fbbf24;
            transform: translateY(-3px);
        }
        
        .footer-links { display: flex; gap: 16px; flex-wrap: wrap; }
        .footer-links a { color: #888; text-decoration: none; font-size: 0.7rem; transition: color 0.2s ease; }
        .footer-links a:hover { color: #fbbf24; }
        .footer-bottom { text-align: center; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.6rem; color: #555; }
        
        @media (max-width: 640px) {
            .footer-inner { flex-direction: column; text-align: center; }
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        .icon-gold { color: #fbbf24; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="gold-top"></div>

    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'">PRO<span>RANK</span></div>
        <div class="balance-indicator" id="balanceIndicator" style="display: none;">
            <i class="fas fa-crosshairs"></i>
            <span class="balance-count" id="headerChallengesCount">0</span>
            <button class="balance-plus" id="balancePlusBtn">+</button>
        </div>
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <nav class="nav-links" id="navLinks"></nav>
    </header>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-store"></i> Каталог товаров</h1>
            <div class="cart-icon" id="cartIcon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>

        <div class="filters-container">
            <div class="filter-row">
                <div class="filter-group">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск товаров...">
                </div>
                <div class="filter-group">
                    <select id="categorySelect">
                        <option value="all">📂 Все категории</option>
                        <option value="equipment">🥊 Экипировка</option>
                        <option value="sportpit">💪 Спорт-пит</option>
                        <option value="clothing">👕 Одежда</option>
                        <option value="accessories">🎯 Аксессуары</option>
                    </select>
                </div>
                <div class="filter-group">
                    <select id="partnerSelect">
                        <option value="all">🏪 Все магазины</option>
                    </select>
                </div>
                <div class="filter-group">
                    <select id="sortSelect">
                        <option value="name">📋 По названию</option>
                        <option value="price_asc">💰 Сначала дешёвые</option>
                        <option value="price_desc">💰 Сначала дорогие</option>
                        <option value="rating">⭐ По рейтингу</option>
                    </select>
                </div>
                <button id="resetFiltersBtn" class="reset-filters"><i class="fas fa-undo-alt"></i> Сброс</button>
            </div>
        </div>

        <div id="productsGrid" class="products-grid">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>
        </div>
    </main>

    <!-- Модальное окно товара с отзывами -->
    <div id="productModal" class="product-modal">
        <div class="product-modal-content">
            <div class="product-modal-header">
                <h2 id="modalProductTitle"></h2>
                <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="product-modal-body">
                <img id="modalProductImage" class="product-modal-image" src="" alt="">
                <div class="product-modal-info">
                    <div class="product-modal-price" id="modalProductPrice"></div>
                    <div class="product-modal-desc" id="modalProductDesc"></div>
                    <div class="product-store" id="modalProductStore"></div>
                    <button id="modalAddToCartBtn" class="btn-add-to-cart"><i class="fas fa-cart-plus"></i> В корзину</button>

                <div class="reviews-section">
                    <h3><i class="fas fa-star"></i> Отзывы покупателей</h3>
                    
                    <div id="reviewForm" class="review-form" style="display: none;">
                        <div class="rating-input">
                            <div class="stars-input" id="starsInput">
                                <i class="far fa-star" data-rating="1"></i>
                                <i class="far fa-star" data-rating="2"></i>
                                <i class="far fa-star" data-rating="3"></i>
                                <i class="far fa-star" data-rating="4"></i>
                                <i class="far fa-star" data-rating="5"></i>
                            </div>
                        </div>
                        <textarea id="reviewText" class="review-textarea" rows="3" placeholder="Поделитесь впечатлениями о товаре..."></textarea>
                        <button id="submitReviewBtn" class="btn-submit-review"><i class="fas fa-paper-plane"></i> Оставить отзыв</button>
                    </div>
                    
                    <div id="reviewsList" class="reviews-list">
                        <div class="empty-reviews">Загрузка отзывов...</div>

<div id="mobileBottomNavContainer"></div>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module" src="header.js"></script>
    <script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, getDocs, doc, getDoc, addDoc, query, where, orderBy, deleteDoc } from "firebase/firestore";
    import { getAuth, onAuthStateChanged } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
        authDomain: "proranklive.firebaseapp.com",
        projectId: "proranklive",
        storageBucket: "proranklive.firebasestorage.app",
        messagingSenderId: "716836144015",
        appId: "1:716836144015:web:f1575147750608d0f881fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allProducts = [];
    let allPartners = [];
    let currentUser = null;
    let currentProduct = null;
    let currentRating = 0;

    // Инициализация звездочек для рейтинга
    function initStarsInput() {
        const stars = document.querySelectorAll('#starsInput i');
        stars.forEach(star => {
            star.removeEventListener('click', handleStarClick);
            star.addEventListener('click', handleStarClick);
            
            star.removeEventListener('mouseenter', handleStarHover);
            star.addEventListener('mouseenter', handleStarHover);
        });
        
        const starsContainer = document.getElementById('starsInput');
        starsContainer.removeEventListener('mouseleave', handleStarsLeave);
        starsContainer.addEventListener('mouseleave', handleStarsLeave);
    }
    
    function handleStarClick(e) {
        const rating = parseInt(e.target.dataset.rating);
        currentRating = rating;
        updateStarsUI(rating);
    }
    
    function handleStarHover(e) {
        const rating = parseInt(e.target.dataset.rating);
        updateStarsUI(rating);
    }
    
    function handleStarsLeave() {
        updateStarsUI(currentRating);
    }
    
    function updateStarsUI(rating) {
        const stars = document.querySelectorAll('#starsInput i');
        stars.forEach((s, index) => {
            if (index < rating) {
                s.className = 'fas fa-star';
            } else {
                s.className = 'far fa-star';
            }
        });
    }

    async function updateHeaderBalance() {
        const user = auth.currentUser;
        const balanceDiv = document.getElementById('balanceIndicator');
        const balanceCount = document.getElementById('headerChallengesCount');
        if (!user || !balanceDiv) return;
        try {
            const userDoc = await getDoc(doc(db, "fighters", user.uid));
            const data = userDoc.data();
            const total = (data.freeChallenges || 0) + (data.purchasedChallenges || 0);
            balanceCount.innerText = total;
            balanceDiv.style.display = 'flex';
        } catch (err) { console.error(err); }
    }

    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const cartCount = document.getElementById('cartCount');
        if (cartCount) cartCount.innerText = cart.length;
    }

    async function loadPartners() {
        try {
            const snapshot = await getDocs(collection(db, "partners"));
            allPartners = snapshot.docs.map(doc => ({ id: doc.id, name: doc.data().name }));
            const partnerSelect = document.getElementById('partnerSelect');
            partnerSelect.innerHTML = '<option value="all">🏪 Все магазины</option>';
            allPartners.forEach(partner => {
                const option = document.createElement('option');
                option.value = partner.id;
                option.textContent = partner.name;
                partnerSelect.appendChild(option);
            });
        } catch (err) {
            console.error('Ошибка загрузки магазинов:', err);
        }
    }

    async function loadProductReviews(productId) {
        const reviewsList = document.getElementById('reviewsList');
        try {
            const reviewsQuery = query(
                collection(db, "reviews"),
                where("productId", "==", productId),
                orderBy("createdAt", "desc")
            );
            const snapshot = await getDocs(reviewsQuery);
            
            if (snapshot.empty) {
                reviewsList.innerHTML = '<div class="empty-reviews">⭐ Нет отзывов. Будьте первым!</div>';
                return;
            }
            
            let html = '';
            snapshot.forEach(docSnap => {
                const review = docSnap.data();
                html += `
                    <div class="review-item">
                        <div class="review-header">
                            <span class="review-author"><i class="fas fa-user"></i> ${escapeHtml(review.userName || 'Покупатель')}</span>
                            <span class="review-stars">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</span>
                            <span class="review-date">${review.createdAt?.toDate().toLocaleDateString() || '—'}</span>
                        </div>
                        <div class="review-text">${escapeHtml(review.text)}</div>
                        ${review.reply ? `<div class="review-reply"><i class="fas fa-reply"></i> Продавец: ${escapeHtml(review.reply)}</div>` : ''}
                    </div>
                `;
            });
            reviewsList.innerHTML = html;
        } catch (err) {
            console.error('Ошибка загрузки отзывов:', err);
            reviewsList.innerHTML = '<div class="empty-reviews">Ошибка загрузки отзывов</div>';
        }
    }

    async function getProductRating(productId) {
        try {
            const reviewsQuery = query(collection(db, "reviews"), where("productId", "==", productId));
            const snapshot = await getDocs(reviewsQuery);
            if (snapshot.empty) return { rating: 0, count: 0 };
            
            let sum = 0;
            snapshot.forEach(docSnap => {
                sum += docSnap.data().rating;
            });
            const avg = sum / snapshot.size;
            return { rating: avg, count: snapshot.size };
        } catch (err) {
            return { rating: 0, count: 0 };
        }
    }

    async function loadProducts() {
        const container = document.getElementById('productsGrid');
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>';
        try {
            const snapshot = await getDocs(collection(db, "products"));
            allProducts = [];
            for (const docSnap of snapshot.docs) {
                const product = { id: docSnap.id, ...docSnap.data() };
                const ratingData = await getProductRating(product.id);
                product.rating = ratingData.rating;
                product.ratingCount = ratingData.count;
                allProducts.push(product);
            }
            applyFilters();
        } catch (err) {
            console.error('Ошибка загрузки товаров:', err);
            container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки</div>';
        }
    }

    function applyFilters() {
        let filtered = [...allProducts];
        
        const category = document.getElementById('categorySelect').value;
        if (category !== 'all') {
            filtered = filtered.filter(p => p.category === category);
        }
        
        const partnerId = document.getElementById('partnerSelect').value;
        if (partnerId !== 'all') {
            filtered = filtered.filter(p => p.partnerId === partnerId);
        }
        
        const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
        if (searchTerm) {
            filtered = filtered.filter(p => p.name?.toLowerCase().includes(searchTerm) || p.desc?.toLowerCase().includes(searchTerm));
        }
        
        const sort = document.getElementById('sortSelect')?.value || 'name';
        if (sort === 'price_asc') filtered.sort((a, b) => (a.price || 0) - (b.price || 0));
        else if (sort === 'price_desc') filtered.sort((a, b) => (b.price || 0) - (a.price || 0));
        else if (sort === 'rating') filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
        else filtered.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        
        renderProducts(filtered);
    }

    function renderProducts(products) {
        const container = document.getElementById('productsGrid');
        if (products.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>Ничего не найдено</p></div>';
            return;
        }
        
        let html = '';
        products.forEach(product => {
            const stars = '★'.repeat(Math.round(product.rating || 0)) + '☆'.repeat(5 - Math.round(product.rating || 0));
            
            let storeName = product.partnerName;
            if (!storeName && product.partnerId) {
                const partner = allPartners.find(p => p.id === product.partnerId);
                storeName = partner ? partner.name : 'Магазин';
            }
            
            // ✅ ВАЖНО: Сохраняем ВСЕ данные товара для корзины, включая partnerId и partnerName
            const productForCart = {
                id: product.id,
                name: product.name,
                price: product.price,
                image: product.image,
                desc: product.desc || '',
                partnerId: product.partnerId || null,
                partnerName: storeName || null
            };
            
            html += `
                <div class="product-card" data-product-id="${product.id}">
                    ${product.image ? `<img src="${product.image}" class="product-image" onerror="this.src='https://placehold.co/300x200/1a1a1a/fbbf24?text=No+Image'">` : '<div class="product-image" style="display:flex;align-items:center;justify-content:center;"><i class="fas fa-image" style="font-size: 2rem; color: #555;"></i></div>'}
                    <div class="product-title">${escapeHtml(product.name)}</div>
                    <div class="product-rating">
                        <span class="stars">${stars}</span>
                        <span class="rating-count">(${product.ratingCount || 0})</span>
                    </div>
                    <div class="product-desc">${escapeHtml(product.desc?.substring(0, 60))}${product.desc?.length > 60 ? '...' : ''}</div>
                    <div class="product-store"><i class="fas fa-store"></i> ${escapeHtml(storeName)}</div>
                    <div class="product-price">${(product.price || 0).toLocaleString()} ₽</div>
                    <button class="btn-add-to-cart" data-product='${JSON.stringify(productForCart)}'><i class="fas fa-cart-plus"></i> В корзину</button>
                </div>
            `;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', async (e) => {
                if (e.target.classList.contains('btn-add-to-cart')) return;
                const productId = card.dataset.productId;
                const product = allProducts.find(p => p.id === productId);
                if (product) await openProductModal(product);
            });
        });
        
        // ✅ Исправленный обработчик добавления в корзину
        document.querySelectorAll('.btn-add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!currentUser) {
                    alert('Войдите в аккаунт');
                    window.location.href = 'login.html';
                    return;
                }
                
                // Получаем полные данные товара из data-product
                const product = JSON.parse(btn.dataset.product);
                
                // Добавляем в корзину с сохранением всех полей
                let cart = JSON.parse(localStorage.getItem('cart') || '[]');
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.image,
                    desc: product.desc,
                    partnerId: product.partnerId,      // ← КЛЮЧЕВОЕ!
                    partnerName: product.partnerName   // ← Название магазина
                });
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Добавлено!';
                btn.style.background = '#10b981';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '#3b82f6';
                }, 1200);
            });
        });
    }

    async function openProductModal(product) {
        currentProduct = product;
        const modal = document.getElementById('productModal');
        
        let storeName = product.partnerName;
        if (!storeName && product.partnerId) {
            const partner = allPartners.find(p => p.id === product.partnerId);
            storeName = partner ? partner.name : 'Магазин';
        }
        
        document.getElementById('modalProductTitle').innerText = product.name;
        document.getElementById('modalProductPrice').innerHTML = `${(product.price || 0).toLocaleString()} ₽`;
        document.getElementById('modalProductDesc').innerText = product.desc || 'Описание отсутствует';
        document.getElementById('modalProductStore').innerHTML = `<i class="fas fa-store"></i> ${escapeHtml(storeName)}`;
        
        const modalImage = document.getElementById('modalProductImage');
        if (product.image) {
            modalImage.src = product.image;
            modalImage.style.display = 'block';
        } else {
            modalImage.style.display = 'none';
        }
        
        await loadProductReviews(product.id);
        
        const reviewForm = document.getElementById('reviewForm');
        if (currentUser) {
            reviewForm.style.display = 'block';
            currentRating = 0;
            updateStarsUI(0);
            document.getElementById('reviewText').value = '';
            initStarsInput();
        } else {
            reviewForm.style.display = 'none';
        }
        
        modal.style.display = 'flex';
    }

    async function submitReview() {
        if (!currentUser) {
            alert('Войдите в аккаунт, чтобы оставить отзыв');
            return;
        }
        
        if (currentRating === 0) {
            alert('Поставьте оценку товару');
            return;
        }
        
        const reviewText = document.getElementById('reviewText').value.trim();
        if (!reviewText) {
            alert('Напишите текст отзыва');
            return;
        }
        
        try {
            const userDoc = await getDoc(doc(db, "fighters", currentUser.uid));
            const userData = userDoc.data();
            
            await addDoc(collection(db, "reviews"), {
                productId: currentProduct.id,
                productName: currentProduct.name,
                partnerId: currentProduct.partnerId,
                userId: currentUser.uid,
                userName: userData?.name || currentUser.email?.split('@')[0] || 'Покупатель',
                rating: currentRating,
                text: reviewText,
                createdAt: new Date()
            });
            
            alert('✅ Спасибо за отзыв!');
            document.getElementById('reviewText').value = '';
            currentRating = 0;
            updateStarsUI(0);
            
            await loadProductReviews(currentProduct.id);
            
            const ratingData = await getProductRating(currentProduct.id);
            const productIndex = allProducts.findIndex(p => p.id === currentProduct.id);
            if (productIndex !== -1) {
                allProducts[productIndex].rating = ratingData.rating;
                allProducts[productIndex].ratingCount = ratingData.count;
            }
            applyFilters();
            
        } catch (err) {
            console.error('Ошибка при отправке отзыва:', err);
            alert('Ошибка при отправке отзыва');
        }
    }

    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('categorySelect').value = 'all';
        document.getElementById('partnerSelect').value = 'all';
        document.getElementById('sortSelect').value = 'name';
        applyFilters();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Event Listeners
    document.getElementById('searchInput')?.addEventListener('input', applyFilters);
    document.getElementById('categorySelect')?.addEventListener('change', applyFilters);
    document.getElementById('partnerSelect')?.addEventListener('change', applyFilters);
    document.getElementById('sortSelect')?.addEventListener('change', applyFilters);
    document.getElementById('resetFiltersBtn')?.addEventListener('click', resetFilters);
    document.getElementById('cartIcon')?.addEventListener('click', () => window.location.href = 'cart.html');
    document.getElementById('closeModalBtn')?.addEventListener('click', () => {
        document.getElementById('productModal').style.display = 'none';
    });
    document.getElementById('submitReviewBtn')?.addEventListener('click', submitReview);
    
    document.getElementById('productModal')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('productModal')) {
            document.getElementById('productModal').style.display = 'none';
        }
    });
    
    // ✅ Исправленный обработчик для кнопки "В корзину" в модальном окне
    document.getElementById('modalAddToCartBtn')?.addEventListener('click', () => {
        if (!currentUser) {
            alert('Войдите в аккаунт');
            window.location.href = 'login.html';
            return;
        }
        if (currentProduct) {
            let storeName = currentProduct.partnerName;
            if (!storeName && currentProduct.partnerId) {
                const partner = allPartners.find(p => p.id === currentProduct.partnerId);
                storeName = partner ? partner.name : 'Магазин';
            }
            
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.push({ 
                id: currentProduct.id, 
                name: currentProduct.name, 
                price: currentProduct.price, 
                image: currentProduct.image,
                desc: currentProduct.desc || '',
                partnerId: currentProduct.partnerId || null,      // ← КЛЮЧЕВОЕ!
                partnerName: storeName || null                     // ← Название магазина
            });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            
            const btn = document.getElementById('modalAddToCartBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Добавлено!';
            btn.style.background = '#10b981';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '#3b82f6';
            }, 1200);
        }
    });

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            setTimeout(updateHeaderBalance, 1000);
        } else {
            const balanceDiv = document.getElementById('balanceIndicator');
            if (balanceDiv) balanceDiv.style.display = 'none';
        }
        updateCartCount();
        await loadPartners();
        await loadProducts();
    });

    const plusBtn = document.getElementById('balancePlusBtn');
    if (plusBtn) plusBtn.onclick = () => window.location.href = 'shop.html';

    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    if (menuToggle && navLinks) menuToggle.addEventListener('click', () => navLinks.classList.toggle('show'));
</script>
