<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Стать партнёром | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, rgba(251, 191, 36, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                        linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 40%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.4;
        }

        .gold-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #fbbf24, #ffdd88, #fbbf24, #b8860b);
            z-index: 1001;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #fbbf24);
            background-clip: text;
            color: transparent;
        }
        .logo span {
            background: linear-gradient(135deg, #fbbf24, #ffdd77);
            background-clip: text;
            color: transparent;
        }

        .menu-toggle {
            display: none;
            background: rgba(251,191,36,0.1);
            border: 1px solid #fbbf24;
            color: #fbbf24;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 12px;
        }

        .nav-links {
            display: flex;
            gap: 6px;
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 60px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .nav-links a i {
            margin-right: 8px;
            color: #fbbf24;
        }
        .nav-links a:hover {
            color: #fbbf24;
        }

        .page-header {
            text-align: center;
            padding: 40px 20px 20px;
        }
        .page-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #fbbf24);
            background-clip: text;
            color: transparent;
        }

        .form-card {
            background: rgba(15,15,15,0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 32px;
            margin: 20px 0 50px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #fbbf24;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 14px 18px;
            background: #1a1a1a;
            border: 1px solid rgba(251,191,36,0.25);
            color: #fff;
            border-radius: 60px;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .form-group textarea {
            border-radius: 24px;
            resize: vertical;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #fbbf24;
        }

        .product-item {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(251,191,36,0.15);
        }
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .product-header h4 {
            color: #fbbf24;
        }
        .remove-product {
            background: #dc2626;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .photo-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 8px;
        }
        .btn-add-product {
            background: rgba(251,191,36,0.15);
            color: #fbbf24;
            border: 1px dashed #fbbf24;
            padding: 12px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .submit-btn {
            width: 100%;
            background: #fbbf24;
            color: #000;
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            display: none;
        }
        .message.success {
            background: rgba(22,163,74,0.2);
            border: 1px solid #16a34a;
            color: #16a34a;
            display: block;
        }
        .message.error {
            background: rgba(220,38,38,0.2);
            border: 1px solid #dc2626;
            color: #dc2626;
            display: block;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 12px 18px;
            }
            .menu-toggle {
                display: block;
            }
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 68px;
                left: 18px;
                right: 18px;
                background: #0f0f0f;
                border-radius: 24px;
                padding: 20px;
                gap: 10px;
                border: 1px solid rgba(251,191,36,0.3);
            }
            .nav-links.show {
                display: flex;
            }
            .nav-links a {
                width: 100%;
                text-align: center;
                padding: 12px;
            }
            .container {
                padding: 0 16px;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 10px;
        }
        .icon-gold { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="gold-top"></div>

    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'">PRO<span>RANK</span></div>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <nav class="nav-links" id="navLinks">
            <a href="index.html"><i class="fas fa-home"></i> Главная</a>
            <a href="rating.html"><i class="fas fa-chart-line"></i> Рейтинг</a>
            <a href="leagues.html"><i class="fas fa-trophy"></i> Лиги</a>
            <a href="rules.html"><i class="fas fa-book"></i> Правила</a>
            <a href="shop.html"><i class="fas fa-store"></i> Магазин</a>
            <a href="challenges.html"><i class="fas fa-fist-raised"></i> Вызовы</a>
            <a href="login.html" id="profileLoginBtn"><i class="fas fa-sign-in-alt"></i> Войти</a>
        </nav>
    </header>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-handshake"></i> Стать партнёром</h1>
            <p>Разместите свои товары на PRORANK и получайте 90% от каждой продажи</p>
        </div>

        <div class="form-card">
            <form id="partnerForm">
                <div class="form-group">
                    <label><i class="fas fa-store"></i> Название магазина</label>
                    <input type="text" id="storeName" placeholder="Пример: FightShop Pro" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-link"></i> Сайт или соцсети</label>
                    <input type="url" id="storeUrl" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> О магазине</label>
                    <textarea id="storeDescription" rows="3" placeholder="Расскажите о себе..." required></textarea>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Ваше имя</label>
                    <input type="text" id="contactName" placeholder="Иван Иванов" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email для связи</label>
                    <input type="email" id="contactEmail" placeholder="ivan@example.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fab fa-telegram"></i> Telegram (для быстрой связи)</label>
                    <input type="text" id="contactTelegram" placeholder="@ivan_fight">
                </div>

                <h3 style="margin: 20px 0 16px; color: #fbbf24;"><i class="fas fa-box"></i> Ваши товары</h3>
                <div id="productsContainer"></div>
                <button type="button" id="addProductBtn" class="btn-add-product"><i class="fas fa-plus"></i> Добавить товар</button>

                <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> Отправить заявку</button>
            </form>
            <div id="formMessage" class="message"></div>
        </div>
    </main>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/11.0.2/firebase-storage.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, serverTimestamp } from "firebase/firestore";
        import { getAuth, onAuthStateChanged } from "firebase/auth";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "firebase/storage";

        const firebaseConfig = {
            apiKey: "AIzaSyDUGYJY7pX7q02MS5SACMIIQXpjpQ97mPw",
            authDomain: "proranklive.firebaseapp.com",
            projectId: "proranklive",
            storageBucket: "proranklive.firebasestorage.app",
            messagingSenderId: "716836144015",
            appId: "1:716836144015:web:f1575147750608d0f881fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        let currentUser = null;
        let products = [];

        function renderProducts() {
            const container = document.getElementById('productsContainer');
            if (products.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">Добавьте хотя бы один товар</div>';
                return;
            }
            let html = '';
            products.forEach((p, index) => {
                html += `
                    <div class="product-item">
                        <div class="product-header">
                            <h4>Товар ${index + 1}</h4>
                            <button type="button" class="remove-product" onclick="removeProduct(${index})">Удалить</button>
                        </div>
                        <div class="form-group">
                            <label>Название товара</label>
                            <input type="text" class="product-name" value="${escapeHtml(p.name)}" data-index="${index}" placeholder="Перчатки для ММА">
                        </div>
                        <div class="form-group">
                            <label>Цена (₽)</label>
                            <input type="number" class="product-price" value="${p.price}" data-index="${index}" placeholder="1000">
                        </div>
                        <div class="form-group">
                            <label>Описание</label>
                            <textarea class="product-desc" data-index="${index}" rows="2" placeholder="Краткое описание товара">${escapeHtml(p.desc)}</textarea>
                        </div>
                        <div class="form-group">
                            <label>Фото товара</label>
                            <input type="file" class="product-photo" data-index="${index}" accept="image/*">
                            ${p.imagePreview ? `<img src="${p.imagePreview}" class="photo-preview">` : ''}
                            ${p.uploading ? '<span style="color:#fbbf24;"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</span>' : ''}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            document.querySelectorAll('.product-name').forEach(inp => {
                inp.addEventListener('input', (e) => products[parseInt(e.target.dataset.index)].name = e.target.value);
            });
            document.querySelectorAll('.product-price').forEach(inp => {
                inp.addEventListener('input', (e) => products[parseInt(e.target.dataset.index)].price = parseInt(e.target.value) || 0);
            });
            document.querySelectorAll('.product-desc').forEach(inp => {
                inp.addEventListener('input', (e) => products[parseInt(e.target.dataset.index)].desc = e.target.value);
            });
            document.querySelectorAll('.product-photo').forEach(inp => {
                inp.addEventListener('change', async (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    products[idx].uploading = true;
                    renderProducts();
                    
                    const storageRef = ref(storage, `product_photos/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    const url = await getDownloadURL(storageRef);
                    
                    products[idx].image = url;
                    products[idx].imagePreview = url;
                    products[idx].uploading = false;
                    renderProducts();
                });
            });
        }

        window.removeProduct = (index) => {
            products.splice(index, 1);
            renderProducts();
        };

        document.getElementById('addProductBtn').addEventListener('click', () => {
            products.push({ name: '', price: 0, desc: '', image: null, imagePreview: null, uploading: false });
            renderProducts();
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.getElementById('partnerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (products.length === 0) {
                showMessage('Добавьте хотя бы один товар', 'error');
                return;
            }
            if (products.some(p => !p.name || p.price <= 0)) {
                showMessage('Заполните название и цену всех товаров', 'error');
                return;
            }
            if (products.some(p => p.uploading)) {
                showMessage('Дождитесь загрузки всех фото', 'error');
                return;
            }
            
            const storeName = document.getElementById('storeName').value.trim();
            const storeUrl = document.getElementById('storeUrl').value.trim();
            const storeDescription = document.getElementById('storeDescription').value.trim();
            const contactName = document.getElementById('contactName').value.trim();
            const contactEmail = document.getElementById('contactEmail').value.trim();
            const contactTelegram = document.getElementById('contactTelegram').value.trim();
            
            try {
                await addDoc(collection(db, "partner_requests"), {
                    storeName,
                    storeUrl,
                    storeDescription,
                    contactName,
                    contactEmail,
                    contactTelegram: contactTelegram || null,
                    products: products.map(p => ({ name: p.name, price: p.price, desc: p.desc, image: p.image })),
                    userId: currentUser?.uid || null,
                    status: 'pending',
                    createdAt: serverTimestamp()
                });
                
                showMessage('✅ Заявка отправлена! Мы свяжемся с вами в ближайшее время.', 'success');
                document.getElementById('partnerForm').reset();
                products = [];
                renderProducts();
            } catch (err) {
                console.error('Ошибка:', err);
                showMessage('❌ Ошибка при отправке. Попробуйте позже.', 'error');
            }
        });

        function showMessage(text, type) {
            const msgDiv = document.getElementById('formMessage');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.style.display = 'none';
                msgDiv.className = 'message';
            }, 5000);
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const loginBtn = document.getElementById('profileLoginBtn');
            if (user && loginBtn) {
                loginBtn.innerHTML = '<i class="fas fa-user"></i> Мой профиль';
                loginBtn.href = `profile.html?id=${user.uid}`;
                document.getElementById('contactEmail').value = user.email || '';
            } else if (loginBtn) {
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
                loginBtn.href = 'login.html';
            }
        });

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => navLinks.classList.toggle('show'));
        }
    </script>
</body>
</html>
