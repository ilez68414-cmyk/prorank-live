<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Профиль | PRORANK</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1f1f1f; padding: 1.5rem; border-radius: 12px; width: 90%; max-width: 400px; color: white; }
        .modal-content input, .modal-content select { width: 100%; padding: 0.5rem; margin: 0.5rem 0; background: #2a2a2a; border: 1px solid #333; color: white; border-radius: 6px; }
        .modal-content button { margin-top: 1rem; padding: 0.5rem 1rem; background: #fbbf24; color: black; border: none; border-radius: 6px; cursor: pointer; }
        .hidden { display: none; }
        .likes-block { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .like-btn { background: #3b82f6; color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        .like-btn.liked { background: #ef4444; }
        .stats-block { background: #1a1a1a; padding: 1rem; border-radius: 1rem; margin: 1rem 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin: 0.5rem 0; }
        .stat-link { color: #fbbf24; font-size: 0.9rem; text-decoration: none; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'" style="cursor:pointer">PRO<span>RANK</span></div>
        <nav class="nav-links">
            <a href="javascript:history.back()">Назад</a>
            <a href="rules.html">Правила</a>
            <a href="#" onclick="goToMyProfile()" class="btn-primary">Мой профиль</a>
        </nav>
    </header>

    <main class="container">
        <div id="profileLoading" style="text-align:center; padding: 2rem;">⏳ Загрузка профиля...</div>
        <section class="profile-header">
            <div class="profile-info">
                <div class="profile-avatar"><img id="profAvatar" src="Avatar.png" alt="Фото"></div>
                <div class="profile-text">
                    <h1 id="profName">Имя...</h1>
                    <p class="specialization"><span id="profSport">Спорт</span> • <span id="profWeight">Вес</span></p>
                    <p class="location">📍 <span id="profCity">Город</span></p>
                    <div class="likes-block"><button id="likeBtn" class="like-btn">👍 Лайк</button><span id="likesCount">0</span></div>
                    <div class="stats-block">
                        <h3>📊 Статистика</h3>
                        <div class="stats-grid">
                            <div>🏆 Побед: <strong id="statWins">0</strong></div>
                            <div>💥 Финишей: <strong id="statFinishes">0</strong></div>
                            <div>👀 Просмотров: <strong id="statViews">0</strong></div>
                            <div>👥 Подписчиков: <strong id="statSubs">0</strong></div>
                            <div>📅 Последний бой: <strong id="statLastFight">—</strong></div>
                            <div>⭐ FRS: <strong id="statFRS">0</strong></div>
                            <div>⚖️ Категория: <strong id="statWeightClass">—</strong></div>
                        </div>
                        <a href="rules.html" class="stat-link">📖 Как поднять рейтинг?</a>
                    </div>
                    <div class="action-buttons">
                   <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
                        <button id="btnChallenge" class="btn-challenge">Вызвать на спарринг</button>
                        <button id="btnMessage" class="btn-message">Написать</button>
                        <button id="editProfileBtn" class="btn-challenge hidden">✏️ Редактировать профиль</button>
                        <button id="editBtn" class="btn-challenge hidden">Редактировать био</button>
                        <button id="saveBtn" class="btn-save hidden">Сохранить</button>
                        <button id="verifyRecordBtn" class="btn-challenge hidden">🏆 Подтвердить рекорд</button>
                  </div>
                 </div>
                </div>
            </div>
        </section>
        <section class="profile-bio"><h3>О себе</h3><p id="bioText">Тут пока пусто...</p><textarea id="bioInput" class="hidden"></textarea></section>
    </main>

    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <h3>Редактировать профиль</h3>
            <input type="text" id="editName" placeholder="Имя и фамилия">
            <input type="text" id="editCity" placeholder="Город">
            <input type="number" id="editWeight" placeholder="Вес (кг)">
            <select id="editSport"><option value="Бокс">Бокс</option><option value="Борьба">Борьба</option><option value="ММА">ММА</option></select>
            <button id="saveProfileBtn">Сохранить</button>
            <button id="cancelProfileBtn">Отмена</button>
        </div>
    </div>

    <script type="importmap">
        {"imports":{"firebase/app":"https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js","firebase/firestore":"https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js","firebase/auth":"https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"}}
    </script>
    <script type="module" src="profile.js"></script>
    <script type="module">
        import { getAuth } from "firebase/auth";
        window.goToMyProfile = async function() {
            const auth = getAuth();
            if (auth.currentUser) window.location.href = `profile.html?id=${auth.currentUser.uid}`;
            else alert("Войдите!");
        };
        document.getElementById('statWeightClass').innerText = fighter.weightClass || '—';
    </script>
</body>
</html>
