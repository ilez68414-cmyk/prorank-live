<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль: Атлета | PRORANK</title>
    <link rel="stylesheet" href="style.css"> <!-- Используем тот же CSS файл -->
</head>
<body>

    <header class="navbar">
        <div class="logo" onclick="window.location='index.html'" style="cursor:pointer">PRO<span>RANK</span></div>
        <nav class="nav-links">
    <!-- Теперь эта кнопка вернет тебя именно туда, откуда ты пришел (в Бокс, ММА или Борьбу) -->
    <a href="javascript:history.back()">Назад к рейтингу</a>
    <a href="#">О проекте</a>
    <a href="#" onclick="goToMyProfile()" class="btn-primary">Мой профиль</a>

</nav>

    </header>

    <!-- profile.html -->
<main class="container">
    <section class="profile-header">
        <div class="profile-info">
            <!-- Аватарка (клик сработает только у хозяина) -->
            <div class="profile-avatar" id="avatarContainer">
                <img id="profAvatar" src="Avatar.png" alt="Фото">
                <input type="file" id="fileInput" style="display:none" accept="image/*">
                <div class="rank-badge">#?</div>
            </div>

            <div class="profile-text">
                <h1 id="profName">Имя...</h1>
                <p class="specialization"><span id="profSport">Спорт</span> • <span id="profWeight">Вес</span></p>
                <p class="location">📍 <span id="profCity">Город</span></p>

                <div class="action-buttons">
                    <!-- Кнопки для ГОСТЯ -->
                    <button id="btnChallenge" class="btn-challenge">Вызвать на спарринг</button>
                    <button id="btnMessage" class="btn-message">Написать</button>
                    
                    <!-- Кнопки для ХОЗЯИНА -->
                    <button id="editBtn" class="btn-challenge hidden">Редактировать</button>
                    <button id="saveBtn" class="btn-save hidden">Сохранить</button>
                </div>
            </div>
        </div>
    </section>

    <section class="profile-bio">
        <h3>О себе</h3>
        <p id="bioText">Тут пока пусто...</p>
        <textarea id="bioInput" class="hidden"></textarea>
    </section>
</main>

<!-- Firebase SDK через CDN -->
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js"
    }
  }
</script>
<script type="module" src="script.js"></script>
<script type="module" src="profile.js"></script>
</body>
</html>
